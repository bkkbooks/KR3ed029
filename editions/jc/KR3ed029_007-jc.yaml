body:
  text: 卷之七瘴瘧門治瘧總論證治夫瘧之為病其名雖同其狀不一蓋其受之有所不同其治之不得不異先寒而後熱者名之為寒瘧先熱而後寒者名之為溫瘧其次有五臟瘧心肝脾肺腎又有五種瘧風寒暑濕氣有勞瘧瘴瘧癉瘧牝瘧疫瘧鬼瘧其狀不一當隨證而治之吳茱萸散治寒瘧臨發時先寒戰動相次發熱便頭痛不可勝忍熱極即汗出煩渴相次便醒宜服此方須是先寒後熱方可服此藥楊子建一宗六方用之累驗吳茱萸一兩甘草半夏乾薑川芎細辛麻黃高良薑藁本官桂生使已上各一分羌活牽牛炒熟各半兩上件細搗羅為末每服三錢以水一盞煎取九分臨發寒時和滓空心熱吃若寒了以熱更不請吃須只用初發寒時服也寒未定更進一盞吃藥後不請臥須臾病減八分也若是太歲遇六壬己亥之年常瘧未發常吃暖脾藥麻黃羌活散治溫瘧初發渾身大發熱頭痛不可勝忍臨醒時即寒慄戰動逡巡便醒宜服此方須是先熱後寒方可吃此藥麻黃去根羌活牡丹皮去心獨活山梔柴胡去毛桔梗升麻荊芥穗大黃知母黃芩各一分半夏四銖牽牛半兩上件細搗羅為末每服三錢水一盞生薑二片同煎取九分臨發壯熱時和滓吃須是用初發熱時服仍是食後吃也發了以寒即更不要吃待第二發熱時吃也蒼朮鱉甲散治脾瘧寒熱不定非時發作肌肉黃瘦吃食減少大腑不調心中常如戰慄頻頻腹痛宜服此方吳茱萸蒼朮鱉甲醋炙防風人參川芎藿香柴胡去毛肉豆蔻各一分甘草四銖上細搗羅為末每服二錢水一盞生薑一片同煎取八分空心去滓服半夏湯治痰瘧發作有時熱多寒少頭痛不可勝忍額角並胸前肌肉跳起食才入口即便吐出面色帶赤宜服此方半夏藿香羌活川芎各一分牽牛半兩上細搗羅為末每服二錢半食後熟湯調下和滓吃以吐涎為度未吐更進一服山茵陳湯治癉瘧發作有時熱多寒少忽熱而不寒頭痛不安身上肌肉忽然通身俱黑大腑秘熱小便黃赤宜服此方山茵陳山梔柴胡去毛黃芩桔梗升麻牡丹皮去心貝母去心荊芥穗杏仁半夏羌活獨活麻黃各一分細辛三銖上件搗羅為末每服三錢水一盞生薑二片煎一沸急瀉出臨發熱頭痛時和滓熱服仍須是食後吃也但此瘧須熱多寒少並初發時先壯熱然後吃此方鱉甲麝香散治勞瘧乍寒乍熱毛髮枯焦寒熱不定吃食減少肌肉消瘦面色青黑兩足無力忽非時足冷小便頻數大腑不調夜夢泄精宜服此方若大腑秘骨潮熱不請吃鱉甲醋炙黃天靈蓋酥炙香黑色續斷菟絲子牛膝黃耆已上各半兩茯苓川芎山茱萸各一分獨活柴胡去毛藿香羌活各三銖乾地黃黃橘皮各四銖麝香二銖別研細方入諸藥末令勻上為細末每服三錢水一盞二分入鹽少許同煎取一盞空心和滓吃煉蜜丸如梧桐子大空心鹽湯下四十丸菩薩丹治諸瘧亦名五方丹陳氏云余昨經豫章俞子清為漕語及此方求得十粒沿路中病者用之立效後作書覓方遂制一料一年之間良賤用之皆愈仍施他人巴豆不去皮桂心別為細末青黛硫黃白礬上件各等分下三味同研如粉於五月五日合藥入沐浴淨衣齋戒念救苦救難觀世音菩薩一千遍至午時入淨室內面南將巴豆入乳缽內先研如泥後入下四味同研半時辰久圓如桐子大勿令雞犬孝子婦人見入在淨器內於神佛前安頓供養凡有患者於發日前令男子取一圓以新綿裹合炭上烘令熱與男子乘熱塞在病人耳竅中男左女右若女人病亦令男子取藥塞耳候不發日亦令男子取出卻收入合子內遇有患者再用可醫三五人輕者便瘥重者須臾重發一次即愈須不發一兩日方取出藥其驗如神若病者用藥日齋戒至誠念救苦救難觀世音菩薩五百聲其效尤靈驗故名菩薩丹如藥大幹難丸須用端午日粽子爛研相和勻圓之勿大濕瘴瘧飲子辛御史謫廣西傳此方常山甘草各四兩大青一錢或半錢人參三錢上㕮咀水一碗二錢煎至中碗未發隔夜露早月一宵臨發日早晨空心溫服不吐三滓並煎一服七寶散治一切瘧疾及不服水土山嵐瘴氣寒熱如瘧張承節處此四方累用有效常山水煮青皮不去白檳榔草果子仁甘草炙厚朴去皮湯泡薑製烏梅連核已上各半兩上㕮咀每服半兩重水一碗酒一盞煎至一盞去滓露一宿來早再溫面東服隔夜煎下發日早服四聖散治諸般瘧疾山梔子仁常山川升麻鱉甲去裙用好醋煮上等分㕮咀每服三錢重水一盞半烏梅肉二個同煎七分去滓熱服不計時候斷瘧丹治瘧疾不問逐日間日發不過兩日而愈雄黑豆四十九粒取末信砒研極細一錢黃丹一錢為衣蜘蛛三個研上和勻滴水為圓如豌豆大臨發日早用桃柳頭入井花水面北送下一圓醋湯放溫服亦得忌食熱物一日冷附湯治瘧疾痰實痞塞不通附子一隻重九錢一兩炮去皮臍上切作片分二服生薑十大片水二大盞煎至一盞隔夜煎下用綿蒙盞露一宿至五更初取冷服凡患瘧疾無過是痰實痞塞不通脾胃弱虛熱在上停於胸膈不得入於臟腑所以五更冷服乃使藥下達壯脾胃去痰實除虛熱降心氣屢用屢效半夏草果飲治瘧大效朱子新方曾合累效半夏十枚湯洗七遍大棗十枚甘草三寸炙青皮五枚湯浸過連白用陳皮四個湯浸連白用烏梅十個捶碎草果五個大者去皮生薑三大塊連皮厚朴三寸去粗皮薑汁製上九味為粗末以水三大碗煎一碗半去滓當發日五更初服一盞五點又服一盞平明又服一盞此至飯前要分服令盡再將滓以水碗半煎七分慢慢呷吃神妙白虎加桂湯治溫瘧先熱後寒惡風多汗葉伯才集此數方治諸瘧疾無不效驗石膏四兩半知母一兩半桂心一兩粳米一合上銼散每服四錢水盞半煎七分去滓未發前三服麻黃白朮湯治傷風寒暑濕不留經絡與衛氣相併病以日作寒熱交煎麻黃去節湯浸白朮茯苓桂心各一兩陳皮青皮桔梗白芷甘草半夏曲紫蘇烏梅各三分乾薑半兩上為銼散每服四錢重水兩盞姜三片棗兩枚煎七分去滓當發日空心一服臨發一服尤妙亦治時疫桂薑湯治牝瘧寒多微熱或但寒不熱柴胡八兩桂心三兩黃芩三兩牡蠣煅甘草乾薑炮各三兩瓜樓根四兩上為銼散每服四錢水二盞煎七分去滓空心服日三服初服微煩汗出愈一法有半夏三兩七棗湯治五臟氣虛陰陽相勝作為痎瘧不問寒熱先後與大小獨作疊間日悉主之附子一枚炮製以鹽水浸再炮如此凡七次至第七次不浸去皮臍上為銼散水一碗姜七片棗七個煎至八分盞當發日空心溫服仍吃三五個棗子忌如常良方用烏頭煎不用鹽水浸不特服之僭燥亦不能分利陰陽去滓服四獸飲治五臟氣虛喜怒不節勞逸兼併致陰陽相勝結聚涎飲與衛氣相搏發為瘧疾悉主之兼治瘴瘧最效半夏湯去滑茯苓人參草果陳皮甘草烏梅肉白朮生薑棗子各等分上為銼散鹽少許淹食頃厚皮紙裹水淹入慢火煨香熟焙乾每服秤半兩水二盞煎至七分去滓水發前並進三服草果飲治脾寒等瘧草果川芎白芷紫蘇葉良薑甘草炙青皮去白炒各等分上為粗末每服二大錢水一盞煎七分去滓熱服當發日連進三服經效瘧丹治鬼瘧殊效真阿魏半兩桃枝柳枝各長一尺七莖雄黃通明好者半兩別研辰砂一錢別研留一半上為末以重午日五家粽角為丸如梧子大辰砂所留一半為衣遇發時用淨器水摩一丸塗鼻尖並人中等退以冷水服一丸合時須五月五日大正氣散治山嵐瘴氣發作寒熱遂成瘧疾附子炮去皮臍厚朴薑汁製桂心甘草炙乾薑炮陳皮各一兩茱萸半兩微炒上為細末每服二大錢水盞半姜五片棗一枚同煎至七分熱服不拘時兼治霍亂吐瀉一切氣疾紅圓子治食瘧尤妙蓬莪朮荊三稜醋煮一伏時各二兩胡椒一兩青皮三兩炒香阿魏一分醋化上為末別研倉米末用阿魏醋煮米糊搜和丸如梧子大炒上朱為衣每服五十丸至百丸以老瘧飲下古方雖有鱉甲煎等不特服不見效抑亦藥料難備老瘧飲治久瘧結成癥瘕癖在腹脅諸藥不去者蒼朮泔浸草果去皮桔梗青皮陳皮良薑各半兩白芷茯苓半夏湯洗去滑枳殼麩炒去瓤甘草炙桂心乾薑炮各三錢紫蘇葉川芎各二錢上為銼散每服四大錢水二盞鹽少許煎七分去滓空心服日三夜一仍吞下紅圓子常山飲治勞瘧虛人老人皆可服常山穿山甲醋炙木通秦艽各一分辰砂半字別研甘草炙半兩上為銼散作一劑水三盞烏梅棗子各七枚煎半盞再入酒一盞煎至八分去滓入辰砂溫服治諸般瘧疾局方藿香正氣散加草果子去皮捶碎同煎服有人患瘧疾幾三年連綿不斷黃瘦飲食減少雖有時歇三兩日每勞力或吃少物相犯寒熱立至令服局方丁香煮散數日其病不作治寒熱因傷脾胃久積成痰若痰不去何由得斷若壯實者倍加常山煎局方常山飲隔夜煎露一宿臨發早溫服一吐而安氣弱不可服治先寒後熱熱退汗出飲食減少局方橘皮半夏湯和治中湯加草果仁生薑同煎服有人患瘧疾每日時刻不差略略寒發則極熱飲水令服局方小柴胡湯加枳實大黃煎一服而痊蓋是伏暑而得若寒多不可服患瘧疾連綿不斷每發則極寒極熱瘧退汗如雨令服局方巳寒圓用生薑枳實煎湯送下一服不作
