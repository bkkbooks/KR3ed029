body:
  text: 卷之十三胎產門治婦人胎前產後諸疾證候大率治病先論其所主男子調其氣婦人調其血氣血人之神也不可不謹調護然婦人以血為基本氣血宣行其神自清所謂血室不蓄則氣和血凝結則水火相形月水如期謂之月信不然血凝成孕此乃調燮之常其血不來則因風熱傷於經血故血不通或外感寒內受邪熱脾胃虛弱不能飲食食既不充榮衛抑遏肌膚黃燥面無光澤發寒熱腹脹作痛難於嗣息子臟冷熱久而勞損必挾帶下便多淋漏經云腹中如塊忽聚忽散其病乃癥血涸不流而搏腹脹時作寒熱此成瘕也或先後爽期雖通而多寡究疾之原蓋本於此矣內補圓治妊娠衝任脈虛補血安胎此三方諸集皆載之在人用之如何爾大率婦人妊娠唯在抑陽助陰素問云陰搏陽別為之有子蓋關前為陽關後為陰尺中之脈按之搏手而不絕者妊子也婦人平居陽氣微盛無害及其妊子則方閉經隧以養胎若陽盛搏之則經脈妄行胎乃不固素問所謂陰虛陽搏謂之崩也抑陽助陰之方甚多然胎前藥唯惡群隊若陰陽交雜別生它病唯是枳殼散所以抑陽四物湯所以助陰故爾枳殼散差寒若單服之恐有胎寒腹痛之疾以內補圓佐之則陽不至強陰不至弱陰陽調勻有益胎嗣此前人未嘗論及也熟乾地黃二兩當歸一兩微炒上細末煉蜜和圓如桐子大每服三四十丸溫酒下益血四物湯治婦人榮衛氣虛挾風冷胸脅膨脹腹中㽲痛經水衍期或多或少崩傷漏下腰腿痛重面色青黃嗜臥無力安胎止痛補虛當歸芎藭熟乾地黃白芍藥各等分上為粗末每服四錢水一盞煎至八分去滓溫服不拘時候枳殼散此雖孫真人滑胎易產方然抑陽降氣為眾方之冠商州枳殼二兩甘草一兩上細末每服二錢百沸湯點服空心食前日三服凡懷孕六七月以上即服令兒易生初生胎小微黑百日以後肉漸變白寧志膏治婦人因出血多心神不安不得睡語言失常滕生色家方極有效辰砂酸棗仁人參茯神去木琥珀已上各一分滴乳香一錢別研上為細末和勻每服一錢濃煎燈心棗湯調下拱辰丹婦人當壯年而真氣猶怯此乃稟賦素弱非虛衰而然也僭燥之藥尤宜速戒勿謂手足厥逆便云陰多如斯治之不惟不能愈疾大病自此生矣滋益之方群品稍眾藥力微細難見功效但固天元一氣使水升火降則五臟自和百病自去此方主之行在孫琳郎中方葛丞相夫人少年時服之杲效鹿茸酥炙去毛皮四兩山茱萸新好有肉紅潤者四兩川當歸洗去土四兩麝香半兩別研上三件為末入麝香拌勻酒煮麵糊為圓如梧桐子大每服一百粒或五十粒溫酒鹽湯下琥珀散治婦人月經壅滯每發心腹臍㽲痛不可忍及治產後惡露不快血上搶心迷悶不省氣絕欲死此方許學士之秘方也若是尋常血氣痛只一服產後血衝心二服便下常服尤佳予前後救人急切不少此藥易合宜多合以救人荊三稜蓬莪朮赤芍藥劉寄奴牡丹皮官桂熟乾地黃菊花真蒲黃當歸干秤已上各一兩細銼上以前五味用烏豆一升生薑半斤切片米醋四升同煮豆爛為度焙乾入後五味同為末每服二錢溫酒調下空心食前服一方不用菊花蒲黃用烏藥延胡索亦佳桃仁煎治婦人血瘕血積經候不通此出千金方頃年在毗陵有一貴人妻患小便不通臍腹脹不可忍眾醫皆作淋治如八正散之類數種治皆不退痛愈甚予診之曰此血瘕也非瞑眩藥不可去予用此藥更初散至日午痛大作不可忍遂臥少頃下血塊如拳者數枚小便如黑汁者一二升痛止得愈此藥治病的切然猛烈太峻氣虛血弱者更斟酌與之桃仁去皮尖麩炒黃大黃川朴硝已上各一兩虻蟲半兩炒黑色上四味末之以醇醋二升半銀石器中慢火煎取一升五合下大黃桃仁虻蟲等不住手攪欲圓下朴硝更不住手攪良久出之丸如桐子大前一日不用吃晚食五更初用溫酒吞下五丸日午取下如赤豆汁雞肝蝦蟆衣未下再作血鮮紅即止續以調氣血藥補之通經圓治婦人室女月候不通疼痛或成血瘕徽州醫巫張擴頃年緣事在推勘院有王醫者以醫職直宿日夜與之捻熟口傳此方渠甚秘之予後得此方以治婦人疾不可勝數且欲廣行不敢自秘尋常血氣凝滯疼痛數服便效桂心青皮去白大黃炮乾薑川椒蓬莪術川烏乾漆當歸桃仁各等分上為細末一兩為率先將四錢米醋熬成膏和餘六錢末成劑臼中治之丸如桐子大晾乾每服二十丸用淡醋湯下加至三十丸溫酒亦得空心食前服艾煎圓治婦人一切虛寒胎前產後赤白帶下或成血瘕久服此藥自然融化漢陽蘇司法孝祥傳名次參伏道艾揉去塵土擇淨枝梗取葉秤五兩大淮棗十二兩砂瓶內水煮爛去核同艾葉一處搗爛如泥捻成薄餅子猛火焙乾漢椒去目枝梗併合五兩以阿膠二兩米醋三升同椒於沙瓶內煮極干取出焙燥碾為細末當歸去蘆及用酒洗白芍藥真白者熟乾地黃如鋪上賣者須淨洗漉去浮者曬乾酒浸蒸曬再入酒浸蒸五十次如糖煎香美方可用川芎白薇附子大者炮去皮臍卷柏取青葉澤蘭去枝梗已上各焙乾秤上件同為細末與前艾葉椒末拌勻米醋麵糊為丸梧桐子大每服五七十丸至一二百丸艾醋湯空心食前服當歸散治婦人天癸過期經脈不勻或三四月不行或一月再至腰腹疼痛素問云七損七益謂女子七七數盡而經脈不依時者血有餘也不可止之但令得依時不腰痛為善當歸川芎白芍藥黃芩各銼炒各一兩白朮半兩山茱萸一兩半上細末每服二錢酒調下空心食前日三服飲冷去黃芩加桂一兩煮附圓治婦人室女一切血氣經候不調臍腹㽲痛面色萎黃心忪乏力腹脹脅疼頭暈噁心飲食減少崩漏帶下大腸便血積聚癥瘕並皆治之若以其名人人言之耗氣不喜此藥出訛之久疑懼不肯服者甚多殊不知獲效非常古書所載婦人仙藥不可輕忽況修制相感豈同日而語也服之自顯其功耳出張氏方極效香附子不計多少先擦去毛淨用上以好醋煮出焙乾碾細末煮醋糊為丸如桐子大每服三四十丸米飲送下不計時候婦人數數墮胎由氣不下降所以胎氣不固此藥尤妙生熟地黃散治婦人血隔若血崩者服之住血隔者服之效李秀傳此方甚驗生地黃熟地黃甘草炙柴胡白芍藥當歸地骨皮牡丹皮延胡索川芎各一兩上為粗末每服三錢水一大盞同古老錢一兩文煎至熟入麻油一兩點候煎及八分去滓熱服空心食前忌魚腥之類十柔圓補治婦人氣血蔣簽判傳熟地黃四兩當歸二兩桂蓯蓉酒浸無以鹿茸代之紫菀補骨脂鹿角膠炒柏子仁熟艾別研酒熬膏白茯苓各二兩上為細末艾膏丸如梧桐子大每服七八十丸溫酒或米飲湯下蝟皮散治產後血氣中風上喘燥渴欲投入水者宜服此方張氏傳用之無不取效蝟皮烏蛇血餘燒灰存性為末五錢自然銅醋淬三五片烏金石炭各三兩上件藥細研為散每服一錢和白散一錢酒調下立效白散者用近水岸乾枯蝸牛殼淨去土為細末與前藥同調服如大渴新汲水調服尤妙有積物及滯血則用此散下後方杏仁丸子杏仁去尖巴豆各十四個並於燈焰上燎存性各燎七遍硇砂一錢沒藥木香各半錢麝香二字鯉魚鱗燒灰一錢肉豆蔻末一錢上件藥搗羅為細末用狗膽和丸如綠豆大臨時看虛實加減隨散子下三五丸麒麟圓治婦人血風勞體熱面黃血刺血塊四肢少力身體困倦不思飲食兼通經脈極妙麒麟竭三分穿山甲七片近上者炙焦黃色為度乾漆炒令半生半熟硇砂別研如粉面細沒藥研荊三稜炮別搗為細末當歸酒浸細切焙乾以上各一兩巴豆七粒去皮膜出盡油上件除巴豆硇砂三稜末外都一處搗羅為末後入以前三味同研令勻細用醋煮麵糊為丸如綠豆大調荊三稜末湯下初服第一日吃四丸二日五丸三日六丸第四日七丸第五日八丸第六日九丸盡是空心服之見效大病半月安參附圓消腹內血塊大慶通監院方附子兩個炮去皮臍舶上茴香益智仁延胡索陳橘紅肉桂蓬莪朮川薑各半兩乳香白朮人參當歸木香白芍藥沉香各一兩上為細末棗肉為圓每服六十圓米醋湯吞下溫酒亦得薑蔥散治妊娠傷寒生薑三十片蔥十莖連根拔上用水二大盞煎八分盞服之縮砂散治妊娠吃顛或閃肭著錢季毅傳縮砂仁上去膜熨斗內略炒為細末每服二錢溫酒調下不飲酒人米飲調下鹽湯亦得瓜蔞根散治胎死腹中其證指甲青漲悶舌青甚者口中作屎臭郭宅心方王順伯運使傳瓜蔞根上一味焙乾為細末每服二錢倒順水調下一服取效仍先備防暈茶藥催生丹孔世賢方趙太叔方同用之累有神效蓖麻十四個去皮硃砂雄黃各一錢半蛇蛻一尺上件為細末漿水飯和圓彈子大臨產時先用椒湯淋泄臍下次安藥於臍內用醋紙數重敷藥上以闊帛系之須臾即生急取下藥一丸可用三遍下胎蛇蛻散治婦人生產不下死胎在腹橫生倒生胞衣不下一切危急神效史丞相方蘇韜先傳蛇蛻一條全者斷者不可用以火箸挑起令直用麻油紙燃從尾燒上以乳缽接貯研細羅過須要是雄者牆頭或籬上者是燕翁窠一個泥須通透兒出了者研細上二件和勻作一服以無灰酒半盞暖熱再以童子小便半盞浸平之服下即分娩白朮散治妊娠氣不和調飲食經云飲食自倍脾胃乃傷又云陰之所生過在五味陰之五宮傷在五味若妊子飲食不節生冷毒物恣性食啖致脾胃之疾故妊娠傷食難得藥唯此方隱捷白朮炒乾紫蘇各一兩白芷微炒三錢人參三錢川芎訶子皮青皮各半兩甘草一錢上細末每服二錢水一盞姜三片煎七分不拘時候溫服蓖麻膏治婦人生產數日而下及胞衣死胎不下者政和中一鄉人女子產二日不下予令漫試之一塗俄頃便下自後常用極效蓖麻七粒去殼上研如泥塗婦人足心才下便急洗去此崔元亮海上方人但未知耳鹿屑湯治妊娠熱病胎死腹中鹿角屑一兩上用水一碗蔥白五莖豆豉半合同煎至六分去滓溫服靈脂散治婦人胞衣不下惡血衝心五靈脂上用揀擇砂石及鐵屑之類一半炒一半生為細末每服二錢酒調下六物湯安胎和氣治胎動不安腰腿疼重惡露頻下楊氏家藏此數方並試驗者阿膠蛤粉炒成珠子糯米炒黃耆蜜炙川芎當歸洗焙熟乾地黃洗焙上六味各等分為㕮咀每服三錢生薑三片蔥白一寸同煎至七分去滓溫服空心人參調中散調脾肺氣治胸脅滿悶四肢煩熱及妊娠阻病心胸注悶嘔逆可思飲食人參去蘆頭甘草炙各半兩枳殼麩炒去瓤厚朴薑汁製白朮白茯苓去皮各一兩柴胡去苗細辛去葉土藿香葉去土陳皮去白各三分上件為㕮咀每服三錢水一盞生薑三片同煎至七分去滓溫服食前赤茯苓散治妊娠惡阻心胸煩悶頭暈噁心四肢昏倦嘔吐痰水惡聞食氣赤茯苓去皮半夏湯洗七遍陳皮去白桔梗去蘆頭熟乾地黃洗焙各一兩白朮川芎人參去蘆頭赤芍藥各三分旋覆花甘草炙二味各半兩上件㕮咀每服三錢水一盞半生薑三片煎至一盞去滓熱服不拘時芎藭圓安胎補衝任止胎漏調血脈及療子臟風冷腰腹疼痛或久無子息或妊娠損墜乾薑炮附子炮去皮臍山茱萸續斷川芎白芍藥蒲黃各一兩生乾地黃三分白朮菟絲子酒浸令軟別搗肉蓯蓉酒浸宿切焙黃耆各二兩上件為細末蜜糊為丸如梧子大每服三十丸煎木香熱米飲下空心食前
