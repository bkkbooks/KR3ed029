body:
  text: 卷之九痰飲門論痰飲證候人之有痰飲病者由榮衛不清氣血敗濁凝結而成也內則七情汩亂臟氣不行鬱而生涎涎結為飲四飲者即懸飲溢飲支飲痰飲是也懸飲者飲水流在脅下咳唾引痛溢飲者飲水流於四肢當汗出而不汗身體疼重支飲者咳逆倚息短氣不得臥其形如腫痰飲者其人素盛今瘦腸間漉漉有聲又有留飲者背寒如手大或短氣而渴四肢歷節疼脅下痛引缺盆咳嗽則轉甚又有伏飲者膈滿喘咳嘔吐發則寒熱腰背痛目淚出其人振振惡寒身瞤惕故曰四飲生六證或云五飲者即留飲伏飲合為一證是也丁香五套圓夫胃氣虛弱三焦痞澀不能宣行水穀故為痰飲結聚胸臆之間令人頭目昏眩胸膈脹滿咳嗽氣急嘔逆腹疼伏於中脘亦令臂疼不舉腰腿沉重久而不散流入於脾脾惡濕得水則脹脹則不能消化水穀又令腹中虛滿而不食也此藥主之傅公實方其子宣贊安民傳半夏一兩切破天南星一兩每個切作十數塊二味先用水浸三日每日易水次用白礬三兩研碎調入水內再浸三日洗淨焙乾乾薑炮一兩良薑一兩白朮一兩茯苓一兩木香半兩丁香半兩不見火青皮去白陳皮去白各半兩上十味為細末用神麯一兩大麥糵二兩同碾取末打糊和藥為圓如梧桐子大每服三十丸至五十丸溫熟水送下不拘時候常服溫脾胃去宿冷消留滯化飲食闢霧露風冷山嵐瘴癘不正非時之氣但是酒癖停飲痰水不消累服湯藥不作效者服之如神千金圓治中寒停飲不散痰實不入食主嗣康方硫黃二兩通明者別研如粉青皮四兩去白白茯苓二兩半夏一兩湯洗去臍乾山藥二兩附子一兩去皮臍生用上為細末拌勻湯浸炊餅圓或用淡麵糊圓如梧桐子大每服三十丸至五十丸空心食前服枳殼半夏散治遠年痰飲發作有時諸藥未效者半夏湯洗七遍枳殼麩炒黃縮砂仁陳皮去白白茯苓各半兩丁香二錢半木香二錢半上件七味併為粗末每服四大錢水一盞半煎八分食前熱服可斷根本三奇散治一切嗽不問新舊喘頓不止晝夜無時陳氏云予家一獲久苦此疾數令醫治如水投石偶在曲江置得沅州一婢親制此藥兩服而愈款冬花二百文熟乾地黃二兩佛耳草五十文上焙乾碾為粗末每次二大錢裝猛火於香爐中燒之用紙作筒子一頭大一頭小如粽子然安在爐上以口吸煙盡為度即以茶清嚥下有涎出任之三妙湯治痰嗽武昌趙都統傳其家屢服得效大罌粟殼四枚烏梅二枚北棗二枚上於銀石器中用水兩大盞煎一半候熟入少餳臨睡隨意熱溫冷飲略仰臥少定嗽止快活圓常服消食化痰養生之家不可闕韓倅子髦傳此方甚驗枳殼一兩半炒桔梗二兩半夏二兩湯洗七遍桂一兩上為末薑汁糊丸桐子大每服二十丸薑湯下食後前胡散治痰客於上焦久之令人昏眩前胡去蘆人參去蘆紫蘇子真者赤茯苓各三分甘草炙陳皮去白枳殼麩炒半夏湯洗七遍木香生用各半兩上九味㕮咀每服三錢水一大盞生薑十片煎至半盞去滓熱服紫芝丸治痰五靈脂粒粒取全者去砂石半夏湯浸七遍慢慢浸令心透上二味等分為細末生薑自然汁浸蒸餅為圓如桐子大每服二十丸至三十丸生薑或茶湯下食空臨睡時服三仙圓治中脘氣滯胸膈煩滿痰涎不利頭目不清天南星生去皮半夏沸湯泡七遍二味各五兩碾為細末用生薑自然汁和不可太軟但手捏得聚為度攤在篩內用楮葉蓋之令發黃色曬乾收之須是五六月內做曲如醬黃法香附子略炒於磚上磨去毛五兩上用南星半夏曲餅子二兩淨香附子一兩同為細末水煮麵糊為丸如梧子大每服二十至三十丸食後臨臥薑湯下導痰湯費達可運使傳白茯苓桂心半夏湯洗十次乾生薑橘紅枳殼炒香甘草上等分為末入生薑三片煎七分非時溫服半夏湯治痰飲捷徑趙從簡方白茯苓半夏湯洗七遍上等分各銼如小豆每服秤三錢水一盞半生薑十片煎至七分去滓服神效化痰飛礬丹張承祖運干傳飛過枯礬二兩北礬絳礬尤佳如無只用通明南礬半夏一兩生薑制一宿天南星一兩切作片子用皂角挪水浸過一宿來日就用銚子熬水盡為度白殭蠶一兩半兩生用半兩米醋浸一宿上同為細末薑汁糊為丸如梧桐子大小丸亦得每服十五丸至二十丸生薑湯下兼治喉閉用薄荷兩葉新汲水浸少時嚼薄荷吞藥以水送下如咽不得即以十五粒搗細用皂角水調灌下即開又治小兒急慢驚風牙關緊急不可開者亦用皂角水調塗牙齦上入咽即活神仙化痰圓亦治風秘甚效天南星四兩半夏四兩二味生薑皂角各四兩水五升同煮水盡去姜及皂角丁香一兩橘紅二兩上為細末白水麵糊為丸如梧桐子大每服三十丸生薑湯下食後下痰圓李鏞解元傳橘紅四兩白朮兩半半夏一兩薑製天南星二兩炮上為細末薑汁煮麵糊為丸如梧桐子大薑湯下四十粒不拘時候破痰消飲圓治一切氣一切飲其效甚速何自然中丞傳荊三稜一兩灰炮捶碎半夏三兩湯泡七次蓬莪朮一兩灰炮捶碎青皮一兩洗草果一兩麵裹炮陳皮一兩洗良薑一兩濕紙裹煨川薑一兩炮裂上並焙乾秤為細末水煮糊為圓如桐子大陰乾每服五十圓薑湯或熟水下不計時候薛氏桂辛湯下痰飲散風邪止涎嗽聰耳鼻宣關竅利咽膈清頭目解冒眩進飲食鄧左丞方桂去皮細辛去苗土乾薑人參去蘆白茯苓去皮甘草炙各二分五倍子陳皮去白白朮半夏湯浸洗七遍細切如豆不搗各三分上件除半夏外搗羅為粗末再同拌勻每服二錢水二盞同煎至一盞去滓溫服食前宣肺散錢醫產家方盛公紀傳白茯苓四兩乾薑一兩半炮五味子二兩半細辛二兩半甘草二兩半人參二兩去蘆上為細末每服二錢沸湯調下食後臨臥服新法半夏湯治痰郭醫傳大半夏四兩湯洗七次每個切作兩片用白礬一兩碎之沸湯一碗乘熱浸半夏一晝夜湯洗去礬攤干一片切作兩片再用生薑自然汁於銀盂中沒頭浸一晝夜卻於重湯中燉令薑汁幹盡慢火焙乾為細末再用生薑自然汁搜成餅子曝或焙乾炙黃勿令焦甘草二兩半炙陳橘紅草果煨取肉神麯炒縮砂仁各一兩丁香白豆蔻仁各半兩上八味為細末每服抄一錢先用生薑自然汁一匙調成膏子入少炒鹽沸湯點服治痰茯苓圓本治臂痛據指迷方中雲有人臂痛不能舉手或左右時復轉移由伏痰在內中脘停滯脾氣不流行上與氣搏四肢屬脾滯而氣不下故上行攻臂其脈沉細者是也後人謂此臂痛乃痰證也用以治痰無不效者茯苓一兩枳殼麩炒去瓤半兩半夏二兩風化朴硝一分上四味為末以生薑自然汁煮糊丸如梧桐子大每服三十丸生薑湯下累有人為痰所苦夜間兩臂常若有人抽牽兩手戰灼至於茶盞亦不能舉只以此藥治之皆隨服隨愈世間所謂痰藥者多矣至於立見神效未有若此藥之妙也破飲圓治一切停飲不散時嘔痰沫頭眩欲倒膈脘不利漳州周判官柄傳白朮一斤二兩乾薑六兩炮肉桂六兩赤茯苓七兩旋覆花八兩枳實二兩上件為末麵糊為丸如梧桐子大每服五十丸熟水下不拘時搜飲丸宇文尚書方木瓜一個切下頂作罐兒去瓤生白礬半夏曲各等分上將二味藥填在木瓜內卻用圓頂蓋定用麻縷扎縛於飯甑上炊兩次爛研以宿蒸餅為丸不拘多少但和得聚即止如梧桐子大每服三五十丸生薑湯下不計時候倍術散治酒癖痰飲此藥大有功效白朮二兩附子炮去皮臍一兩上㕮咀分三服水一大𧊝姜十片煎七分去滓空心服臟腑微動即安芎辛散治壅塞痰盛清頭目辛丑年葛丞相作正言苦此疾逾月語音不出服柴胡之類亦不能去醫者云是燥用此藥數服而愈川芎細辛防風桔梗白芷甘草羌活已上各一兩桑白皮半兩上為細末每服二錢水一盞半生薑二片薄荷三葉煎至七分不飢不飽時溫服人參紫菀湯治肺氣不調咳嗽喘急胸膈煩悶痰涎不利坐臥不安晝夜不止久不愈者以致形容瘦減力氣羸劣者並宜服之蘇司法次參傳之於滕舉二方人參一分京紫菀半兩款冬花半兩五味子一分杏仁半兩甘草一分縮砂仁一兩罌粟殼去頂瓤用薑汁製炒一兩桂枝一分上併為飲子每服四錢水一盞半姜五片烏梅兩個煎至七分去滓溫服星砂圓消痰積溫中順氣治一切風痰利胸膈壯脾胃及內傷生冷腹脅脹痛酒後痰實嘔吐服之神效鎮江邢醫方朱子新傳天南星四兩湯浸洗七遍良薑四兩縮砂仁二兩上為細末以生薑自然汁煮麵糊為圓如梧桐子大每服十五二十丸生薑湯下不計時候夏月吃生冷尤宜服雖多至七八十丸無害加香附子二兩尤妙化痰圓治停痰宿飲半夏湯洗七遍別作末人參去蘆白茯苓白朮桔梗切作小塊薑汁浸已上各一兩枳實香附子前胡甘草已上各半兩上為細末用半夏薑汁煮糊丸如梧桐子大每服三四十丸薑湯下玉塵散治痰飲出千金方桑白皮自取東向未出土者淨洗二兩桔梗三兩半夏一兩沸湯泡七遍南星一兩沸湯泡七遍上為粗末每服三錢水一盞半生薑七片煎至七分去滓溫服一方加北五味子各等分十棗湯治懸飲咳唾引脅下痛又治支飲咳煩胸中痛至百日一歲其脈弦者葉伯材處此數方大有神效芫花微炒甘遂大戟炒上等分為末水一盞半棗十個煎至八分去棗調藥壯人一錢羸人半錢平旦溫服不下者次日更加半錢下後糜粥自養若已下不可與之大青龍湯治溢飲身體疼重汗不出拘急痛麻黃去節湯七錢半桂心甘草炙各二錢半石膏雞子大杏仁四十枚炒去皮尖上為銼散每服四大錢水一盞半姜五片棗二枚煎七分去滓空腹服溫覆一服汗者勿再服復汗出多亡陽虛逆惡風煩躁不得眠也小青龍湯治溢飲支飲倚息不得臥及喘滿者麻黃去節湯芍藥細辛桂心乾薑炮甘草炙已上各三錢三字五味子二錢半夏湯洗七次三錢上為銼散每服四大錢水一盞半煎七分去滓空腹服渴者去半夏加瓜蔞根三錢三字微利去麻黃加芫花一雞子大炒入噎者去麻黃加附子一枚炮小便不利者去麻黃加茯苓半兩喘者去麻黃加杏仁三錢三字咳而上氣肺脹其脈浮心下有水氣者胸中痛引缺盆加石膏二錢半研防己桂枝湯治膈間支飲其人喘滿心下痞堅面色黧黑其脈沉緊得之數十日醫吐下之不愈木防己三兩桂心一兩人參四兩石膏六兩上四味為銼散每服四大錢水一盞半煮七分去滓溫服虛者即愈實者三日後發再服不愈宜去石膏加茯苓四兩芒硝一兩半微利則愈小承氣湯治支飲胸滿厚朴四兩薑製大黃二兩蒸枳實一兩麩炒去瓤上為銼散每服四大錢水一盞半煎七分去滓不拘時服參苓飲治胸中停痰宿水自吐出痰後心胸間虛氣滿不能食宜服此方大有神效茯苓人參白朮各三兩枳實麩炒去瓤二兩橘皮一兩半上為銼散每服四大錢水二盞姜三片煎七分去滓空腹溫服
