body:
  text: 卷之四白濁門博金散便濁之疾皆緣心腎水火不濟或因酒色遂至以甚謂之土淫蓋脾有虛熱而腎不足故土邪乾水史載之常言夏則土燥而水濁冬則土堅而水清此其理也醫者往往多峻補其疾反甚此方中和補瀉兼之服之水火既濟而土自堅其流清矣人參一兩去蘆白茯苓二兩去皮絡石二兩龍骨一兩略煅上為細末每服三錢空心臨睡米飲調下金鎖丹治男子婦人遺精鬼交小便白濁陳氏云余在連山得之黎昉渠乃祖宣和政和間御醫甚秘此方力扣而得之茯神二錢遠志三錢去心五色龍骨三錢煅紅牡蠣四錢左顧者炒赤黃堅白茯苓二錢上為末酒煮糊為圓如桐子大鹽湯溫酒下三十或四十丸空心食前服補氣圓治白濁小便多陳氏云今橫守徐叔虞服此有效錄以相授余頃常服之有益半夏四兩揀圓正大者切作兩片石薜荔枝葉四兩斑蝥二十八個糯米一升遠志肉二兩白茯苓二兩去黑皮淨石菖蒲去毛淨秤二兩同制了半夏一處為末上先以半夏同荔葉斑蝥糯米四味同炒慢火不住手攪候半夏微黃即取上以炭五斤掘地作小坑燒令通紅以米醋一升旋旋沃之候醋盡納半夏與諸藥於坑內以桫木板覆其上鹽泥護蓋一伏時取出去余藥只用半夏入遠志茯苓菖蒲醋糊為圓梧桐子大空心冷酒或鹽酒下三十粒至五十粒圓子用木豬苓末拌和炒圓子干同入罐收之心腎圓治水火不既濟恍惚多忘心忪盜汗夜夢驚恐小便數而白濁精滑夢遺目暗耳鳴悲憂不樂腰膝緩弱四肢痠疼常服養心氣補氣血生津液進飲食安神定志張茂之傳此四方用之累有神效鹿茸一兩燎去毛酒塗炙附子炮去皮臍一兩牛膝去苗酒浸二兩熟地黃洗再蒸二兩當歸去蘆一兩酒浸菟絲子酒浸蒸碾成餅三兩遠志去苗甘草水煮捶去骨一兩蓯蓉二兩酒浸五味子去枝山藥炒龍骨略煅人參白茯神黃耆炙已上各一兩上為細末用浸藥酒煮薄麵糊為圓如桐子大每服五七十圓棗湯送下空心食益母圓治肺虛膽寒氣弱不得睡心腎不交精少臨事不興故子令母虛水不生木木氣短不能生火所以不交非不攝也此常服滋養榮衛抑陰壯陽治便濁耳作蟬聲腰疼腿膝無力婦人諸疾蓯蓉酒浸酸棗仁湯泡去皮杜仲去皮薑汁製炒陽起石火略煅研如粉破故紙炒白茯苓已上各一兩人參半兩蔥白焙乾秤一兩澤瀉半兩切成塊再蒸羊石子一對切作片酒浸焙乾上為細末酒煮薄麵糊為圓如桐子大每服五七十圓鹽酒鹽湯或麝香酒送下食前服蠟苓圓治白濁補虛潤腸止渴治肺損吐血有人耳暴聾服此藥卻間服局方安腎丸而痊黃蠟四兩好雪白茯苓去黑皮四兩上將茯苓為末熔蠟和藥圓如彈子大一圓半飢半飽細嚼治婦人血海久冷白帶白濁白淫身常濕小便如米泔加木豬苓去黑皮切片四兩用水同煮茯苓卻去木豬苓只用茯苓如前法為丸服千里笈圓治真氣不足脅腹虛鳴腰膝無力氣促心忪小便滑數稟受怯弱尤宜常服鄉村道中千里笈乃舊草履也上不以多少卻於村道中置於小遺缸內遇晚以棒杖攪動四十九日將取出於日曬令草鞋干燒灰將灰淋水以鍋如常煎候水將盡卻於銀器煎其色干已成物看多少蓋用千里笈乃荷重之人取其湧泉一穴之氣成藥將藥研細用雪白茯苓為細末煮糊圓如桐子大每服三五十丸米飲或人參湯下食前茯苓圓治心腎氣虛神志不守白濁遺泄小便淋瀝或不禁張真君方赤茯苓白茯苓各等分上為末以新汲水挼澄去紅沫控干別取地黃汁同與好酒銀石器內熬成膏搜和為丸如彈子大空心鹽酒嚼下常服輕身延年秘精圓治元氣不固遺精夢泄華宮使方大附子炮裂去皮臍龍骨煅通赤牛膝酒浸一宿焙肉蓯蓉酒浸一宿焙巴戟去心已上各一兩上為末煉蜜為丸如梧桐子大空心溫酒鹽湯任下三二十粒甚者日午再服小便如米泔者不過十服清心圓治夢泄因酒多積熱所致者奇效大智禪師方黃檗片甘草等分上生為末入腦子煉蜜為丸如梧桐子大空心臨臥溫熟水吞下二十圓麥門冬飲尤佳礬附圓治白濁漏精如米泔色此方絕妙大附子一隻端正重七八錢者炮裂去皮臍絳礬半兩煅存性上為末水煮細麵糊為丸如綠豆大每十圓空心溫茶清下一十丸至十五二十丸忌生冷毒物大山蕷圓治諸虛百損五勞七傷肢體沉重骨節痠疼心中煩悸唇口乾燥面體少色情思不樂咳嗽喘乏傷血傷氣夜多異夢盜汗失精白濁腰背強痛臍腹弦急嗜臥少起善驚多忘飲食減少肌肉瘦瘁又治風虛頭目眩暈心神不寧及病後氣不復常漸成勞損久服補不足愈風氣百病葉伯材用此二方累效山蕷七兩半當歸桂心神麯炒熟地黃大豆卷各二兩半甘草人參一兩七錢川芎芍藥白朮麥門冬去心杏仁麩炒去皮各一兩半柴胡白茯苓桔梗各一兩一分阿膠麩炒一兩七錢半乾薑炮三分白蘞半兩防風去叉一兩半棗一百個炊去皮核上為末蜜丸與棗肉同和丸如彈子大每服一圓溫酒米湯任嚼下加琥珀一兩遠志去心炒二兩茯苓二兩半即是養心丹虛勞遺泄濁甚加龍骨二兩大神圓治元臟虛憊血氣不足白濁遺泄自汗自利口苦舌乾四肢羸瘦婦人諸虛皆主之木香炮附子炮去皮臍茴香炒蓯蓉酒浸川椒炒去汗各十兩桃仁炒去皮尖胡蘆巴牛膝酒浸巴戟去心五味子黃耆白蒺藜炒去刺澤瀉各五兩羌活檳榔天麻川芎桂心各二兩上為末蜜丸梧子大鹽湯酒空腹任下三五十丸草還丹大治虛勞白濁乃翊聖真君降授與張真人方服之百日百病除二百日精髓滿視聽倍常神聰氣爽瘟疫不侵服三百日步驟輕健鬢須如漆返老還童久服延年益壽耐寒暑能雙修德行可登地仙補骨脂熟地黃遠志地骨皮牛膝石菖蒲上等分末酒糊為丸梧子大每三五十丸空心日午溫酒鹽湯下熟水亦可摩腰膏補下元虛敗白濁若摩一丸腰下如火至二丸血脈舒暢三丸顏色悅澤十丸骨健身輕氣全精足骨髓堅充至百丸其功就可用五百童女之精日月滿足可以昇天長生不死不為過當故知道術難究難測孰謂藥力之功能如是耶蜀士駱仲實進此方賜號沖虛先生母丁香木香硃砂藿香附子乾薑沉香桂生硫黃白礬枯吳茱萸雄黃杏仁陳皮已上各一兩麝香一分輕粉一分上除麝香輕粉搗為末再入二味研勻蜜丸小雞子大每用老生薑汁煎滾傾在盞中將一丸浸汁中良久化破研之為汁勻於淨密室中令人沾藥於腰上摩之藥盡為度果肚系之逡巡腰上如火療男子陽道衰傷敗虛弱五勞七傷腰背疼痛頭白疝氣下墜面色萎黃水臟久冷耳聾眼暗及腸風澼疾但是諸虛之疾悉能治療兼治子宮久冷不受胎頭髮疏薄赤白帶下面生𪒟皯風勞血氣產後諸疾摩之即得神效神仙之法玄之至玄千萬寶惜勿非人傳既濟丹調陰陽正氣血治一切虛憊白濁乃京師氣主丹何太丞方陳皮青皮去白焙各四兩五靈脂去沙石四兩硝石硫黃火上制砂各二兩上為末糊丸梧桐子大每空心米飲下二十丸神仙打老圓此藥性溫無毒上治百病下至嬰兒光潤皮膚此係宣徽收南蠻到鍾南山路邊見村莊有一村婦人年方二八持杖責一老兒年約百歲宣徽駐車令問何故婦人遂前至車前覆云此老兒是妾長男宣徽怪此下車問其仔細妾云適來責此長男為家中自有此神藥累訓令服不肯服至令老邁鬚髮如霜腰曲頭低故責之宣徽聞之懇求數服常服延年益壽顏貌嬰兒氣力倍常齒落再生發白再黑補接下元生乾地黃熟乾地黃各五兩川椒十兩不去核牛膝五兩酒浸了為末大黑豆一升生用乾山藥五兩雌雄何首烏各十兩雌者白雄者赤雄者不碾肉蓯蓉五兩枸杞五兩藁本十兩洗上將雌何首烏為末用水甑內旦辰蒸日入曬夜間露如此九蒸九曬九露數足焙焦為末酒糊丸梧子大空心溫酒鹽湯下忌蘿蔔助壽丹一名御愛丹一名四妙丹半夏木豬苓各二兩同炒黃色去半夏桑螵蛸一分炒附子一兩炮切入荔石草炒去草鹿茸一兩去毛茴香半兩斑蝥十個同炒去斑蝥陽起石半兩煅山茱萸半兩龍齒一分煅遠志去心上為末蜜丸梧子大吞下任意秘真丹治白淫小便頻數精氣不固及有遺瀝或夢寐陰人通泄素問云思想無窮所願不得意淫於外入房大甚筋絕發為筋痿及為白淫隨溲而下故為勞弱張氏秘傳方羊脛炭三兩火燒通紅窨殺金銀鋪用者最妙硃砂一兩熟者厚朴三兩淨去皮用生薑三兩制炒上為細末煮薄麵糊為丸如桐子大每服三五十丸空心米飲湯送下金櫻子煎補腎秘精小遺泄去白濁牢關鍵神妙沈存中雲金櫻子當半黃時採干末用之取其性溫而澀金櫻子一升捶碎入好酒二升銀器內熬之候酒干至一升以下去滓再熬成膏桑白皮一分炒雞頭粉半兩夏採日乾桑螵蛸一分酒炙白龍骨半兩燒赤為末蓮花須二分上為末入前膏子搜為丸如梧子大空心鹽湯溫酒下三丸不就即為酒麵糊為丸卓劍丹乃呂真人方詩一烏二木三茴香久服令人壽命長但是食中無所忌早辰三七用鹽湯神仙不老圓歌不老仙方功效殊駐顏全不費工夫人參牛膝川巴戟蜀地當歸杜仲俱一味地黃生熟用菟絲柏子石菖蒲更添枸杞皮兼子細末蜜丸桐子如早午臨眠三四服鹽湯溫酒任君需忌餐三白並諸血能使須烏髮亦烏各一兩依常事時
