body:
  text: 卷之六中暑門巢氏論中暑證候傷暑乃夏至前後各三十日有奇少陽相火用事之時也炎熱大行鑠石流金草萎河涸人或傷之則身熱惡寒頭痛狀如傷寒或往來寒熱如瘧煩躁渴甚眩暈嘔吐背寒面垢泄瀉昏悶不清其脈陰陽俱虛緩而微弱皆由傷暑之所致也冰黃散治伏熱煩渴引飲嘔逆噁心肢體倦怠陳氏云四明魏丞相家常施此藥余每登長途必飲從者少有中暍間有悶絕一服即蘇頭面一斤生薑一十兩洗淨和皮切作片子和麵盫一宿焙乾甘草四兩四錢上為細末每服二錢新汲水調下勝如大順五苓大黃龍圓治中暑身熱頭疼狀如脾寒或半寒半熱或寒熱往來或煩渴嘔瀉昏悶不省或不能飲食此方曾合治暑甚妙嘗有中暍已昏欲死者灌之立蘇李子英傳舶上硫黃硝石各一兩白礬半兩雄黃半兩滑石半兩白麵四兩飛羅者上五味研為極細末入面在內滴水為圓如梧桐子大每服十丸至二三十丸新汲水下小兒黍米大如無硝石以盆消代之小瓢圓治暑毒解煩渴中書何舍人希深方烏梅肉四兩甘草二兩青鹽二兩乾木瓜一兩檀香一兩白茯苓一兩麝香二錢半蜜煉過隨藥加減使上除麝香別研余併為細末煉蜜為丸每兩作三十丸每服一丸含化或新汲水溫水嚼下不計時候烏金散治中暑不拘老少皆可服朱子新傳云吳內翰備急方用皂角五斤去皮弦炙焦黑存性甘草五兩皂角不蚛者甘草上以皂角不計多少刮去黑皮燒煙欲盡用盆合於地上周迴用土遮縫勿令透煙每一兩皂角灰用甘草末六錢每服一錢新汲水調下如氣虛人用溫漿水調下昏迷不省者不過兩服加減小柴胡湯治伏暑煩躁發渴極妙若躁悶煎放水沉冷服柴胡半斤去蘆黃芩三兩人參三兩甘草三兩炒半夏三兩湯泡上㕮咀五錢水二盞生薑五大片棗子一個加瓜蔞實一個若渴去半夏人參加瓜蔞赤茯苓各一兩腹痛去黃芩加赤芍藥三兩脅下痞鞕去棗加牡蠣心下悸小便不利去黃芩加赤茯苓四兩若不渴外有微熱去人參加桂三兩取汗愈若嗽加五味子三兩乾薑二兩枇杷葉湯治伏暑暴瀉兼去暑毒趙從簡親服此方立效枇杷葉去毛三錢罌粟殼去瓤蒂三錢生薑三錢濕秤上三味細銼用水二大盞蜜一合酒半合粟米百餘粒同煎至一盞以下溫服一服即愈十味香薷飲治脾胃不和乘冒暑氣心腹膨悶飲食無味嘔噦噁心五心潮熱力乏體倦並宜服之常服消暑健脾進飲食傅公實方香薷葉一兩人參去蘆白朮白茯苓陳皮溫湯浸少時去白黃耆去蘆厚朴去粗皮銼碎生薑自然汁拌和炒至黑色乾木瓜白扁豆炒去殼甘草炙半兩上為粗末每服三錢水一盞棗一枚同煎至七分去滓不拘時候服冷香湯治夏秋暑濕恣食生冷遂成霍亂陰陽相干臍腹刺痛脅肋脹滿煩躁引飲無度王元禮傳附子二兩炮裂去皮臍良薑二兩檀香二兩丁香二錢川薑三分炮甘草二兩炒令赤草豆蔻五個去皮麵裹煨上為細末每用藥末五錢水二升煎十數沸貯瓶內沉井底作熟水服大能消暑止渴服之永無霍亂大蒜水治暑暍逡巡悶絕不救者石林避暑錄云親治一御馬之僕立蘇且云沈存中嘗著其說道上熱土大蒜上略等多少爛研冷水和去滓腳飲之即瘥此方在徐州沛縣城門上板書揭之不知何人所施之地榆散治中暑昏迷不省人事欲死者並治血痢華宮使傳此方妙不可言地榆赤芍藥黃連去須青皮去白上等分為細末每服三錢漿水調下如無只以新汲水調亦得血痢水一盞煎七分去滓溫服五苓散治傷暑煩躁引飲發黃渴欲飲水水入口即吐名曰水逆若吐出涎沫頭痛煩躁五苓散內增吳茱萸人參木豬苓去黑皮澤瀉銼成塊再蒸赤茯苓去黑皮筋膜白朮用有蘆者各一兩半肉桂去皮半兩上為㕮咀三錢水一大盞半燈心五莖同煎八分去滓熱服發黃加茵陳同煎小便不利加去心麥門冬煩躁睡臥不安加硃砂躁渴熱極如狂加大黃橘皮湯治中暑痰逆惡寒陳皮去白二兩甘草炙半兩人參半兩上㕮咀每服五錢水二盞刮竹茹一塊如彈子大生薑五片棗子一個同煎八分去滓熱服如不惡寒只服竹葉湯香薷圓治大人小兒傷暑伏熱躁渴瞀悶頭目昏眩胸膈煩滿嘔噦噁心口苦舌乾肢體困倦不思飲食或發霍亂吐利轉筋並宜服之廬州知錄周汝功中暑暈悶煩渴服此方立效乾木瓜紫蘇去粗梗莖葉並用香薷去土已上各一兩藿香葉去土甘草炙銼檀香銼白茯神去木丁香已上各半兩上為細末煉蜜和圓每一兩作三十圓每服一圓至二圓細嚼溫湯下或新汲水化下亦得小兒服半圓不計時候枇杷葉散治冒暑伏熱引飲過多脾胃傷冷飲食不化胸膈痞悶嘔噦噁心頭目昏眩口乾煩渴肢體困倦全不思食或陰陽不和致成霍亂吐利轉筋煩躁引飲劉駐泊汝翼親用此方無不效驗香薷三分厚朴去粗皮薑汁炙四兩甘草炙一兩麥門冬湯浸去心焙乾乾木瓜白茅根已上各一兩枇杷葉去毛令盡淨炙陳橘皮湯浸去瓤丁香已上各半兩上件藥搗羅為末每服二錢水一盞入生薑二片煎至七分去滓溫服溫水調下亦得如煩躁用新汲水調下不計時候小兒三歲以下可服半錢更量大小加減穀神散治夏月暴瀉趙從簡方楮實青者蒸一次曬乾用一斤陳倉米一升乾薑甘草一兩炙上為末飯飲調下大順散治冒暑伏熱引飲過多脾胃受濕水穀不分清濁相干陰陽氣逆霍亂嘔吐臟腑不調劉子壽上舍伏暑泄瀉水穀不分服此甚驗甘草銼長一寸許三十斤乾薑杏仁去皮尖肉桂去粗皮已上各四斤上先將草用白砂炒及八分黃熟次入乾薑同炒令姜裂次入杏仁又同炒候杏仁不作聲為度用篩隔淨後入桂一處搗羅為散每服二錢水一中盞煎至七分去滓溫服如煩躁新汲水調不計時候以沸湯點服亦得異功敵暑圓專治暑毒如水瀉米飲下即愈趙教授得之泉州沈醫方用之甚效黃連一斤去須洗淨倉陳米二升淘去糠秕上拌勻用鍋內如罨飯相似飯熟水乾為度曬乾碾為細末以水丸如梧桐子大每服三五十丸冷水下
