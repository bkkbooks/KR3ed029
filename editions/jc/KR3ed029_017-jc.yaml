body:
  text: 卷之十七口齒門治口齒諸疾證候夫口乃一身之都門出入榮養之要道節宣微爽病必生焉故熱則苦寒則咸宿食則酸煩躁則澀虛則淡疸則甘五味入口藏於胃脾行其精華分布津液於五臟臟氣偏勝味必偏應於口或勞鬱則口臭凝滯則生瘡不可失睡失睡則愈增齒為關門腎之榮骨之餘也腎衰則齒豁精固則齒堅又大腸支脈在牙齦主灌注於牙大腸壅則齒為之浮大腸虛則宜露挾風則攻目頭面疳䘌則齲脫為痔皆氣鬱而生諸證不同治之各有方升麻地黃散治風氣上攻牙齒疼痛齦腫連腮頰緊急王尚書宣子方升麻生乾地黃地骨皮青鹽川芎各半兩皂角一挺燒細辛二錢半槐角子半兩燒上為細末每用少許揩擦齦上有涎吐了誤咽不妨淡豉散治牙痛曾府判茂昭說此方最驗巴豆一個去殼並膜淡豆豉一個上同研爛每用針頭許以連紙裹安痛處立止不可太多亦不可令侵齦恐能損肉赴筵散治口瘡吃物不得者五味子小嫩者一兩滑石半兩研黃檗半兩蜜塗炙紫色上為末拌勻每服半錢許乾摻瘡上良久便可以飯食俱無妨礙甚奇升麻散治風蚛牙疼齒根動搖出楊氏方升麻細辛去葉土蓽茇胡椒川芎川椒甘松洗去土香白芷上件各等分為細末每用少許擦患處良久漱去若甚者用沸湯調藥二錢乘熱盥漱涎出為度甚妙如神散治牙痛不問年遠日近並皆療之出胡氏方露蜂房末椒末鹽上三味每用各抄一錢匕用水一盞半煎至八分許乘熱漱冷即吐出一服即效神妙不可入喉中蜂房散治牙疼風腫永嘉朱郎中方露蜂房上不拘多少次用好醋煎含立效不得咽入喉中乳香膏治蚛牙痛錢參政方明白礬枯了滴乳香各等分上二味為細末熔蠟量多少和成膏旋圓看蚛牙孔子大小填之其痛立止神效一池散治口齒諸疾華陰細辛須色白而辛者去苗防風去蘆並敘服者當歸洗去土川芎藁本去土地骨皮洗去白芷石膏煅研螺青研青鹽研上十一味等分細辛倍用曬乾為細末早晚食後常揩牙若病甚用藥末三大錢水一大盞姜錢五片雄黑豆五十粒煎沸通口漱甚妙須是日曬乾用火焙則走氣也細辛散治五種牙疼不蛀破處者昔有一士人苦於牙痛諸藥遍療不止忽有一道人授以此方用之即止後累用救人無不取效細辛乾薑川烏草烏蓽茇吳茱萸各半兩菵草一兩木律一分上為細末先用鹽湯蘸濕手點藥揩牙候良久藥力敗用溫水灌漱齒痛即止巴子膏治風蛀牙如蟲蛀破者張主簿赴官於廣州懷集縣甚被此疾所苦吳縣丞以此方教之即愈巴豆三粒紙裹壓去油乳香一錢上火上熔乳香成汁用巴豆不住攪和候冷取出圓成膏子酌量牙齒竅穴大小將燈上炙旋圓納於穴中痛即止綠雲膏治口瘡臭氣瘀爛久而不瘥黃檗半兩螺青二錢上研細臨臥置一字在舌下不妨咽津遲明瘥杏粉膏治口瘡以涼藥敷之杏仁十粒去皮尖輕粉一字上研杏仁細調勻臨臥敷瘡上少頃吐之勿咽玉池散治風蚛牙疼腫癢動搖牙齦潰爛宣露出血口氣等疾地骨皮香白芷川升麻防風細辛川芎槐花當歸藁本甘草上等分為末每用一字許揩牙或大段痛即取二錢水一盞半黑豆半合生薑三片煎至一盞稍溫漱候冷吐之殊效或用金沸草散熏漱亦佳神仙齒藥方西嶽蓮花峰神傳豬牙皂角及生薑西國升麻熟地黃木律旱蓮槐角子細辛荷葉要相當荷葉剪心用青鹽等分同燒煅研細將來使最良揩齒牢牙髭鬢黑誰知世上有仙方二聖散治口瘡塗足心嘉禾老張太醫傳去屢試得效其理難曉大川烏吳茱萸上各半兩為細末每用藥末五錢匕面五錢以醋調塗兩腳心油單隔片帛系定臨臥用次日便見效蒲黃散治舌腫有一士人沿汴東歸夜泊村步其妻撼之問何事不答又撼之妻驚起視之舌腫滿口不能出聲急訪醫得一叟負囊而至用藥摻比曉復舊問之乃蒲黃也蒲黃上為細末摻之聚寶散治一切風蛀牙疼不止者醫僧慈雲大師方余少年用之見效露蜂房五兩荊芥三兩上為細末每用五錢烏梅三個水二盞煎一盞半乘熱呷漱冷吐出耳鼻門治耳諸病證候腎雖寄竅於耳當知耳為聽會主納五音外則宮商角徵羽內則唏噓呵吹呬內關五臟外合六淫故風寒暑濕使人聾聵耳鳴憂思喜怒多生內塞其如勞逸不言喻復有出血生膿聤耳底耳或耵聹上直庚切下乃項切不出飛走投入諸證既殊治各有法菖蒲散治耳聾西外知宗趙士珩賓老傳授此方累用有效石菖蒲十兩一握九節者蒼朮五兩事治淨上二味銼成塊子置於缸內用米泔浸七日取出去蒼朮不用只用菖蒲於甑上蒸三兩時取出焙乾搗羅為細末每服二錢糯米飲調下日進三服或將蒸熟者作指面大塊子食後置口中時時嚼動咽津亦可補腎圓治腎虛耳聾或勞頓傷氣中風虛損腎氣升而不降致耳內虛鳴山茱萸乾薑炮巴戟芍藥澤瀉桂心菟絲子酒浸黃耆遠志去心石斛當歸乾地黃蛇床子細辛牡丹皮人參甘草蓯蓉酒浸附子炮以上各二兩菖蒲一兩防風一兩半茯苓半兩羊腎上為末以羊腎研細酒煮麵糊為圓如梧子大食前鹽酒任下三十丸至五十丸紅綿散治聤耳透明白礬火飛過頭色坯子上等分研細先用綿杖子纏去耳中膿及黃水令盡別用綿杖子引藥或用鵝毛管子輕吹入耳內入少麝香尤佳雄黃丹治蚰蜒入耳雄黃綠礬白礬半夏各一分上件藥同搗為末以醋調一字灌入耳兼治蜈蚣諸蟲入耳菖蒲圓治耳卒痛及聾塞不聞聲菖蒲附子炮去皮臍各等分上為末以醋圓如杏仁大綿裹內耳中日二易之蠟彈圓治耳虛聾白茯苓二兩山藥炒三兩杏仁去皮尖炒一兩黃蠟二兩上以前三味為末研勻熔蠟為丸如彈子大鹽湯嚼下有人止以黃蠟細切嚼點好建茶送下亦效麝香散治聤耳底耳耳內膿出桑螵蛸一個慢火炙及抲分熟存性麝香一字別研上為末研令勻每用半字摻耳內如有膿先用綿拈次以藥摻之蟬殼散治聤耳蟬殼半兩事治淨火燒存性麝香抄半錢上同研如塵用綿先展耳內膿令淨次入藥拄耳門不得動追出惡物即愈治耳痛杏仁炒焦黑研成膏以綿裹塞耳中吳內翰親用之效諸百蟲入耳用麻油灌之即效諸耳中出血以龍骨末吹入即止治鼻中諸疾證候鼻大衄者由氣虛熱故也肝藏血肺主氣而開竅於鼻血之與氣相隨而行循於經絡榮於腑臟若勞傷過度腑臟生熱熱乘血氣血性得熱則流散妄行從鼻出者謂之衄其云鼻大衄者是因鼻衄而口耳鼻皆出血故云鼻大衄也鼻齆者肺主氣其經手太陰之脈也其氣通鼻若肺臟調和則鼻氣通利而知臭香若風冷傷於臟腑而邪氣乘於太陰之經其氣蘊積於鼻者則津液壅塞鼻氣不宣調故不知香臭而為齆也鼻生瘡者鼻是肺之候肺氣通於鼻其臟有熱氣衝於鼻故生瘡也辛夷膏治腦戶受寒濃涕結聚關竅壅閉楊氏家藏此方治鼻塞無不取效辛夷川芎香白芷菵草通草已上各一錢當歸洗焙細辛去粗土肉桂去粗皮已上各半兩上件細銼以酒浸一宿酒不須多次日以豬羊腦及豬脂少許煎成油入前件酒浸藥同煎令變色卻用綿濾去滓盛瓷器內每一粒米許滴入鼻內須要仰臥其藥不流出也瓜丁散治齆鼻有息肉不聞香臭富次律曾患此息肉已垂出鼻外用此藥敷之即化為黃水點滴至盡不三四日遂愈後不復作瓜丁即瓜蒂也細辛上二味等分末之以綿裹如豆許塞鼻中須臾即通鼻中息肉俗謂之鼻痔治此疾方極多但此取效耳烏尖散治肺風面赤鼻赤華宮使方草烏尖七個大風油五十文真麝香五十文上以草烏尖為末入麝香研勻次同大風油瓷合子盛於火上調勻先以生薑擦患處次用藥擦之日三兩次無不效又方兼服之即除根本同何首烏防風黑豆去皮藁本荊芥穗地骨皮洗淨各一兩桑白皮天仙藤苦參赤土各半兩上為細末煉蜜為丸如梧桐子大每服三四十丸食後茶清送下
