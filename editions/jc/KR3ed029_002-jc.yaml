body:
  text: 卷之二心氣門引神歸舍丹治心氣亦治心風盛覺民傳王宣子尚書方大天南星厚去皮取心秤一兩生用硃砂一兩水飛附子一個重七錢以上者炮去皮臍上為細末用豬心血為丸如梧桐子大如不稠黏入麵糊少許煎忘憂草根下子午之交各一服每服十五丸神效硃砂散治心氣桂真官方呂少張丁家難積憂之後遂成狂易之疾服此一劑即定繼以蕤仁之類心氣藥七日而安廖碩夫知府云辰砂半兩麝香一錢上為細末以好酒二升銀石或沙器內慢火煮至半升許入麝香更煎數沸取出隨意飲之以盡為度心神既定卻服補心氣藥即愈養氣鎮心丹長樂陸慶長寺丞診脈投劑與史載之許叔微為伯仲其家傳方書一編載此丹云人以為補下元而使氣實杜壬謂不然先補心氣而五臟實心氣正而元氣自實也若更以藥補下元尤妙此方極養心氣若止補元氣耗心氣非養氣之理也中年以後宜服之此說極有理雖名醫亦少知之遠志二兩去心人參一兩去蘆頭辰砂一錢別研天門冬一兩去心石菖蒲一兩去須生龍腦一錢別研白茯苓一兩去皮上為細末煉蜜圓如梧桐子大用硃砂龍腦為衣每服二三十圓煎人參湯食後臨臥服茯神散宋明遠教授母七十四歲因戎馬驚疾如上證服此三方得力予族弟婦緣兵火失心制此方與之服即愈親識多傳去服之皆驗出許氏方茯神熟乾地黃白芍藥川芎當歸桔梗白茯苓遠志人參已上各等分上為細末每服二錢水一盞燈芯棗同煎至七分不拘時候寧志膏人參一兩酸棗仁一兩辰砂半兩乳香一分上為細末煉蜜和杵圓如彈子大每服一粒薄荷湯化下遠志圓治因驚語言顛錯不能服溫藥遠志南星白附子白茯苓人參酸棗仁各半兩金箔五片硃砂半兩入麝少許同研上為細末煉蜜圓如梧子大朱為衣每服三十丸薄荷湯下食後臨臥服乳硃砂丸大治一切心氣盛覺民傳王宣子尚書方硃砂一兩有牆壁透明者方可用上用石韋葉裹之以布線縛定用人乳汁一小甌入銀盂內以物覆之重湯內煮候乳汁干研細圓如梧桐子大空心溫酒下六丸石韋葉當以新布拭去毛方可用人參當歸圓治心氣虛損崑山神濟大師方獻張魏公丞相韓子常知府閣中服之有效平江醫者丁御干為葛樞密雲此藥本治心氣怔忡而自汗者不過二服即愈蓋奇藥也人參半兩細切當歸半兩上去蘆下去細者取中段切豬腰子一隻上以腰子用水兩碗煮至一盞半將腰子細切入二藥同煎至八分吃腰子以汁送下有吃不盡腰子同上二味藥滓焙乾為細末山藥糊丸如梧桐子大每服三五十丸此藥多服為佳小補心丸紹興府慧應都正方錢文子傳天門冬麥門冬乾山藥各一片熟乾地黃五味子石菖蒲各二十兩人參去蘆茯神去木茯苓各十兩遠志去心官桂去皮各六兩地骨皮酸棗仁龍齒各四兩柏子仁三兩上為細末煉蜜為丸如梧桐子大硃砂麝香為衣每三十丸溫酒鹽湯下辰砂遠志丸安神鎮心治驚悸消風痰止頭眩此二方醫官都君予常用以療心疾良驗石菖蒲遠志人參茯神川芎山蕷鐵粉麥門冬天麻半夏曲南星銼骰子大麩炒黃白附子生各一兩細辛辰砂各半兩上為細末生薑五兩取汁入水煮糊丸如綠豆大別以朱為衣干之每服三五十粒夜臥生薑湯下小兒減少服茯苓圓辰砂石菖蒲人參遠志茯神白茯苓真鐵粉半夏曲南星牛膽制各等分上為末生薑四兩取汁和水煮糊圓如梧子大別用朱為衣干之每服十粒加至三十粒夜臥生薑湯下狗肝散治失心張德明傳秦太師以治徐履之疾黃丹硝石各二兩上煅硝石為汁以皂角遂小段子投其中直候無火方止去皂角以黃狗肝一具用竹刀切作片子摻藥末數錢於中同煮食之寧志丸好辰砂一兩將熟絹一小片包裹以線扎定豶豬心一枚以竹刀子切破不可犯鐵用紙拭去血入硃砂包子在豬心內卻用麻線縛合豬心又以甜筍殼再裹了麻皮扎縛無灰酒二升入砂罐子或銀器內煮令酒盡為度去線並筍殼取辰砂別研將豬心以竹刀細切砂盆內研令爛卻入後藥末六件並辰砂棗肉為丸留少辰砂為衣藥末須隔日先碾下棗肉於煮豬心日絕早煮熟剝去皮核取肉四兩用此方濮十太尉之子六將使傳乃侄嘗患心風服此一料病減十之八人參半兩白茯苓半兩當歸半兩去蘆去土酸棗仁半兩用酸棗仁五兩湯浸去皮可剝半兩淨仁炒赤香熟為度石菖蒲半兩乳香半兩別研上同和丸如梧桐子大以留下硃砂為衣每服五十丸人參湯下不拘時候朱雀丸治心神不定恍惚不樂火不下降時有振跳消陰養火全心氣蘇韜光傳此方極驗茯神二兩去皮沉香半兩併為細末上煉蜜丸如小豆大每服三十丸食後人參湯下軟硃砂法補心氣輕健手足治廢忘趙從簡方塊有牆壁辰砂一兩研如粉上以好清麻油四兩白及二兩木通一兩於油內煎令焦黃濾去放令油如人體溫於瓷器內和辰砂末令如糍糕以皂角漿水洗去油卻用新汲水洗去皂角漿於瓷盒內以新水養之每日早晨換水空心就舌上圓七粒如桐子大若用一匙頭許以溫酒化下亦得有人病心虛每見垂掛動搖之物輒惡之服此遂愈密陀僧散治驚氣入心絡喑不能語出夷堅己志十五卷章倅事昔有人為狼及惡蛇所驚皆以此藥療而愈密陀僧研極細如粉上以茶調服一錢匕一服即愈田師中太尉秘方亦治暗風密陀僧大如兩手者一塊以鐵線密纏留鐵線一條垂空掛之四畔以火煅令通紅酒一升醋一升合和淬藥取酒醋盡為度出火毒一宿研令極細每服一錢麝香酒調下補心神效丸崔參政家方黃耆銼了蜜湯少許拌勻焙乾茯神去木人參去蘆遠志去心各四兩熟乾地黃三兩柏子仁別研五味子各二兩硃砂一分別研酸棗仁湯泡七遍去殼炒熟別研上為細末煉蜜圓如梧桐子大每服五十圓米飲或酒任下盜汗不止麥麩湯下亂夢失精人參龍骨湯下卒暴心痛乳香湯下虛煩發熱麥門冬湯下吐血人參湯下大便下血當歸地榆湯下小便出血茯苓車前子湯下中風不語薄荷生薑湯下風癇涎潮防風湯下人參散補心氣史載之處此方治心疾無不效驗人參七錢茯神山藥各半兩白芍藥熟乾地黃黃耆各一分防風一錢半甘草一錢炙官桂一分半南星炮二錢上為細末每服二錢水一盞生薑棗少許同煎至七分服棗仁圓治心氣不足恍惚健忘睡臥不寧夢寐危奩心忪如人捕張承節累用有效酸棗仁炒去皮黑豆炒去皮上等分為細末煉蜜為丸如梧桐子大硃砂少許為衣每服三十圓日午臨臥熟水或人參湯送下一醉膏治心恙武昌施倅云傳此方於喻子才郎中家已療數人之疾矣無灰煮酒二碗真麻油四兩上和勻用楊柳枝二十條逐條攪一二百下換遍直候油酒相乳入如膏煎至七分碗狂者強灌之令熟睡或吐或不吐覺來即醒麝香圓治心風張德明傳其閣中失心數年服此藥而愈疾再作服第二方遂安水銀半兩麝香一錢建茶好者研一分半夏一兩以生薑汁煮三五十沸取出作塊子切更煮令熟焙乾搗為細末生蔢苛一大握和水銀如泥研細上件藥都入在蔢苛泥內更研千百轉圓如芥子大金銀湯下十五丸臨睡時服三日再進一服琥珀圓硃砂一分另研乳香一分別研酸棗仁溫酒浸半日去殼了紙上炒令香熟一分以一兩半浸去殼只得一分仁人參半兩遠志酒浸半日新布裹捶去心焙乾以一兩隻得半兩肉石菖蒲細而節密者白茯苓茯神琥珀各半兩上為細末煉蜜為丸如梧桐子大每服二十丸食後酒下日進二服如不能飲酒以棗湯下此藥可常服震靈丹治氣虛心疾蓋心藥多性寒服之令人腹痛飲食減少此藥治怔忡恍惚健忘睡臥不安益心進食補虛去冷張承節傳授此方用之無不效驗以局方震靈丹不拘多少重研細用燈芯麝香少許煮北棗去核皮研細搜圓如桐子大每服三十圓食空棗湯或人參湯下此丹不犯金石飛走有性之藥不僭不燥奪造化沖和之功大治男子真元衰憊五勞七傷等疾禹餘糧石火煅醋淬不計遍次以手捻得碎為度赤石脂丁頭赭石如禹餘糧石修事紫石英已上各四兩上件四味並作小塊入坩堝內鹽泥固濟候乾用炭一十斤煅過紅火盡為度入地坑埋出火毒二宿滴乳香二兩別研令細沒藥二兩去沙石研五靈脂二兩去沙石研硃砂一兩水飛過上件前後共八味併為細末以糯米粉煮糊為圓如小雞頭大曬乾出光每一粒空心溫酒下冷水亦得常服鎮心神駐顏色溫脾腎理腰膝除屍注蠱毒闢鬼魅邪厲久服輕身漸入仙道忌豬羊血滯氣等物婦人醋湯下孕婦不可服極有神效不可盡述順經散治因驚之後心氣不行小府淋瀝日及三十餘次漸覺黃瘦宜服此劑主之高逢辰制干傳予表侄十餘歲時嘗遊慧山歸已昏暮遇一巨人醉臥寺門驚悸得疾自是之後一日便溺五六十度醫治數月不能效遂以病證叩高逢辰即授此方服藥未幾日減一日初則三二十度最後十數度凡服兩料而愈韭子一兩湯浸退取白仁干益智半兩取仁鹽炒過琥珀半兩令研石韋一錢去毛土白茯苓三分狗脊爛去毛淨半兩石燕子火煅醋炒出火毒令研極細半兩上七味為末和勻每服一錢用韭菜白煎湯調下空心食前各一服日午一服尤效熟乾地黃散治心氣虛憂恐恍惚心腹痛脹滿食少太平聖惠方常用累有神效熟乾地黃三分陳皮三分湯浸去白瓤焙遠志去心桂心芎藭白芍藥已上各半兩人參去蘆頭白茯苓菖蒲各一兩上件搗粗羅為散每服三錢水一中盞煎至六分去滓溫服不計時候沙參散治心實熱驚悸喜笑心神不安泄熱安心沙參去蘆頭白薇川芒硝羚羊角屑子芩已上各一兩石膏二兩半人參三分去蘆頭茯神三兩梔子仁三兩甘草半兩炙微赤銼上件搗粗羅為散每服三錢水一中盞煎至五分去滓入地黃汁一合竹瀝半合更煎一兩沸食後溫服忌炙煿熱面神效正元散治氣不接續氣虛仍專治滑泄及小便數王丞相服之神效蓬莪朮炮去鬢一兩銼金鈴子一兩去核焙焦上件藥搗羅為末更入硼砂一錢煉過研細都和勻每服二錢鹽湯或溫鹽酒調下空心食前服
