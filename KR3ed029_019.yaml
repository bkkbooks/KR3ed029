body:
  text: 卷之十九雜方淋浴法陳氏云先公守贛時年六十五足弱拜跪頗艱倅事鄭顯仲云其叔司業公字明仲晚年亦如是有人教以用此方逾月步履輕便先公即用之旋即見效每日一就浴如是者四年晚歲步履有力日可行數里胡猻姜十餘塊錘碎本草謂之骨碎補上約水六七斗入上藥煎至三四斗正午入浴不須脫上蓋用小木杓瓝湯澆臍腹間一千下次以衲布二片各三四重方一尺許蘸熱湯搭兩膝頭各澆一百二十杓用之月餘便見功效行步便覺輕快也斷乳畫眉膏治小兒年至四五歲當斷乳而不肯斷者山梔子三個燒存性雌黃少許生硃砂少許上三味為細末入生麻油輕粉各少許調勻候兒睡著濃抹於兩眉上醒來便不食乳一服未效再用即驗此方得於浦江石親周卿屢試屢效累扣名醫殆不能曉祛蠅子法陳氏云余居霅川暑月赴趙德言園令飰坐間余無蠅子咸切訝之渠云不獨此也因攜手往庖所亦無一蠅扣其所以初秘而不言力懇之乃笑曰小術耳臘日市豬板脂一斤或二斤以罐貯懸於廁上次年舉室絕無余嘗試用果驗此理殆不可曉去冬到此原未知蠅子之多偶不記憶今雖無及然不可不使人知因附其說於後庶幾人人知有此方家家免點汙之患是亦方便之一端也獺肝散治鬼疰者是五屍之一疰又扶諸鬼邪為害其病變動乃有三十六種至九十九種大略使人寒熱淋瀝沉沉默默不的知所苦無處不惡累年積月漸就沉滯以至於死傳與旁人乃至滅門覺如是候者急治之獺肝一具陰乾上杵為末水服方寸匕日三未知再作肘後云此方神良治食生米方男子婦人因食生熟物留滯於脾胃遂至生蟲久則好食生米否則終日不樂至於肌膚憔悴面色萎黃不思飲食以害其生益昌伶人劉清嘯家一倡曰翠花川人謂之師家年逾笄病此三月餘監惠民局趙尹能醫以此方治之兩旬而愈蒼朮不均多少米泔水浸一宿銼碎上焙乾碾為細末煮稀麵糊為圓如梧桐子大每服五十粒空心食前米飲下日三服治刀刃傷方恂留意醫學遠來相訪因說以刀刃傷時急以生薑和皮爛搗盦之止痛截血且無疤痕倉卒易辨治嵌甲疼不可忍有妨步履陳氏云表侄林震文得是方於德清陳宰余平日所收之方皆不逮此紫藤香半兩羊筒骨大者乳香半錢針挑麻油燈上燒存性古半兩錢半錢炭火燒通紅醋淬爛輕粉少許癢即多入麝香當門子上為末細絹羅過每用少許先以甘草湯洗患處用舊絹搵干然後敷藥即以燈心草塞之立瘥食豬脂法臘日空心用蒸餅卷豬脂食之一年不生瘡久服身體光滑神仙無瑕散去油汙顏色繡作衣物書畫龍骨一兩半滑石海螵蛸各三兩白善土一兩上為細末以摻汙處良久搡之便落如欲急用以紙襯熨之未盡再用之淨為度如衣物等油了多時卻用麻油塗在舊跡過些少不妨如前法用其效如神洗油墨汙蒼朮二兩黑牽牛一兩皂角三挺赤小豆一升上為細末白水丸如彈子大以滑石為衣每洗用一丸或只作末子不丸亦得久汙衣裳水洗桐油之類所汙皆洗之如新加零陵香香白芷在內亦可作洗面梳頭藥洗油膩告成觀道士傳云造墨人以洗手極淨甚妙亦可洗字杏仁去皮尖如欲洗字壓去油茶茗子即食茶子也上二味等分如肥皂法洗手如洗字以藥末安字上以熨斗略熨彈之即落煎窗油法韓御帶提刑家方甚奇麻油四兩桐油三兩定粉一錢蓖麻子一百粒上件先研定粉蓖麻子令細將麻油同打候勻熟然後入桐油再打成油使須猛日中便乾方有光彩詩曰桐三麻四不須煎百粒蓖麻細細研定粉一錢相合和太陽相射便光鮮治壁蝨方張彥亭監丞傳云甚好蒼朮一斤木鱉子雄黃各二兩半上為細末蜜丸彈子大床下燒一丸或於蚊合時當門燒之熏落如面靜盡烏髭藥趙太叔知縣傳蛤粉八兩韶粉海螵蛸黃丹各一兩膩粉半兩杏仁八個石灰礦二兩乳香一塊皂子大上各為末和勻將髭先用皂角湯洗過不可見油看白髭有得多少加減使用河水調藥如稀糊黃昏時用篦子塗在髭上將荷葉作片子蓋之以片帛包系定至三更後用溫湯洗去更將少胡桃肉拈髭上又方烏髭鬢常用揩牙藥沈丞相家方親曾見人用甚有效青鹽一兩別研杏仁二兩去皮尖乾地黃洗淨烏頭各一兩上同為粗末將瓜蔞去蒂頂並瓤入藥在內以麻線扎定用蚯蚓糞固濟厚半寸以上陰乾或有小裂縫再用糞泥合將熟炭火燒候煙出未盡一二分間用黃土覆之至冷取出去土取藥為細末每日揩牙或臨睡更用以津咽之尤妙劉郡王倒流油烏髭發神方大訶子十六個濕紙裹慢火煨熟取皮上碾羅為末用糯米清粥飲調得所塗在熨斗內麻油四兩燈心二十四條點無風處合熨斗在上四邊略通煙頻挑燈熏盡油為度放冷刀子刮下乳缽中燈上燒胡桃肉二十個存六分性杏仁八十個如胡桃燒更入百藥煎一錢同研針砂半兩醋一盞浸一宿煮盡醋入乾生薑四兩同研入諸藥末再研極細要滋潤如膏恐硬多入胡桃磁合內收如用洗髭發淨干搽上藥以手指拈勻皂紗軟帛拭之兩上如琴光色一月中可一次染之玉粉圓治啞中平江一士人如啞中狀醫者云速煮粥病人才吃藥了便索粥少頃果然氣噫索粥病既愈因問之醫者云只是氣厥因而不食脾胃愈因上用雪糕圓作桐子大以木香末為衣點勻氣散進之爾醉效散取寸白蟲陳氏云余少年曾病此服之得效上用酸石榴東向根三五錢重用水一碗半煎八分隔宿煎下來早用半精半肥肉四兩炙令病人聞之少頃食其肉次溫暖所煎藥服苦氣虛者服了覺如醉夢便就寢至申未間其蟲下甚不過兩服蟲上旬頭向上五更服若中下旬則亮效草靈散治發瘡李中父曉藥性云刀瘡藥無出於此韭菜刺薊草上於五月五日各取一斤不用根洗擇淨同搗爛如泥次入絹篩石灰不拘多少再搗令十分勻捏作餅子以瓦盆盛貯安置淨室中至六月六日曬令極干收如常用之
