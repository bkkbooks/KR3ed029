body:
  text: 卷之十一腫滿門治十水腫滿證候十腫證候以短氣不得臥為心水兩脅疼痛為肝水大便鴨溏為肺水四肢苦重為脾水腰痛足冷為腎水口苦咽乾為膽水乍虛乍實為大腸水腹急肢瘦為膀胱水小便秘澀為胃水小腹急滿為小腸水各隨其經絡分其內外審其脈證而甄別之然此十水謂之正水外有風水皮水石水黃汗以義考之風合歸肝皮合歸肺黃汗歸脾石合歸腎雖名理不逾奈證候少異古方備列不可不辨但風水脈浮必惡風皮水亦浮按不沒指石水脈浮不惡風石水脈沉腹滿不喘黃汗脈沉遲發熱多涎久而不愈必致癰膿五傷證候諸唇黑則傷肝缺盆平則傷心臍出則傷脾足平則傷腎背平則傷肺凡此五傷必不可療也治法曰腰以上腫宜發汗腰以下腫宜利小便學者當知之苦葫蘆散治遍身水腫如神呂大資宅經效秘方木通一兩半細銼澤瀉三分苦葫蘆子一兩半防己三分豬苓一兩去黑皮海蛤一兩細研上件藥搗羅為末每服五錢水七分酒七分入蔥白五寸煎至八分去滓食前溫進當下小便數升腫消大蒜圓治氣虛水腫浮脹滁州公使酒庫攢司陳通患此一病垂死醫者已不下藥偶一婦人傳此方云是道人所授服之病自小便而下幾數桶遂愈大蒜一個蛤粉上以蒜研爛以蛤粉和無分兩可圓即止如梧桐子大每服十圓白湯下若氣不升降即以大蒜一頭每瓣切開逐瓣內入茴香七粒用濕紙裹煨香熟爛嚼白湯送下不以多少若臟腑不止即以丁香如茴香法煨服每瓣用三粒吳茱萸湯治脾虛腳腫面黃小便黃赤腹脅脹滿㽲痛或大小便澀錢昭遠知縣傳吳茱萸一兩去枝湯泡枳實麩炒去麩半兩赤茯苓一兩半夏湯泡半兩上㕮咀三錢重水一盞半生薑七大片同煎八分去滓熱服不以時候冬瓜散治水氣極有神效冬瓜一枚著中者去瓤肉桂十兩銼上以肉桂內冬瓜中蓋口濕紙裹數重撅地坑簇以炭火煅令存性為細末每服二錢米飲調下日二服一料可絕根本棗仁散治浮腫俞子清少卿家傳方云得效甚多紅棗核捶破取仁白茯苓等分上為細末米飲調下黃魚湯治水氣王尚之提刑傳云武義縣方已治數人甚妙黃顙魚一個綠豆一合許上煮淡羹頓食紹興張醫升之云以商陸根煮綠豆令熟去商陸取綠豆任意食之亦妙王氏博濟方第二卷逐氣散與此二藥大同小異木瓜湯治水氣鄭簽判名本中雲宣木瓜一個吳茱萸上以木瓜用竹刀切下蓋子去子並瓤入吳茱萸在內卻將蓋子用竹籤簽定蒸熟各研細焙乾同為細末以紫蘇熟水調下不計時候積日水自消退導水圓治男子婦人水氣腫滿茯苓琥珀圓治水氣通身浮腫消腫圓治水氣腹脹四肢皆腫急咳嗽睡臥不得服之小便自利腫脹悉消須忌鹽醬藏醃之物淡豉二兩新好者研巴豆一兩去殼河水半升煮乾去心出油取霜五靈脂去砂石一分荊三稜煨切大戟新者杏仁燒留性研細三味各半兩上件為細末以生面水調搜和杵千下圓如綠豆大每服五丸濃煎桑白皮湯送下食後服大便秘者加至十丸喘急者用杏仁去皮尖研細濃煎湯送下忌甘草三日消脹圓治水病渾身腫脹喘急小便不利白樟柳根三兩銼細赤小豆五兩陳皮去白二兩木香一上件為細末滴水和丸如綠豆大每服三十丸煮赤小豆湯下不拘時候冬瓜圓治十種水氣浮腫喘滿大冬瓜一枚先於頭返切一蓋子取去中間瓤不用以赤小豆水淘淨填滿冬瓜中再用蓋子合了用竹籤簽定以麻線系紙筋黃泥通身固濟窨干用糯谷破取糠片兩大籮埋冬瓜在內以火著糠內煨之候火盡取出去泥刮冬瓜令淨薄切片子並豆焙乾上為細末水煮麵糊為圓如梧桐子大每服五十丸煎冬瓜子湯送下不拘時候小便利為驗海蛤湯治水氣肢體腫滿元氣發動遍身壯熱小便不通此藥最妙海蛤澤瀉木豬苓去皮木通滑石桑白皮葵菜子七味各一兩上件為細末每服二錢水一盞入燈心十莖通草二寸同煎至七分溫服食前消脹圓治蠱脹推氣退腫法曲四兩焙乾葛二兩肉桂去粗皮一兩蕤仁三十粒巴豆二十五粒去皮油生用陳皮去白一兩檳榔半兩木香一兩縮砂仁一兩黑牽牛一升用無灰酒半升浸一宿取出焙乾上件為細末用豶肚一枚淨洗將前件牽牛盛在內用無灰酒五升慢火煮之酒盡肚爛取出於臼中搗極爛和前藥末一處杵為圓如綠豆大每服五十丸空心日午臨臥溫酒送下更量虛實加減之蘿蔔子圓治蠱氣脹滿四肢虛浮上氣喘急大小便秘澀服此有效蘿蔔子四兩炒令黃雷丸一兩炒黃白附子一兩半炮檳榔半兩陳皮去白二兩藍根二兩炒黃上件為細末酒煮麵糊為丸如綠豆大每服十丸至三十丸橘皮湯空心吞下獨勝散治水氣腫脹無比之妙大理孫評事傳一家專貨此藥盛行服者皆痊川獨活上用巴豆炒去巴豆碾為細末煮精豬肉蘸藥服氣實圓治腰脅俱病如抱一甕肌膚堅硬按之如鼓兩腳腫滿曲膝仰臥不能屈伸自頭至膻中瘦瘠露骨胸膈塞隘四肢無力飲食無味氣積食積並皆治之青皮一兩去白羌活半兩川芎半兩陳皮半兩去白茴香半兩南木香半兩檳榔一兩大黃一兩半當歸半兩黑牽牛末二兩上細末用不蛀皂角熬膏為丸如桐子每服五七十丸至百丸生薑燈心煎湯送下一切氣血凝滯風毒熾盛及腳氣走注作腫痛或大便秘並宜服腳氣入腹心胸滿悶寒熱往來狀類傷寒更兼服局方蘇子降氣湯治癰疽瘡癤便毒尤宜青龍圓治久新水蠱病輕粉二錢白丁香二錢硇砂一錢青黛一分上同研勻水和成塊硬軟得所用生蒸餅麵裹一重以桑柴慢火煨熟不去已燒熟面再以生面又裹一重再如前煨候香放冷取出藥不用面別煮好麵糊為丸如黍米大用茴香湯下三丸日三服第二日四丸日三服第三日五丸亦一日三服每日如此加服自然水盡其水有自三服下有自五服下者凡水下即溺至七日即止葶藶圓治一切水蠱氣通身腫滿喘急人參一兩銼炒苦葶藶四兩鋪紙在銚中炒上為細末煮棗去皮核擂細搜丸如桐子大每服三四十丸桑白皮煎湯送下喘急食後不計時亦得復元丹治水腫夫心腎真火能生脾肺真土今真火氣虧不能滋養真土故土不制水水液妄行三焦不瀉氣脈閉塞樞機不通喘息奔急水氣盈溢滲透經絡皮膚溢滿足脛尤甚兩目下腫膇股間冷口苦舌乾心腹堅脹不得正偃則咳嗽小便不通夢中虛驚不能安臥葉伯材處此數方醫腫累有神效附子炮二兩南木香煨茴香炒川椒炒去汗獨活厚朴去皮銼薑製炒白朮略炒陳橘皮吳茱萸炒桂心已上各一兩澤瀉一兩半肉豆蔻煨半兩檳榔半兩上一十三味為末糊丸梧子大每服五十丸紫蘇湯下不以時此藥世傳屢驗未嘗示人其間君臣佐使與造物同妙服者自知要當屏去諸藥一日三服先次旋利如傾次乃腫消喘止蓋藥能助真火以養真土運動樞機安平必矣法當禁欲並絕咸半年乃不再作當歸散治如前當歸洗木香煨赤茯苓桂皮檳榔赤芍藥牡丹皮陳皮木通白朮各銼焙乾秤等分上為末腳膝頭面腫大小便不快每服二錢水一盞紫蘇二葉淡木瓜一片如指大同煎八分溫服日三如已愈常服早晚二覺氣下或小便快是效臟寒去檳榔臍已凸添大腹皮木豬苓各一兩忌烏雞肉鹹酸海味物消腫圓治水腫喘滿小便不利滑石木通白朮黑牽牛炒通脫木茯芩茯神去木半夏湯洗去滑陳皮已上各一分木香半分瞿麥穗半錢丁香半錢上為末酒糊丸如梧子大每服三十丸燈心麥門冬湯溫服消腫散治水氣浮腫喘呼不得睡煩熱躁擾渴燥大小便不利大黃蜜蒸山梔炒甘草炙乾葛橘皮麻黃去節湯馬牙硝川芎已上各等分上為細末蜜湯調下二錢第一退水圓能化氣退水腫去宛莝利濕通小便蓬莪朮炮三稜煨桂心青皮益智已上各半兩巴豆二十粒去皮油別研上為末麵糊丸如梧子大用黃梔十個劈破荊芥黑牽牛酸漿草各少許煎湯空腹下二三十丸第二退水餅服前藥未效即服此方甘遂大戟上為末入面打水調為餅如棋子大火煨熟五更淡茶湯嚼下一餅第三大腹子散取轉後調整胃氣進食大腹子炒桂心茴香炒陳皮各半兩上為末每服二錢米飲調下換金散治水氣腫滿苦葫蘆子上炒為細末每服二三錢木通陳皮煎湯調下異功散治水氣蠱脹池中立死乾荷葉上燒灰每服一錢米飲調下日三服不拘時治水蠱腹脹上取嘉禾散四柱散細末各等分合和令勻依法煎服紹興術士朱蓑衣名黼苦此疾醫者但令服嘉禾散久之不效葛丞相授以此法遂安治水氣神仙所授上用冬瓜自然汁和大麥面作餺飥食之治水蠱商陸根赤者搗爛貼臍心以綿帛系縛定病自小水而去商陸有二種白者不可用
