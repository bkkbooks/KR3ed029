body:
  text: 卷之十二疝氣門治諸疝氣發作證候經論雖云七疝諸疝等更不見名狀但出寒疝㿗疝而已唯大奇論列五臟脈為五疝證所謂腎脈大急沉為腎疝肝脈大急沉為肝疝心脈搏滑急為心疝肺脈沉搏為肺疝三陰急為脾疝三陰即太陰脾脈也大抵血因寒泣則為瘕氣因寒聚則為疝但五臟脈理不同不可不辨且腎脈本沉心脈本滑受寒則急於理乃是肝脈本弦肺脈本澀並謂之沉未為了義又脾不出本脈但云急為疝亦文義之缺也凡云急者緊也緊為寒亦可類推且賊風入腹亦為疝冒暑履濕皆能為疝常隨四氣改易急字風則浮弦暑則洪數濕則緩細於理甚明要知疝雖兼臟氣皆外所因也寒則溫之風則散之暑則利之濕則燥之各有成法失笑散治疝氣腫硬徐都承叔至傳云是錢參政方防風去蘆牡丹皮去心上等分為細末食前酒服方寸匕日三亦治㿗卵偏墜又一方加黃檗桂心二味等分治氣上下腫脹大戟丸治膀胱氣陰腫或小腸氣痛泗州楊吉老方纍用有效檳榔一兩略炮過麝香半分好者胡蘆巴四兩炒香大戟揀好者寸許銼去皮炒令黃色稱半兩木香一兩舶上茴香一兩黑附子一兩炮去皮臍訶黎勒炮去核一兩上件藥為末用川楝子五兩好酒二升蔥白七枝長三四寸已來一處煮令楝子肉透軟去皮核只取肉和上件藥末丸如梧桐子大每服五七丸加之十丸每日空心溫酒少許下之生薑鹽湯下亦可如潮發疼痛可用炒生薑熱酒下十五丸一服立效吃藥後消盡氣腫且卻減藥茴香散治寒濕氣小腹疼外腎偏大腫痛軍頭司何押番傳與陳端遇發時只一兩服立定何云等子輩常服此藥故無下部之疾茴香柿楂子本草名糖球上二味等分為細末每服一二錢鹽酒調空心熱服蛇床子散治淋泄蛇床子川椒木通石茱萸藁本陳橘皮各一兩上為粗末每用連根蔥白七枝水三碗藥兩匙煎五七沸先噓候通手淋洗木香散治疝氣漢陽洪簽判名價傳復州史君親服得效並下三方木香青皮去白延胡索馬撲兒新瓦上焙乾土茴香炒上等分為細末每服抄二錢空心溫酒調服忌滯氣食物如豆腐雞鴨子濕面韭菜等病愈任意食無害桃仁散桃仁三十粒炒上細嚼熱酒吞下茴香丸食前皂子圓肥皂子獨腎者四十九個上燒過存性為細末再研如粉用陳米飯爛研如膏子丸如梧子大每服四十丸茴香煎湯下又治疝氣細末熱酒調下茱萸桃仁散茱萸揀四兩桃仁一百二十粒上二味同炒香熟去萸不用止將桃仁去皮尖蔥白十寸細銼沙盆內爛研銀銚內炒香熟用酒二盞浸作一服熱吃有汗便解金鈴圓治丈夫本臟氣並膀胱氣往往衝心臍下胸脅刺痛及婦人血氣衝心並皆治之消溶飲食通三焦氣金鈴子四十個去皮核只取肉用巴豆二十粒去皮入麩同炒金鈴子肉如桑根色為度棄卻巴豆麩只使金鈴肉茴香輕爛過舶上者蓬莪朮醋浸紙裹炮荊三稜醋浸紙裹炮枳殼麩炒去瓤陳皮湯浸去瓤已上各二兩川楝子焙一兩木香半兩百部炒一兩上件揀淨細為末醋煮麵糊為丸如梧桐子大每服三十丸至四十丸不計時候茶酒任下消酒食如若只為散用酒調或入鹽點更佳大烏頭桂枝湯治風寒疝腹中痛逆冷手足不仁身體疼痛灸刺諸藥不能療及賊風入腹攻刺五臟拘急不得轉側發作叫呼陰縮悉主之醫官杜壬以此五方治寒疝極效大烏頭五枚實者去皮尖蜜大盞煎減半漉出湯洗切桂心三錢三字芍藥三錢三字甘草一分炙上為銼散每服四大錢水一盞半薑五片大棗三個入前煎烏頭蜜半合同煎至七分盞去滓食前服倉卒散治寒疝入腹心腹卒痛及小腸膀胱氣絞刺脾腎氣攻攣急極痛不可忍屈伸不能腹中冷重如石白汗出山梔子四十九個燒半過附子一枚炮上末每服二錢水一盞酒半盞煎至七分入鹽一捻溫服即愈神應散治諸疝心腹絞痛不可忍延胡索胡椒等分上為末每服二大錢酒半盞水半盞煎七分食前服牡丹圓治寒疝心腹刺痛休作無時及治婦人月病血刺疼痛川烏頭炮令焦黑去皮尖牡丹皮四兩桂心五兩桃仁炒去皮尖五兩別研上為末煉蜜圓梧子大每服五十丸溫酒下婦人醋湯下補腎湯治寒疝入腹上實下虛小腹㽱痛時復泄瀉胸膈痞滿不進飲食常服溫脾補腎人參茯苓白朮黃耆附子炮去皮臍各一兩沉香四錢木瓜一兩半羌活半兩甘草炙芎藭各一分紫蘇三分上為銼散每服三錢水一盞薑三片棗一枚煎七分去滓食前服嘔吐加半夏半兩添水盞半薑七片煎世寶圓治一切厥心痛小腸膀胱痛不可忍附子炮去皮臍一兩鬱金薑黃各半兩上為細末醋糊為丸如桐子大硃砂少許為衣每服三十丸溫酒下婦人淡醋湯更服代針散神聖代針散治小腸氣搐得如角弓反張膀胱腫硬一切氣刺虛痛張氏處此數方的有神效乳香研沒藥研安息香研當歸洗去蘆川芎白芷各半兩芫青去足翅二錢上為細末每服一字病甚半錢先點好茶一盞將藥摻在茶上不得吹攪動立地細細呷之脫鈴圓治奔豚腎余腫墜小腸氣痛並下部一切疾胡蘆巴炒破故紙炒蓬莪朮炒荊三稜炒已上各一兩檳榔半兩生用南木香半兩不見火川楝子一兩用巴豆七個炒去巴豆上為細末面內入少許硇砂細末同煮糊為丸如桐子大每服三四十丸溫酒鹽湯送下空心食前服妙應散治大人小兒偏墜防風二兩官桂去皮一兩上為細末二錢溫酒鹽湯調下服了食壓之治小腸氣用蔥白入茴香煨同嚼縮砂仁妙木香趁痛圓治下部諸疾不問虛實往來作痛時發寒熱南木香二兩不見火胡椒大黃炒青皮去白全蠍炒已上各一兩黑牽牛四兩半炒半生上為細末麵糊為丸如桐子大二十丸至三十丸鹽湯空心下半夏湯治心脾疼及小腸奔豚等痛患吳茱萸去枝並目半夏湯泡切片肉桂去皮等分上㕮咀三錢重水一大盞半生薑十片同煎八分去滓熱服腸風門辨腸風痔漏下血證候夫有五痔人奏圊則下血或點滴或迸箭或清或濁面黃唇白心忪腳弱頭目眩暈此因飽食坐久腸癖所為亦有飲酒房室過度所致世醫多指此為腸風臟毒然腸風臟毒自屬滯下門臟毒即是臟中積毒腸風即是邪入臟純下清血謂之風利今五痔下血乃是酒痔脈痔其血自肛門邊別有一竅如針孔大滴淋而下與泄物不共道不可不知黃連湯治脈痔下血不止量冷熱加減法此數方系葉伯材纍用有神效黃連去須烏頭炮去皮尖各等分上為銼散每服二錢水一盞半煎七分去滓空心服熱則加黃連冷則加烏頭酒連圓治酒痔下血伏暑久治不效黃連不以多少燎去須酒浸銀器中重湯煮漉出曬乾添酒煮七次止上為末以余酒為圓如梧子大每服五十丸米湯下加味四君子湯治五痔下血面色萎黃心忪耳鳴腳弱氣乏口淡食不知味人參茯苓白朮甘草炙黃耆白扁豆蒸各等分上為末每服二錢匕湯點服此方人未之信服者頗效所謂看不上手面自有奇功豬牙皂角散治五種腸風下血糞前有血名外痔糞後有血名內痔大腸名脫肛穀道四旁有胬肉如乳頭名鼠奶痔有穴腸出血名漏並皆治之黃牛角䚡一枚捶碎白蛇蛻一條蝟皮一兩豬牙皂角七鋌穿山甲一片七十鱗上並銼碎入砂瓶內以鹽泥封固候乾先少著火燒令煙出後用大火煅令通赤為度取出攤冷為末先以胡桃一個分四分一分臨臥時細研如糊酒調下便睡先引出蟲至五更時一服次日辰時一服並三錢藥末久患者不過三服即愈黃耆圓治腸風瀉血呂大資宅經效方石寺丞服後得驗黃耆黃連各等分上件藥為末以麵糊為丸如赤豆大每服二三十丸米飲下厚朴煎王嗣康為蔡昭先處此方治積年下血韓縣尉名楚卿傳云乃尊主藏服之作效厚朴五兩用生薑五兩同搗開於銀石器內炒令紫色白朮一兩大麥糵神麯二味各一兩同炒紫色上為細末白水麵糊為圓如梧桐子大疾作空心米飲下一百丸平時三五十丸嗣康云腸胃本無血緣氣虛腸薄自榮衛滲入今用厚朴厚腸胃神麯麥糵消酒食白朮導水血自不作也荊芥散治脈痔下血荊芥穗槐花炒焦各一兩石菖蒲一兩半上為末米飲調下二錢食前服日二白玉丹治久年腸痔下血服百藥不效者凝水石不以多少煅紅研細水飛再入銀鍋中煅上糯米糊丸如梧子大陳米飲下五十丸只一服愈消毒圓治腸風外痔結核或癢或痛消毒定痛令結核自散楊氏用此數方治諸腸風痔漏大有功效黃耆一兩半蜜塗慢火炙荊芥穗一兩枳殼三兩湯浸去瓤切作片子麩炒黃色薄荷葉去土半兩槐花一兩炒赤皂角子仁一兩炒香蝸牛十四枚炙去殼焙乾上件為細末煉蜜為圓如梧桐子大每服三十丸至五七十丸茶清送下食後聚金圓治大便下血發熱煩躁腹中熱痛作渴喜妄舌澀目昏脈來弦數多因蓄熱或有酒毒即此見證黃連四兩一兩水浸曬乾一兩炒一兩灰火炮一兩生用黃芩一兩防風去蘆頭一兩上件為細末煮麵糊為丸如梧桐子大每服五十丸量意加減以米泔浸枳殼水下不拘時候冬月入大黃一兩三時不須北亭散治腸風痔漏積年膿血不幹白礬別研乳香別研黃連去須已上各一兩硇砂半兩別研全蠍一錢取末上件為末用大鯽魚一枚去腸鱗入藥末在內濕紙裹麻皮纏鹽泥固濟文武火煨熟去泥紙卻用慢火炙焦同為細末每服二錢空心粟米飲調下鳳眼草散治腸風下血鳳眼草揀淨即揀莢也褐油麻水淘淨二味各四兩枳殼去瓤二兩麩炒輕粉一字上件為細末每服二錢溫酒調下米飲亦得食前服地榆散治腸風下血不止地榆訶子煨去核赤芍藥橡斗子各一兩上件為細末每服二錢陳米飲下食前皂角子散治腸風痔漏下血經久不瘥者皂角子一百枚燒留性研細榼藤子一枚金者去殼研不可搗上件為細末每服二錢熱酒調下如人行三五里再飲熱酒一盞投之蝟皮湯治腸風下血白刺蝟皮一枚於銚子內煿針焦去皮只用針木賊半兩炒黃上件為細末每服二錢熱酒調下空心服松皮散治腸風下血過多松木皮就木上以刀刮去粗浮者只取貼木嫩皮上銼細焙令半乾再入銚子內慢火炒乾為細末每服一錢入臘茶一錢白湯點服食前立聖散治年深日久腸風下血或如雞肝日夜無度全不入食通身黃腫者兼治尿血黃連去須一斤上為細末每服一錢濃煎荊芥蜜湯調下空心食前橄欖散治腸風下血久不瘥者橄欖核不以多少上件燈上燒灰為細末每服二錢陳米飲調下空心萬靈圓治五種痔漏凡穀道生瘤似鼠奶時時發動或出血者名曰酒痔又曰冷痔若生核子者曰腸風痔發時熱大便難下脫肛良久不入名曰氣痔大便或出清血名曰血痔此因濕地久坐腸胃虛冷搏結得之硫黃二錢別研白礬枯二錢豬牙皂角半兩炙附子一兩炮去皮臍皂角刺一兩燒留性刺蝟皮一兩燒留性榼藤子一枚生廣中圓者色如肥皂子上件為細末煮稀麵糊為丸如梧桐子大每服二十丸空心溫酒下如疤有頭者用硃砂少許同藥三五丸一處細研塗於頭上旬日自落又用米醋調藥三五丸敷瘡上即愈在裡面即將米醋和糟拌藥三兩丸燒熏之治酒毒下血多至升斗者盧州郭醫云趙俊臣帥合肥日其壻司馬機宜患此服四物湯每料加炒焦槐花二兩如常法煎服必止久之不復作效於一同官處得此方遂安豶豬肚一枚洗淨入去須土了淨黃連四兩以酒醋各二升半文武火煮候乾控起將豬肚並黃連一處研杵極爛丸如梧桐子大每服五十丸米飲湯下治下血如豬肝片煎四順飲子下駐車丸僧保俊患此服而愈治下血漢陽章教授傳蔥須新瓦上炒乾碾為細末每服三米飲調下甚妙
