body:
  text: 卷之二十服餌門服丹砂法丹砂味甘無毒主身體五臟百病養精神安魂魄益氣明目通血脈止煩滿消渴益精神悅澤人面殺精魅邪惡鬼久服通神明不老輕身神仙三皇真人煉丹方丹砂一片色發明者研末重絹篩之令靡靡以醇酒不見水者沃丹橈之令如葑泥狀盛以銅盤中置高閣上勿令婦人見曝之身自起居數橈燥復沃之當令如泥若陰雨疾復藏之無人處天晏出曝之盡酒三斗而成能長曝之三百日當紫色握之不汗手如著手未乾可丸欲服時沐浴蘭香齋戒七日勿令婦人近藥過傍丸如麻子大常以平旦向日吞三丸服之一月三蟲出服之五六月腹內諸病皆瘥服之一年眉發更黑歲加一丸服之三年神人至太清服煉震砂法丹砂外包入石內含金精先稟氣於甲受氣於丙出胎見王結魄成庚增光歸成陰陽升降各本其原如鈹石五金俱收五陰神之氣結亦分為五類之形形質頑嚚志性沉滯服雄黃法雄黃味苦甘平大溫殺精物惡鬼邪氣百蟲毒勝五兵殺諸蛇虺毒解藜蘆毒悅澤人面煉食之輕身神仙餌服之皆飛入人腦中勝鬼神延年益壽保中不飢抱朴子云餌之法或以蒸煮或以酒服或以消石化為水乃凝之或以豬脂裹蒸之於赤土下或以松脂和之或以三物煉之引之如布白如冰服之皆令人長生百病除三尸下疤痕滅白髮黑墮齒生千日玉女來侍可使鬼神太上八帝玄便經小丹法用雄黃柏子拘魂制魄方柏子細節去滓松脂十斤以和柏子雄黃各二斤色如赤李合藥臼中復搗如蒸藥一日如餌正坐北向平旦頓服五丸百日之後與神人交見服黃精法黃精味甘平無毒主補中益氣除風濕安五臟久服輕身延年不飢餌黃精能老不飢其法可取甕子去底釜上安置令得所盛黃精令滿蜜蓋蒸之令氣溜即曝之第二遍蒸之亦如此九蒸九曝凡生時有一碩熟有三四斗蒸之若生則刺人咽喉曝使干不爾朽壞其生者若初服只可一寸半漸漸增之十日不食能長服之止三尺五升服三百日後盡見鬼神餌必昇天根葉花實皆可食之但相對者是不對者名扁精昔黃帝問天老曰天地所生豈有食之令人不死乎天老曰太陽之草名曰黃精餌之可以長生服菖蒲法菖蒲味辛溫無毒主風寒濕痹咳逆上氣開心孔補五臟通九竅明耳目出音聲久服輕身聰耳目不忘不迷惑延年益心智高志不老五月五日採得緊小似魚鱗者治擇一斤許以水及米泔浸各一宿又刮去皮切曝乾搗篩以糯米粥和勻更入熟蜜搜丸梧子大絺葛袋盛置當風處令乾每旦酒飲任下三十丸臨臥更服二十丸久得效漢武帝傳云帝上嵩山忽見仙人長可二丈問之曰吾九嶷山人也聞中嶽有石上菖蒲一寸九節食之長生故來採之忽然不見抱朴子云韓終服菖蒲十三年身上生毛日視書萬言皆誦之冬袒不寒又菖蒲須得石上寸九節紫花尤善服天門冬法天門冬味苦甘平大寒無毒主諸暴風濕偏痹強骨髓殺三蟲去伏屍久服輕身益氣延年不飢修真秘旨云神仙服天門冬三十斤細切陰乾搗末每服三錢酒調下日五六服二百日後怡泰拘急者緩羸劣者強三百日身輕三年走及奔馬抱朴子云杜紫微服天門冬御八十妾有男一百四十歲日行三百里神仙傳云甘始者太原人服天門冬在人間三百餘年服杏仁法杏核仁味甘苦溫服之除百病駐顏延年左慈秘訣云五月杏熟收取當月旬內自落者去核取仁六斗以熱湯退皮去雙仁取南流水三石和研取汁兩石八斗去滓並小英者亦得取新鐵釜受三石已來作灶須其五嶽三臺形用硃砂圖畫之其灶通四腳去地五十著鐐不得絕稠恐下灰不得其釜用酥三斤以糠火及炭燃釜少少磨三斤酥盡即內汁釜中釜上安盆盆上鎖孔用箏弦懸車轄主釜底其孔以紙纏塞勿令泄氣初著糠火併干牛糞火一日三動車轄以滾其汁五日有露液生十日白霜起又三日白霜盡即金花出若見此候即知丹霜成開盆用炭火炙乾以雄雞翎掃取以棗肉和為丸如梧桐子大釜中獨角成者為上其釜口次也丹滓亦能治冷疾服丹法如人吃一斗酒醉即吃五升吃一升者只吃半升下藥取滿日空心暖酒服三丸至七日萬病皆除愈頭白卻黑齒落更生張先師云二兩為一劑一劑延八十年兩劑延二百四十年三劑通靈不死服豆法生大豆味甘平仙方修制黃末可以辟穀度飢歲然多食令人體重久則如故矣博物志云左元放荒年擇大豆粗細調勻必生熟挼之令有光暖氣徹豆則內先下食一日以冷水頓服訖其魚肉菜果不得復經口渴即飲水後不復思食修養門養生秘要凡欲服氣先須得一高靜密室不在於大務絕風隙左右焚香不用熏陸床須厚軟腳稍令高真誥曰床高鬼氣不及鬼物善因地氣以吹人為床高三尺可矣衣服適寒溫冬宜稍暖枕高四指余令與背平每夜半後生氣時或五更睦覺先呵出腹內濁氣一九止或五六止若要而言之亦不在半夜與五更也但無事閉坐寬衣解帶腹空即為之先定心閉目叩齒三十六通以集身神然後以大拇指背拭目大小九過兼按鼻左右七過以兩手摩令極熱閉口鼻氣然後摩面不以遍數為真人起居之法次以舌拄止齶漱口中內外津液滿口作三嚥下之令入胃存胃神承之如此者三作是三度九咽黃庭經曰漱咽靈液體不幹此之謂也庶得灌溉五臟面目乃光此雖傍門亦極有力不可輕忽為常聞之小法便兀然放身使心同太虛身若委衣萬慮都遣若能久久行之則氣血調暢精神內守疾病不生也修真秘訣道經云夫欲得長生當修所生之本始得精氣結而為形則知形為受氣之本氣是有形之根若氣不得形則無因而立形不得氣則無因而成原其所稟之時伏母臍下混沌三月玄牝是也玄牝既立猶瓜在蒂陰在母胎始於此時也母呼亦呼母吸亦吸綿綿十月氣足神備遂解胎而出母惟知貪悅於子曾不知形耗體枯分形減氣為子之用矣既生七日情見於外變嬰為兒指頤為笑況十五成童二十弱冠目眩五色耳聽五聲役智運神機巧日變如此淳樸之根太和之氣蕩而盡矣故聖人以還元返本握胎息之機致長生久視中胎經云形中子母何不相守且形中以氣為母以神為子夫形氣先立而後有神神由氣生故為子也夫至人不思外物不視外色不聽外聲常令神與氣合循環於臟腑之內御呼吸以上下久久修習則神自明而氣自和神明則可照徹於五臟氣和則可使用於四肢故皇帝三月內死也魂飛於天魄落於泉水火分散各歸本原生則同體死則相指飛沉各異稟之自然何者譬如一根之木以火焚之煙則上升灰則下沉亦自然之理也夫神明者生化之本精氣者萬物之體全其形則生養其精氣則性命長存矣黃帝養生論黃帝問於岐伯曰余聞上古之人春秋皆度百歲而動作不衰今時之人年至半百而動作皆衰者時代異耶人將失之耶岐伯對曰上古之人其知道者法則陰陽和於術數食飲有節起居有常不妄作勞故能形與神俱而盡終其天年度百歲方去今時之人則不然以酒為漿以妄為常醉以入房以欲竭其精以耗散其真不知持滿不時御神務快其心逆於生樂起居無節故半百而衰也夫上古聖人之教下也皆謂之虛邪賊風避之有時恬淡虛無真氣從之精神內守病安從來是以志閒而少欲心安而不懼形勞而不倦嗜欲不能勞其目淫邪不能惑其心愚智賢不肖不懼於物故合於道所以能年皆度百歲而動作不衰以其德全不危也純陽呂真人抱一說道生一一生水水生精精者一物全而神全神所以制魂定魂為上士矣天精者天地方物所以生成也然精常嗇人而人常費之竅漏無度至於中干以死則其離也非精離之人自離之耳莊子曰不離於精謂之神人故喪精則失虛沉為下愚矣人之初生固精集神本自絕全而不能了者常至於離折隳散其多曰罔兩罔者神不明兩者精不一莊子曰無搖汝精抱一之謂也可惜歌曰可惜許可惜許可惜元陽宮無主一點既隨濃色妒百神泣送精光去三尸喜七魄怒血敗氣衰將何補尺宅丹田屬別人王爐丹灶阿誰主勸世人休慕色慕色貪淫終無益一神去後百神離百神去後人不知幾度待說說不得臨臨下口泄天機休糧秘訣以舌拄上齶並料攪上下牙齒內外取津液至半口或滿口即咽之嚥了又以舌拄上齶並料攪上下牙齒內外取津液至半口或滿口即咽之如此一口一夜咽之三百度四百度則自然不飢矣三日五日前稍費力及疲倦若過七日之後當自慣熟漸覺身體輕健初學時未甚有津液頻頻呷一二呷水水能止飢惟不可多吃吃多令人肚疼又不可吃白湯吃白湯則令人飢又不可吃鹽醋咸酸之物令人少津液一月二月或半年一年遇飲食要吃不妨須先吃少薄粥漸漸吃硬飯蓋緣久住飲食腸肚窄狹頓食恐致肚疼耳許真君方武當山李道人傳累試有驗休糧絕食妙香圓白膠香乳香硃砂雄黃蠟茯苓上等分為細末煉蜜為圓如彈子大臨服之時飽食麵一腹然後服此藥可永停食身輕力健氣血愈壯
