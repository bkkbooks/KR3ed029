body:
  text: 卷之十嘔吐門治諸嘔吐發作所因證候嘔吐雖本於胃然所因亦多端故有寒熱飲食血氣之不同皆使人嘔吐據論云寒氣在上憂氣在下二氣並爭但出不入此亦一途未為盡論且如氣屬內因則有七種不同寒涉外因則六淫分異皆作逆但鬱於胃則致嘔豈拘於憂氣而已況有宿食不消中滿溢出五飲聚結隨氣翻吐痼冷積熱及瘀血凝閉更有三焦漏氣走哺吐利泄血皆有此證不可不詳辨也寒嘔證治病者胃中寒心下淡淡四肢厥冷食即嘔吐名曰寒嘔或因飲食多致傷胃氣或因病曾經汗下致胃氣虛冷之所為也葉伯材處此數方大有神效四逆湯治寒嘔脈弱小便複利身有微熱見厥者難治甘草一錢炙乾薑三錢三字附子六錢重生去皮臍上為銼散每服三錢重水二盞煎七分去滓食前溫服靈液丹治胃中虛寒聚結痰飲食飲不化噫醋停酸大便反堅心胸脹滿惡聞食氣婦人妊娠惡阻嘔吐不納食者硫黃打碎一兩附子一兩去皮臍切綠豆大綠豆四兩水一碗煮乾焙上為末生薑自然汁煮麵糊為丸如梧子大每服五十丸米湯下食前服熱嘔證治病者胃中挾熱煩躁聚結涎沫食入即吐名曰熱嘔或因胃熱伏暑及傷寒伏熱不解濕阻之類皆熱所為也小柴胡湯治嘔噦煩渴寒熱往來身面皆黃小便不利大便秘澀並宜服之柴胡去蘆頭秤半斤黃芩人參去蘆頭甘草炙各二兩半夏湯洗七次焙乾秤二兩半上五味同為粗末每服三大錢以水一盞半入生薑五片棗一個擘破同煎至七分去滓稍熱服不拘時痰嘔證治病者素盛今瘦腸中瀝瀝有聲食入即嘔食與飲並出名曰痰嘔或因氣鬱涎結於胃口或因酒食甜冷聚飲之所為也大半夏湯治心氣不行郁生涎飲聚結不散心下痞鞕腸中瀝瀝有聲食入即吐半夏二兩湯洗十次完用人參三錢切上分四服每服水三盞蜜二錢重和水揚令勻水藥煎至六分去滓溫服一法有生薑七片治法曰嘔家先渴今反不渴者以心下有支飲故也治屬支飲無不取效食嘔證治病者胸腹脹悶四肢厥冷惡聞食臭食入即嘔朝食暮吐暮食朝吐名曰食嘔此由飲食傷脾宿穀不化之所為也大養胃湯治飲食傷脾宿穀不化朝食暮吐暮食朝吐上氣復熱四肢冷痹三焦不調及胃虛寒氣在上憂氣在下二氣並爭但出不入嘔不得食厚朴去皮生薑銼各二兩肥棗三兩銼同上二味炒白朮山藥炒人參川芎橘皮當歸五味子藿香甘草炙枇杷葉刷去毛用姜炙黃耆各一兩上為銼散每服四錢水一盞半姜三片棗一個煎七分去滓空腹服或為細末大湯調下亦快血嘔證治病者心下滿食入即嘔血隨食出名曰血嘔此由瘀蓄冷血聚積胃口之所為也茯苓湯治憂怒兼併氣攻血溢停留胃管噯聞血腥嘔吐食飲及妊娠中脘宿冷冷血侵脾惡聞食氣病名惡阻半夏三兩湯洗七次茯苓熟地黃各一兩八錢橘皮細辛人參芍藥川芎旋覆花桔梗甘草炙各一兩二錢上為銼散每服四大錢水二盞姜七片煎七分去滓空心服有客熱煩渴口瘡者去橘皮細辛加前胡知母腹冷下利者去地黃入桂心炒胃中虛熱大便閉小便澀去地黃加大黃一兩八錢黃芩六錢當歸湯治三焦虛損或上下發泄吐唾血皆從三焦起或因熱損發或因酒發悉主之當歸乾薑炮熟地黃檗皮小薊羚羊角鎊阿膠炒各三錢三字白朮芍藥各半兩黃芩甘草炙各一分上為銼散每服三錢水二盞竹茹一塊如指大煎至八分去滓入伏龍肝半錢匕頭髮灰半錢匕蒲黃半錢匕再煎至七分不以時服氣嘔證治病者心膈脹滿氣逆於胸間食入即嘔嘔盡卻快名曰氣嘔胃者足陽明合榮於足今隨氣上逆結於胃口故生嘔病也茱萸人參湯治氣嘔胸滿不納食嘔吐涯沐頭疼吳茱萸湯洗數次五兩人參三兩上為銼散每服四大錢水一盞半姜五片棗三枚煎七分去滓不以時服藿香湯治心下虛滿飲食不入時時嘔吐惙惙短氣大病將理不復胃氣無以養日漸羸弱藿香人參桂心桔梗木香白朮各半兩茯苓半兩枇杷葉十片去毛半夏一兩湯洗用薑汁製上為銼散每服五錢水二盞入炒薑絲一分煎七分去滓食前服噦逆治法橘皮竹茹湯治咳逆嘔噦胃中虛冷每一噦至八九聲相連收氣不回至於驚人橘皮二兩人參一兩甘草炙半兩上為銼散每服四錢水一盞半竹茹一小塊姜五片棗二個煎七分去滓不以時服大藿香散大治一切心肺脾胃氣變為萬病服之皆愈盛季文傳於賀方回云頃在河朔因食羊肝生脾胃泄瀉膿血仍發脾氣嘔吐霍亂心腹撮痛時出冷汗四體厥逆殆不可忍邑宰万俟湜懷此藥煎以進再服即定既而求其方常服尤能和氣進食藿香葉一兩木香陳皮去白肉豆蔻麵裹煨訶子煨去稜人參去蘆大麥糵炒高良薑炒神麯炒白茯苓甘草炒青皮去瓤麵炒厚朴薑汁製炒以上各一兩白乾薑半兩炮上為細末每服二錢吐逆瀉痢不下食或嘔酸苦水翻胃噁心並用水一盞煨生薑半塊拍破同煎鹽一捻安盞中候煎藥及七分熱呷安脾散治翻胃吐食及吃食咽酸日吐黃水曾經諸方不瘥者服之神效頃者以事至臨安寓止詹翁店詹翁年六十餘苦翻胃危殆已治棺在床側予往別去其翁已不能言及再自淮上歸過其門訪問此翁已出迎揖見其顏色極紅潤甚驚異之問其所以乃云有一川官來歇得藥數服遂無事其後授得此方昨以在建康醫朱機宜新婦及近日醫圓通觀維那皆作效其妙不可具述詹承宗書高良薑一兩以百年壁上土二三合敲碎用水二碗煮乾薄切成片草果麵煨去殼南木香胡椒白茯苓白朮丁香懷干人參去蘆陳皮去瓤已上各半兩甘草一兩半炙上同為細末每服二大錢空心食前米飲入鹽點服鹽酒亦得半夏圓治翻胃及不忺飲食楊叔子知府傳甚效半夏湯洗十遍胡椒上等分為細末薑汁為圓如桐子大每服三五十圓薑湯下丁香圓治嘔吐無為徐醫半夏七個湯洗去滑丁香十四粒胡椒二十一粒上同為細末生薑自然汁圓如大雞頭大每用一圓以干棗一枚擘破去核入藥在內以濕紙裹煨熟放溫以米飲湯爛嚼送下丁香溫氣湯治胃寒嘔吐涎沫甚妙張上舍傳云其母常服有效丁香一兩白茯苓二兩人參一兩半去蘆黃耆二兩去蘆白朮一兩半附子二兩炮去皮臍桂心一兩去粗皮高良薑一兩半吳茱萸一兩湯浸微炒半夏一兩半沸湯泡十次甘草七錢炙沉香少許訶子麵煨去核三分上件㕮咀每服四錢水一盞半姜五片棗二個煎七分去滓不拘時候
