body:
  text: 卷之八霍亂門論治霍亂證候夫霍亂之病為卒病之最者以人起居無它揮霍之間便至變亂悶絶不救甚為可畏臨深履危不足以諭有生之流不可不達其旨趣霍亂者心腹卒痛嘔吐下利憎寒發熱頭痛眩暈先心痛則先吐先腹痛則先下心腹俱痛吐利並作甚則轉筋入腹則斃霍亂惡證無越於斯此蓋陰陽反戾清濁相干陽氣暴升陰氣頓墜陰陽痞隔上下奔逸遂成霍亂之疾論乾霍亂證候夫人忽然心腹煩滿短氣不吐不瀉此名為乾霍亂腹痛死人如反掌間此證蓋由風冷搏於腸胃腸胃先實故不吐利治法急以通利和氣為佳三宛湯治乾霍亂不吐不瀉腹脹如鼓築刺心痛柳宗元方鹽二兩生薑一兩切上件藥炒令轉色以童子小便一大盞煎至六分去滓分為二服溫溫服之理中湯治霍亂吐下脹滿食不消心腹痛葉伯材處此數方纍用有效人參乾薑炮白朮甘草炙各三兩上為銼散每服四大錢水一盞煎七分去滓食前遠行防霍亂煉蜜為丸如梧子大每服三五十丸如作散每服方寸匕酒調下亦得若轉筋者加石膏煅三兩若臍上築者腎氣動也去朮加桂心四兩腎惡燥故去朮恐作奔豚故加桂吐多者去朮加生薑三兩下多者復用術悸者加茯苓二兩渴欲得水加朮合前成四兩半腹中痛加人參合前成四兩半若寒者加乾薑合前成四兩半腹滿者去朮加附子服藥後食頃食熱粥一杯微自溫覆勿發揭衣被七氣湯治喜怒憂思悲恐驚七氣鬱發致五臟互相刑剋陰陽反戾揮霍變亂吐利交作寒熱眩暈痞滿咽塞半夏湯洗五兩厚朴薑製桂心各三兩茯苓白芍藥各四兩人參一兩紫蘇葉橘皮各二兩上為銼散每服四錢水盞半姜七片棗一個煎七分去滓空腹服胃氣圓治憂思過度脾肺氣閉聚結涎飲留滯腸胃氣鬱於陰凝寒於陽陰陽反戾吐利交作四肢厥冷頭目眩暈或復發熱兼治老人胃寒大便反祕妊娠惡阻全不納食硫黃不拘多少豬臟內縛兩頭以米泔酒童子小便各一碗煮乾一半取出洗斷穢氣控干稱十兩半夏湯洗去滑稱五兩白茯苓一兩人參一兩石膏一分煅一法同硫黃煮上為末生薑自然汁釋炊餅糊為丸如梧子大每服五十丸至百丸空腹米湯入少生薑汁下真珠散治喜怒不常憂思兼併致臟氣鬱結留積涎飲胸腹滿悶或復㽲痛憎寒發熱吐利俱作附子二個一生一炮各用去皮臍滑石半兩半夏湯二十一次洗去滑一兩半辰砂三錢別研成煉鍾乳半兩上為末每服二錢水二盞姜七片藿香兩三葉蜜半匙煎七分食前冷服小便不利加木通燈心茅根煎紅圓子治脾胃虛冷飲食不節宿食留飲聚癖腸胃或因氣不調沖冒寒濕忽作霍亂吐利並作心腹絞痛腸胃纏刺疲苶不勝蓬莪朮銼三稜銼各二兩同以米醋煮一伏時胡椒一兩青皮三兩炒阿魏一分上為末醋化阿魏入陳米粉為糊丸如梧子大礬朱為衣每服一百丸至二百丸煎生薑甘草湯下胡椒湯治霍亂吐利極妙胡椒七粒豆豆三七粒上為末煎木瓜湯調下水浸丹治伏暑傷冷冷熱不調霍亂吐利口乾煩渴黃丹一兩一分炒巴豆二十五個去皮上同研勻用黃蠟熔作汁和為圓如梧子大每服五圓以水浸少頃別以新汲水吞下不以時候如神湯治霍亂吐厚朴二兩去粗皮生薑汁炙黃高良薑一兩甘草半兩炙上為末以新汲水調下二錢素有冷氣者用溫酒下香朴散治霍亂吐逆及利並腳轉筋厚朴薑汁炙陳皮人參白朮乾木瓜各一兩乾薑炮甘草炙各半兩上為末每服三錢水一中盞以生薑半分煎去滓服不以時候姜附湯治中脘虛寒久積痰水心腹冷痛霍亂轉筋四肢厥逆王德膚治霍亂簡要數方大有神效乾薑二兩熟附二兩上㕮咀每服四錢水一盞半煎七分去滓服或慮此藥太燥即以附子理中湯相繼服縮脾飲止吐利霍亂之後服熱藥太多煩躁者尤宜服草果烏梅甘草縮砂各四兩乾葛二兩上㕮咀每服五錢水一碗生薑十片煎至八分侵以熟水浸冷極冷旋服之平胃散治霍亂及五噎八痞膈氣反胃並宜服之厚朴五兩蒼朮八兩橘紅五兩甘草三兩上㕮咀每服四錢水一盞半姜五片棗一個煎至六分去滓食前服養正丹治霍亂轉筋咳逆不定出寶林真人谷伯陽方一名交泰丹硫黃研細黑錫去滓淨稱與水銀結砂子水銀硃砂細研已上各一兩上用黑盞一隻火上熔黑鉛成汁次入水銀以柳杖子攪勻次下硃砂攪令不見星子放下少時方入硫黃末急攪成汁和勻如有焰以醋灑之候冷取出研如粉極細用糯米粉煮糊為丸如緑豆大每服二十粒加至三十粒鹽湯下此藥升降陰陽既濟心腎空心食前棗湯送下神效不可具述四逆湯治霍亂吐瀉手足厥冷或咳或悸內寒外熱下利清穀四肢沉重甘草一兩乾薑三分熟附三分上㕮咀每服四錢水一盞半煎六分去滓溫服感應圓治霍亂吐瀉大便頻並後重遲澀虛中積冷氣弱有傷停積胃脘不能傳化或因氣傷冷因飢飽食飲酒過多心下堅滿兩脅脹痛心腹大疼高殿前家方新揀丁香一兩半南木香去蘆頭稱一兩半肉豆蔻去粗皮用滑仁子二十個巴豆七十個去皮心膜研細出盡油如粉百草霜用村莊家鍋底上刮細研二兩川乾薑炮裂稱一兩杏仁揀肥者去雙仁者一百上十個去尖湯浸一宿去皮別研極爛如膏上七味除巴豆粉百草霜杏仁三味外餘四味搗為細末與前三味同拌研令細用好蠟匱和先將蠟六兩熔化作汁以重綿濾去滓更以好酒一升於銀石器內煮蠟熔滾數沸傾出候酒冷其蠟自浮於上取蠟稱用圓春夏修合用清油一兩於銚內熬令末散香熟次下酒煮蠟四兩同化作汁就鍋內乘熱拌和前項藥末秋冬修合清油一兩半同煎煮熱作汁和匱藥末成劑分作小鋌子以油單子裹之旋圓服餌
