body:
  text: 卷之三虛損門巢氏論五勞七傷六極證候五勞者志勞思勞心勞憂勞瘦勞又有心勞肝勞肺勞脾勞腎勞心勞者口內生瘡大便苦難忽忽喜忘肝勞者目視不明精神不守面目乾黑肺勞者氣短鼻不聞香臭面目微腫脾勞者舌本苦嚥唾不得腎勞者腰背俯仰難小便黃赤陰濕小腹滿七傷者陰寒陰萎裡急精連精少精清小便數臨事不舉一曰大飽傷脾面黃困乏欲睡二曰大怒傷肝氣逆血少目暗精神昏三曰多欲傷腎少精下冷腰痛四曰寒飲傷肺氣少咳嗽鼻塞五曰憂愁思慮傷心多驚多喜多怒六曰風雨傷形寒暑霧露所傷膚髮枯悴七曰恐懼不節傷志恍惚不寧六極者氣血筋骨肌精氣極令人內虛五臟氣乏邪氣多不欲言血極令人無顏色枯悴忽忽喜忘筋極令人轉筋腳手指皆痛不能久立骨極令人手足煩疼不欲行動又齒痛肌極令人羸瘦面無精光食不生肉精極令人少氣噏噏然內虛五臟氣不足太上紫霞丹升降陰陽神仙藥也福州石醫硫黃四兩研細針沙四兩羅去細者五倍子一兩打破上同用沙鍋內以水煮一時放冷先揀了五倍子不用然後淘去針沙將硫黃用池紙一張於灰上滲令乾團作球用荷葉一枚裹之安地上以大火煅俟藥紅即攔去火經宿研令極細用飯膏和圓如皂角子大陰乾每服一二圓空心白湯下此藥治氣虛頭痛如神太素丹治停寒肺虛痰實喘急咳嗽經久痰中有血及療氣虛感冷臟腑滑泄脾胃羸弱不進飲食此藥治一切危困之疾神效周彥廣侍郎傳煉成鍾乳粉一兩真陽起石二錢新瓦上用熟火煅過通紅為度去火候冷研極細上二味合研令勻用糯米粽子尖拌和為丸如雞頭大臨合時入白石脂一錢須用大盤子不住手轉候八九分堅硬陰乾用新粗布以滑石末出光每服兩粒至三粒空心人參湯或陳米飲下蜀仙丹大壯元氣去百病錢觀文方辰砂四兩細研水飛過杏仁二兩去皮尖研上用宣州木瓜二枚切下蓋子以竹刀斡去瓤先入硃砂實按次入杏仁填滿卻以蓋子覆之用竹籤定以生絹袋子裹之入瓷器中蒸一百遍候數足取出刮去木瓜粗皮一處研細候可圓即圓如綠豆大每服十粒空心溫酒米飲下木瓜忌鐵見鐵即不作效雄朱丹治宿寒痼冷飲食嘔逆經隔五七年即疲瘠異形變為勞瘵錢觀文方硃砂二兩雄黃二兩上用沙合子一個先以牡丹皮二兩內外熏令黃色入前藥在內用釅米醋和臘茶作餅子蓋定以赤石脂固合子口縫又用赤石脂泥裹合子一重再用黃泥紙筋又裹一重約一指厚先以草火燒令合子極干再用五斤火漸漸添至一秤候火力漸消取出掘地坑一尺以來埋一宿去火毒取出細研續入藥附子炮裂去皮臍別為末胡椒官桂去皮赤石脂木香沉香蓽茇丁香白朮已上各一兩乳香半兩與赤石脂同研細上為細末入前煅藥同研勻卻以清酒二升三分熬去二分入附子末煮成糊為丸如梧桐子大每服十圓溫酒鹽湯下空心食前資壽小金丹補益真元治諸虛不足上盛下虛喘急泄瀉手足厥逆小腹結痛翻胃脾寒霍亂嘔吐食不腐化白濁夢遺便多盜汗恍惚虛驚耳鳴目眩久痢赤白腸風痔漏婦人諸疾經候不勻帶下崩中子宮虛冷久無胎孕此丹溫平不僭常服鎮養心氣溢益精神輕身延年活血駐顏峽州王教授云金丹治瘧尤神效代赭石一斤餘糧石四兩石中黃二兩赤石脂五兩一分上四味各研為細末再秤數足同入羅三兩遍再勻研細膩旋旋抄二三匙入盞中滴水圓如桐子大急手圓畢再圓入盤以光實無破裂為度赤石脂性硬故須旋旋圓之待陰乾入新坩堝子內裝載用木炭每排三兩行用炭排十字眼中放藥鍋子再四圍聚木炭以多為佳自頂放熟火令慢慢燒下不得用扇直至火與藥通紅自冷方取出入乾淨瓷器中收每服兩粒或三粒棗湯送下或米飲下婦人艾湯空心食前服王啟玄傳玄珠先生耘苗丹三方序曰張長沙戒人妄服燥烈之藥謂藥勢偏有所助勝克流變則真病生焉猶憫苗不長而揠之者也若稟氣受血不強合服此而不服反忽略之是不耘苗者也上丹養五臟補不足秘固真元均調二氣和暢榮衛保神守中久服輕身耐老健力能食明目降心火交腎水益精氣男子絕陽庶事不堪女子絕陰乃不能妊腰膝重痛筋骨衰敗面色黧黑心勞志昏寤寐恍惚煩憒多倦餘瀝夢遺膀胱邪熱五勞七傷肌肉羸瘁上熱下冷難任補藥服之半月陰陽自和容色肌肉光潤悅澤開心意安魂魄消飲食養胃氣五味子半斤百部酒浸別研肉蓯蓉酒浸杜仲炒斷絲巴戟去心遠志去心枸杞子防風去叉白茯苓蛇床子山藥柏子仁別研菟絲子酒浸別研已上各二兩上為末蜜丸梧子大食前溫酒鹽湯任下三十丸春煎乾棗湯夏加五味子四兩四季月加蓯蓉六兩秋加枸杞子六兩冬加遠志六兩食後兼服衛生湯衛生湯補虛勞強五臟除煩養真退邪熱順血脈緩中安和神志潤澤容色常服通暢血脈不生癰瘍養胃益津當歸白芍藥各二兩黃耆八兩甘草炙一兩上為銼散每服四錢水盞半煎七分去滓不以時年老加酒半盞煎中丹補百損體劣少氣喜驚昏憒上焦客熱中脘冷痰不能多食心腹弦滿脾胃氣衰精血妄行容色枯悴黃耆白芍藥當歸各四兩白茯苓人參桂心各二兩川椒炒出汗一兩大附子炮去皮臍一兩黃芩一兩先為末薑汁和作餅上為末粟米飲搜和得所搗千杵丸如梧子大酒飲任下三五十丸食前服小丹補勞益血去風冷百病諸虛不足老人精枯神耗女子絕傷斷緒久服益壽延年安寧神志魂魄流滋氣血脈絡開益智慧釋散風濕耳目聰明筋力強壯肌膚悅澤氣宇泰定熟地黃肉蓯蓉酒浸各六兩五味子菟絲子酒浸各五兩柏子仁六兩別研石斛巴戟去心天門冬去心蛇床子炒覆盆子各三兩續斷澤瀉人參山藥遠志去心炒焦山茱萸菖蒲桂心白茯苓杜仲銼炒絲斷各二兩天雄炮去皮臍一兩煉成鍾乳粉扶衰三兩續老二兩常服一兩氣完則刪去上為末蜜丸如梧子大食前酒服三十丸至五十丸忌五辛生蔥蕪荑餳鯉虛人多去鍾乳倍地黃多忘倍遠志茯苓少氣神虛倍覆盆子欲光澤倍柏子仁風虛倍天雄虛寒倍桂心小便赤濁三倍茯苓一倍澤瀉吐逆倍人參張承節論勞瘵證嘗觀勞經言傳屍瘵疾其蟲如人似鬼形狀可畏及患者多相繼而夭愚見考之斷無是理以此觀之譬如俗談不曉事人害相思病也與一婦人情密忽而別離念念不捨至於失寐忘餐便覺容顏瘦瘁再償所願如沉疴去體恍然而釋其勞病之說豈不類此經云悲則氣耗思則氣結伏郁不散久則氣血俱虛令人發寒發熱飲食減少相搏作痛或因感冒遂添咳嗽非嗽也緣氣虛易感風寒在肺為嗽久而著床便作勞病治之服柴胡地骨皮秦艽之屬涼藥退熱致令真氣消散喪命之源古之廣客蛇影仿此不可不審因書為後人之警青蒿膏治骨蒸勞熱曾醫洛陽周秀才小娘子自為青蒿膏在旅不能辨令渠自作膏病者恨患自親手熬至成膏只或火伴出一身汗而愈更不曾服此藥只更調青蒿酒一杯吃肌肉再生飲食增美此患永痊此方得自潁陽賣五熟一隱者聞金人殺逼撞入石中後不復見青蒿二秤淨洗控干上以水三斗煎令滾後入蒿一秤煎令黃色熟濾出又入一秤煮如此遍盡用生布絞壓汁在前者湯內細濾過熬將稠換沙鍋內熬以竹箅攪不得令住直候成膏以淨瓷器貯之上如患輕者只此膏酒調更用青蒿煎此酒下一錢食後服若骨蒸患重甚者用自然銅先捶碎入銚子內炒令無鬼焰止取鋪地上盆覆出火毒一日乳缽研細膏為圓如彈子煎青蒿酒化下被蓋臥取汗出為效此藥極神效保靈丹治丈夫婦人傳屍勞斷一切邪夢張丞節方天靈蓋一個蔡州者鬼箭白朮炒令黃虎頭骨塗酥炙令黃已上各一兩上四味細搗羅為末後更用好硃砂雄黃麝香各一兩並細研如粉同拌勻煉蜜為丸如梧桐子大每服十九至二十丸煎安息香湯下米飲亦得一日二服不得嚼破如修合時須是揀子寅辰午申戌日合和餘日及午後並不得合香甲桃仁散治五勞乾瘦及傳屍夢寐不祥日漸消瘦肌體困倦骨節疼痛不思飲食宜服此藥最妙天靈蓋半兩酥炙黃色鱉甲一兩酥炙令黃色柴胡三分去苗安息香半兩地骨皮三分山梔子仁半兩人參半兩去蘆頭赤茯苓三分去皮貝母半兩桃仁半兩麩炒熟去皮尖麥門冬三分去心阿魏半分麵裹煨令面熟黃連半兩去須生地黃三分檳榔半兩當歸半兩上件為粗散每服四錢童子小便一大盞入蔥白莖五寸桃柳枝各七寸生薑錢子二片同煎至五分不計時候服夜後煎下放患人床頭至五更已來必夢人來辭別此是藥效也玉抱肚治停寒痼冷心腹刺痛常繫於臍腹間甚妙梁縣鄭主簿渙傳一方用針砂如上法炒訖止入硇砂半兩並不用余藥針砂四兩鐵銚內火炒用木或竹棒兒不住手攪煙出盡為度放冷白礬半兩硇砂一錢粉霜半錢上件白礬等三味同研為細末與針砂拌和只作一服以水數點灑用匙拌攤令勻厚皮紙為貼闊二寸以上長四五寸貼之外以帕子包系疼處或嘗系臍下如覺太熱即以衣襯之若藥力過再灑水如前拌用其熱如初可用四五次藥力退即將針砂再炒過別入余藥仍可用麋茸圓治腎經虛腰不能轉側許學士云戊戌年八月淮南大水城下浸灌者連月予忽臟腑不調腹中如冰吼數日調治得愈自此腰痛不可屈折雖赬面亦相妨服遍藥不效如是凡三月予後思之此必水氣陰盛腎經感此而得乃灸腎俞三七壯服此藥瘥麋茸一兩治如鹿茸無麋茸以鹿茸代菟絲子取末一兩舶上茴香半兩上為末以羊腎二對法酒煮爛去膜研如泥和圓如梧子大陰乾如腎膏少入酒糊佐之每服三五十圓溫酒鹽湯下八仙丹治虛損補精髓壯筋骨益心智安魂魄令人悅澤駐顏輕身延年益壽閉固天癸有人年幾七旬夢漏羸弱氣惙惙然虛損得此方服之頓爾強壯精氣閉固飲食如舊予常制自服良驗伏火硃砂真磁石赤石脂代赭石石中黃禹餘糧六味並用醋淬乳香沒藥八味各一兩上為細末勻研極細糯米濃飲丸如梧子大或如豆大每服一粒空心鹽湯下混元胎丹乃陰陽始生之物氣精血初生之英華蓋人元宮真氣所化修真之士服餌補漏壯氣固神益髓通神明延壽命增益道涯超範圍外內丹之基具服餌方如後久無嗣息者服此有驗以首兒衣二八月者不用收時連帶中元血收用長流水淨洗控干入瓷瓶中下無灰法酒三大升腦子麝香隨力下之多止一錢或半錢以紙封瓶口下用文武火煅候酒將盡取出再入酒三勝依前煅卻用竹篦或金銀篦不住攪以覺爛糜似粥模樣待冷取入砂盆內細研如粉別入外料人參二兩茯苓二兩乳香半兩硃砂半兩水飛晾乾取淨山藥四兩上併為細末入於所煮藥內如干時更用原煅酒旋旋添拌勻一處攪搜為圓梧桐子大慢火焙乾每日空心五十粒加至一百粒用溫酒鹽湯下良久用甜淡飲食飽壓逐日葷味中減少五味謂甜淡咸等物服至五七日微覺小腹連腰沉重不須疑慮乃是藥力攻元氣相輔助如此蓯蓉茸附圓平補真元益養脾腎固精壯氣暖胃思食督府王翰林方丞相兄舊苦腳氣自服此藥十餘年不作鹿茸一兩先用草燒去毛切作片子用酥炙令香熟為度真烏藥一兩蓯蓉四兩酒浸一宿切作片子焙乾川五味子一兩牛膝二兩酒浸一宿切焙熟乾地黃二兩炒焙附子一兩炮去皮臍菟絲子六兩酒浸兩宿炒令半乾搗作餅子焙白朮一兩補骨脂炒胡蘆巴炒茴香炒干淡木瓜上各一兩沉香一分木香一錢麵煨丁香二錢不見火上件搗羅為細末酒糊為丸如梧桐子大每服三五十丸空心臨臥米飲溫酒鹽湯下
