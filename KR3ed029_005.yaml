body:
  text: 卷之五盜汗門巢氏虛勞盜汗證候盜汗者因眠睡而身體流汗也此由陽虛所致久不已令人羸瘠枯瘦心氣不足亡津液故也或自汗多因傷風傷暑及喜怒驚恐房室虛勞皆能致之無問昏醒浸浸自出者名曰自汗或云寢汗若其飲食勞役負重涉遠登頓疾走因動汗出非自汗也人之氣血猶陰陽之水火平則寧偏則病陰虛陽必湊故發熱自汗如水熱自湧陽虛陰必乘故發厥自汗如水溢自流考其所因風暑涉外喜怒驚恐涉內房室虛勞不內外理亦甚明牡蠣散治諸虛不足及新病暴虛津液不固體常自汗夜臥即甚久而不止羸瘠枯瘦心忪驚惕短氣煩倦牡蠣米泔浸去土煅取粉麻黃根黃耆各一兩上為銼散每服三錢水一盞半小麥百餘粒同煎至八分去滓不拘時又一方為細末每三錢水三盞蔥白三寸煎一盞半分三服麥煎散治榮衛不調夜多盜汗四肢煩疼飲食進退肌瘦面黃秦艽二兩柴胡去苗二兩大鱉甲二兩醋煮三五十沸淨去裙襤別用醋塗炙黃乾漆炒青煙盡人參茯苓乾葛川烏炮去皮尖各一兩玄參三兩上為末每服二錢先用小麥三七粒煎湯一盞去麥入藥煎七分食後溫服或臨臥服如久患後亦宜服此以退其勞倦調順經絡大建中湯治虛熱盜汗百節痠疼腰痛肢體倦怠日漸羸弱口苦舌澀心怔短氣素問云腎病傳心筋脈相引而急小腹痛熱出白液又左傳云以喪志名為蠱病乃真精不守也若小便滑數日夜無度由脬門不閉水液不藏因思慮過多心氣散溢服之尤妙綿黃耆炙遠志燈心煮去心當歸洗澤瀉各三兩白芍藥龍骨人參各二兩甘草一兩炙上㕮咀四錢重水二大盞生薑五片同煎八分去滓熱服氣弱加附子二兩炮用腰痛筋急增官桂去皮一兩白朮散治盜汗陳氏云余為通倅日得於同官翟且叟每傳與人無不作效好白朮四兩切作小骰子塊勞作四分黃耆一兩炒一分金叉石斛一兩炒一分牡蠣一兩炒一分麥麩一兩炒一分上去四味只將白朮四兩碾為細末每服二錢用粟米三百粒煎湯調空心服牡蠣湯治盜汗吳內翰備急方云余家有婦人盜汗服之即愈後試之纍驗牡蠣火煅為細末小麥麩炒黑焦為末上各貼之每服牡蠣末一錢麩末二錢以熟豬皮去盡脂膜煎湯臨臥調服粟米粉治體虛自汗趙從簡通判傳此二方牡蠣粉煅過研麻黃根為末粟米為粉上等分和勻生絹袋之時以撲身蒸餅法臨臥時放令少飢吃宿蒸餅一枚不可吃湯水只干吃盡便就枕不過兩次即止人參當歸散治心液為汗宜服此藥收斂心經富次律云史丞相家方渠與王叔東母子皆曾取效人參去蘆切片川當歸去蘆並細者片切上二味等分每服稱五錢先用豬心一枚破作數片並心內血煎湯澄清汁煎藥服朮附散治盜汗不止孫盈仲云紹興壬子冬豫病中親曾服此藥的有神驗附子炮裂去皮臍切作骰子塊如小指面大碎者不用與小麥同炒以附子黃色為度如麥先焦即易之易三五次不妨白朮白茯苓上三味等分碾為細末米飲調下食前茯苓散治脾虛盜汗華宮使傳白朮三兩白茯苓二兩上為粗末每服五錢水一盞半生薑三片棗二枚煎至八分去滓通口服空心食前三服粉汗散止汗出過多明州陳山谷道人傳此四方麻黃根一兩龍骨半兩牡蠣一兩火煅赤石脂半兩上件為細末以絹袋盛如撲粉用之椒目散治盜汗日久不止麻黃根椒目各等分上件為細末每服一錢無灰酒調乘熱食後服黃耆散治盜汗黃耆洗淨控干浮小麥淘淨控干上不以多寡州黃耆如麻豆大以鹽拌和炒令香熟篩揀去鹽卻以浮麥淘淨控干每一服用黃耆浮麥各五錢水一盞半煎至八分空心食前通口服麻黃散治虛汗麻黃根半兩半夏一錢天花粉一錢上件為細末臨睡米醋調敷兩乳上止汗溫粉川芎白芷藁本上併為細末各一分入米粉三分綿裹撲於身上漸覺其病自愈也杏子湯治發熱惡風自汗嗜臥身重小便難潮熱而噦葉伯才三因方集此自汗三方杏仁去皮尖半夏湯去滑五味子各二錢半芍藥桂心細辛乾薑炮大黃蒸甘草炙各三錢茯苓四錢上㕮咀每服四錢水一盞半煎至七分去滓食前服卻暑散治冒暑伏熱自汗頭目眩暈嘔吐泄利煩渴背寒面垢赤茯苓甘草生各四兩寒食麵生薑切搜面令勻各一斤上為末每服兩錢新汲水調下或湯點服不以時防己黃耆湯治傷風濕寒脈浮緊細身重自汗惡風並治風水脈浮身重不渴防己四兩黃耆五兩甘草炙二兩白朮三兩上為銼散每服五錢水盞半薑五片棗兩枚煎七分去滓空腹服喘者加麻黃胃中不和加芍藥氣上衝加桂下有陳寒加細辛服藥後當如蟲行皮中從腰以下如水中坐被上又以一被繞腰以溫下令微汗瘥硃砂散治盜汗硃砂研水飛白芷上等分為末和勻臨臥酒調下二錢左顧散治盜汗左顧牡蠣粉火煅為粗末入瓶中泥固濟候乾卻以火煅令紅為度麻黃根炒甘草蘆頭炒蛀小麥炒上各等分為粗末二錢水一盞薑七片煎至七分去滓服當歸散治盜汗當歸半兩人參半兩豬心一個分四片上每用一片水三盞煎至一盞半作三服防風散治盜汗防風上為末用浮麥煎湯服之每至大屋則凜須以帳幕遮蔽用此即安
