body:
  text: 卷之十八疹痘門治小兒斑瘡疹痘證候凡小兒瘡疹之候乃天行時氣熱不能解蘊積於胃而胃主肌肉毒氣熏發於肌肉狀如蚊子所齧乃成斑毒也赤者十生一死黑者十死一生此候五臟各有所主肝臟熱而成水泡肺臟膿泡心臟發斑脾臟細疹俗為之膚瘡也腎臟黑色此乃陽病屬火而歸腎水熱已極矣不可治凡瘡疹之疾不問輕重當先護目免斑瘡入眼而生翳障余經驗方備錄於後錢氏云睦親它一大王病瘡疹始用一李醫又名錢氏錢留抱龍圓三服李以藥下之其疹稠密錢見大驚曰若非轉下則為逆病王言李已用藥下之錢曰瘡疹始出未有他證不可下也但當用平和藥頻與乳食不受風冷可也如瘡疹三日不出或出不快即微發之微發不出即加藥加藥不出即大發之如大發後不多及脈平無證者而瘡本稀不可更發也有大熱者當利小便小熱者當解毒若出快勿發勿下故止用抱龍圓治之瘡痂若起能食者大黃圓下之一二行即止今先下一日瘡疹未能出盡而稠密甚則難治此誤也縱得安其病有三一者疥二者癰三者目赤李不能治經三日黑陷復召錢氏錢氏曰幸不發寒而病未困也遂用百祥圓為藥以牛李圓為助各一大服至五日間瘡復紅活七日而愈蓋黑者歸腎也腎旺勝脾土不剋水故脾虛寒戰則難治所用百祥圓者以瀉膀胱之腑腑若不實臟自不盛也何以不瀉腎曰腎主虛不受瀉故二服不效即加寒而死抱龍圓治一切風熱中暑驚悸瘡疹欲出多睡咳嗽涎盛面赤手足冷發溫壯睡中驚搐搦不寧脈洪數頭痛嘔吐小便赤黃錢氏用此方大有神效天南星銼開里白者生為末臘月內取黃牛膽汁和為劑卻入膽內陰乾再為末半斤天竺黃二兩別研硃砂二錢研水飛雄黃半兩研水飛麝香好者錢別研牛黃一字別研上同研極細甘草水和圓雞頭大窨干二歲兒竹葉或薄荷湯化下一圓不拘時候紫草散治伏熱在胃經暴發痘疱瘡疹一切惡候出不快小便赤澀心腹腫滿紫草去苗一兩甘草生用半兩木通去根節細銼枳殼麩炒去瓤黃耆炙銼各半兩上為細末每服二錢水一盞煎至六分去滓溫時時呷之牛李圓治瘡疹痘疱惡候見於皮膚下不出或出而不長及黑紫內陷服之即順救危急候愚小年病此危惡殆極父母已不忍視遇今太醫丞錢公乙下此藥得安因懇求真法然此方得於世甚久惟於收時不知早晚故無全效今並收時載之用者宜依此方牛李子九月後取研絹濾汁不以多少於銀石器中熬成膏可圓每膏二兩細研好麝香入半錢上每二歲兒服一圓如桐子大漿水煎杏膠湯化下如瘡疱紫黑內陷者不過再服當取下惡血及魚子相似其已黑陷於皮下者即紅大而出神效胡荽酒治痘疹快出大有神效胡荽細切四兩以好酒二盞煎一二沸入胡荽再煎少時用物合定放冷上每吸一兩口微噴從頂至足勻遍勿噴頭面病人左右常令有胡荽即能闢去汗氣瘡疹出快瘡疹忌外人及穢觸乏物雖不可受風冷然亦不可壅遏常令衣服得中並虛涼處坐臥四聖散治瘡疹出不快及倒厭紫草茸木通銼甘草銼炒枳殼麩炒去瓤秤黃耆切焙等分上同為粗末每服一錢水一中盞煎八分溫服無時黃檗膏治小兒疹痘出後即須愛護面目勿令沾染欲用胡荽酒噴時先用此方塗面上然後方可噴四肢大人嬰孩有此疾悉宜用此方甚妙黃檗一兩綠豆一兩半甘草四兩生用上件搗羅為末每研令細後以生麻油調如膏從耳前眼眶並厚塗日三五遍止塗面後可用胡荽酒噴也早用此方塗於面上令不生疹痘也如用此方塗遲縱出疹痘亦少柿楂子散治瘡疹不透乾黑危困神妙蘇韜光云其家累世用此甚佳柿楂子圖經本草名糖球惟滁州者入藥上為細末每服二錢紫草酒調下小兒量大小加減徐徐三兩服即紅活升麻湯治大人小兒傷風寒溫疫頭痛寒熱體疼斑瘡已發未發並可服升麻乾葛甘草炙芍藥各等分上為銼散每服秤五錢重水二盞煎七分去滓熱服小兒量與一法加紫草茸煎仙靈散治斑瘡入眼仙靈脾威靈仙上各等分為末每服二錢食後米湯調下大和散治痘瘡後寒熱往來嗜臥煩躁悶亂楊氏方生地黃川當歸洗去蘆地骨皮人參去蘆甘草炙赤芍藥上件等分㕮咀每服一錢水半盞煎至三分去滓通口服消毒散治瘡疹未出或已出未能勻遍又治一切瘡涼膈去痰治咽喉牛蒡子二兩炒甘草半兩銼炒荊芥穗一分上為粗末每服三錢水一盞半煎至一盞溫服不拘時候調肝散治瘡疹太盛宜服此方令不入眼生犀銼取末一分草龍膽半錢黃耆半兩切大黃去皮二錢石膏半兩桑白皮自採焙乾鉤藤鉤子麻黃去節各一分瓜蔞去皮甘草炙各等分上為粗末每服二錢水一盞煎半盞食後時時溫服少許治瘡疹入眼馬屁勃半兩皂角子十四個蛇皮半兩上入小罐子內鹽泥固濟燒存性研細溫酒調下一二錢食後服又方治瘡疹入眼成翳瓜蔞根半兩蛇皮二錢上同為細末用羊子肝一個批開入藥末二錢麻纏定米泔煮熟頻與食之未能食肝令乳母多食治痘瘡黑陷藥不能發神驗秘方穿山甲上一味燒存性為細末入麝香當門子少許一歲半錢三歲一錢只溫酒調下一服見效雖遍身黑而欲絕亦能暫蘇而發紅色但目閉無魂者不復生矣歌曰未先五日顫如寒不覺生驚又似癇心熱又同蚊子齧眼睛赤色臉紅鮮發豎手心如火熱更兼睡里作狂言躁熱嫌人撥手睡又加氣急喘相連須知此候先宜表遲卻流得入臟間若得神仙真妙訣定須七日自然安治瘡疹之法如傷寒一同初當表發其病在腑則出細疹失表其熱不退便出其病在臟必發痘瘡得其妙理方不失一湯火門紫雪治湯燙火燒痛不可忍或潰爛成惡瘡松樹皮剝下陰乾為細末入輕粉少許生油調稀敷如敷不住紗絹帛縛定即生痂神效不可言然宜預先合下以備急自剝落而薄者尤妙治湯火瘡雖膿水出皮肉潰爛者不過敷三兩次即安上以蛇莓爛搗敷之以瘥為度錢文子佃客因遺漏燒灼遍身皆潰偶一道人傳此用之既安更無疤痕本草不言治湯火傷治湯火傷瘡膿爛痛不可忍者李莫安撫方上用牛皮膠入少湯於火上溶稠狗毛剪碎以膠和毛攤軟帛封之直至痂脫不痛吳內翰家婢夜炊末釜翻傷腿膝以夜不敢白此曉已潰爛用此治之隨手即愈又方以箬葉燒存性灰敷煮酒瓶頭箬尤妙又方仍無疤痕孫盈仲所傳上以雞子清塗之神效一方雞子殼燒灰油調敷又方王仲杞傳上以乾甑萆燒存性灰敷之又方張德俊云頃年和倅餘杭人將赴官因蒸降真木犀香自開甑面撲甑上為熱氣所熏面即浮腫口眼皆為之閉更數醫不能治最後一醫云古無此證請以意療之於是取僧寺久用炊布燒灰存性隨敷隨消不半日而愈蓋以炊布受湯上氣多返用以出湯毒亦猶以鹽水取鹹味耳醫者之智亦可喜又方用白瓷器末湯煮過碾極細以油調塗立效或又用煉銀坩堝子搗細調塗亦可治湯火燒已潰膿出不已者先以山梔子煎湯放溫洗淨搵干以赤焦大油餅炭火上燒存性灰研細敷之又方上以大黃用米醋調敷或倉卒不能得末只於新淨瓷瓦器上以醋磨敷亦可至聖膏治湯火傷無疤痕上以雞子黃一兩用銀器內熬成自然油調好粉敷之
