body:
  text: 卷之十四淋閉門治諸淋閉結證候諸淋大率有五曰冷曰熱曰膏曰血曰石五種不同皆以氣為本多因淫情交錯內外兼併清濁相干陰陽不順結在下焦遂為淋閉寬氣湯利三焦順臟腑治大便多祕孫盈仲傳呂子厚右司閣中服之有效香附子六兩須新沙盆內打令淨潔焙乾稱烏藥二兩去心取肉稱須用真天台者縮砂仁一兩甘草一兩一分炒上為細末每服一大錢濃煎橘皮湯下不拘時候此方比官局小烏沉湯加縮砂仁分兩不同蔥白阿膠散治老人虛人大便不通吳內翰母夫人服之效蔥白一條阿膠一斤上先將蔥白以水煎候蔥熟不用入阿膠溶開溫服皂角湯治風祕攢宮有一老人患八九日不通有木匠授以此方只一服見效不蛀皂角當中取一寸許去黑皮上以沸湯半盞泡上用盞蓋定候通口服之先辦少粥通後即食琥珀散治老人虛人小便不通吳內翰方陳彥修侍郎服驗琥珀上研如粉人參湯調下一錢止瓜蔞散治腹脹小便不通紹興劉駐泊汝翼云魏蟇知明州時宅庫之妻患此疾垂殆隨行御醫某人治此藥令服遂愈瓜蔞不拘多少上焙乾碾為末每服三錢重熱酒調下不能飲者以米飲下頻進數服以通為度蔥豉膏治大小便不通顏尚書方屢驗連根蔥蔥根不得洗淡豆豉二十一粒上用鹽一捻生薑一塊胡桃大同研令爛炒溫填臍內以絹帛縛定良久即通硫黃圓治腹肚脹痛臟腑祕俞教授方甚驗蒼朮厚朴薑汁炙陳皮各一兩生好硫黃二兩用蘿蔔煎沸湯浴之三兩次上搗羅為末浸蒸餅糊為丸如梧子大每服三十丸五十丸日兩服米湯下生附散治冷淋小便祕澀數起不通竅中疼痛憎寒凜凜多因飲水過度或為寒泣心虛志耗皆有此證附子去皮臍生用滑石各半兩瞿麥木通各三分半夏湯洗七次三分上為末每服二大錢水二盞姜七片燈心二十莖蜜半匙煎七分空腹服石韋散治熱淋多因腎氣不足膀胱有熱水道不通淋瀝不宣出少起數臍腹急痛蓄作有時勞倦即發或尿如豆汁或便出砂石葉伯材處此數方大有神效木通石韋去毛各二兩甘草王不留行當歸各一兩滑石白朮瞿麥芍藥葵子各三兩上為細末每服二錢煎小麥湯調下食前日三兼治大病餘熱不解後為淋者地膚子湯治下焦有熱及諸淋閉不通地膚子三兩知母黃芩豬苓去皮瞿麥枳實麩炒升麻通草葵子炒海藻洗去腥各二兩上為銼散每服四錢水一盞半煎七分去滓空腹服立效散治血淋多因下焦結熱小便黃赤淋閉疼痛所出如血或外挾風冷風熱或內傷志勞神或房室過度丹石發動便鮮赤者為風熱傷心瘀血者為風冷傷腎及小便俱出血者麥穗一兩甘草炙三分山梔子炒半兩上同為末每五錢至七錢水一碗入連須蔥根七個燈心五十莖生薑五片同煎至七分時時溫服不拘時候經云血寒則瘀此藥未必勻治宜煎木通湯下麝香鹿茸圓菟絲子圓等所以養生方云不可專以血得熱則淖溢為說於理甚明不復詳引沉香散治氣淋多因五內鬱結氣不得舒陰滯於陽而致壅閉小腹脹滿使溺不通大氣分泄小便方利沉香不焙石韋去毛滑石王不留行當歸炒各半兩葵子炒白芍藥各三分甘草炙橘皮各一分上為細末每服二錢煎大麥飲調下飲調亦得食前霹靂煎治大便不通纍服轉藥不能通者出張仲景經驗方好蜜一匙頭上於銚內熬不住以匙攪次下鹽一錢成膏以匙刮出急手擀之如小棗大蓮子形放冷自硬先以溫水浴下部次用油塗藥丸子深內入穀道中如人行三里取下腹內積聚惡物便與承氣湯散吃如一丸未透再用一丸如三丸不通是臟氣絶也子芩散治血淋甘草芎藭伏龍膽乃灶下黃土是也已上各一兩子芩赤芍藥以上各二兩上件藥粗搗羅用水一升藥半兩煎至七合分三服去滓溫服一日服盡以變色為大效石韋飲子治氣淋小遺澀痛石韋湯浸刷去皮一兩瞿麥一兩木通陳橘皮三分去瓤炒茯苓芍藥桑白皮以上各三分人參二分上件藥杵羅為細末每服二錢入生薑一分水一大盞煎至七分溫服早食後臨臥各一服忌冷物蠟丸子治淋經效方黃蠟二兩淨銚子內化木香肉豆蔻各一分為細末硇砂半兩研水飛去砂石燈心二束子寸切上件藥末並燈心併入蠟油銚子內鐵箸攪候煙盡煙青細便可放冷取出丸如梧桐子以溫酒調舶上茴香末一錢下每服三丸炒燈心欲煙盡然後入三味藥更炒移時候稍冷丸之大效香枳湯治大腸祕澀調風順氣宜服此方枳殼一兩去瓤麩炒防風一兩甘草半兩炙上三味並搗羅為細散每服二大錢百沸湯點服空心食前各一服麻皮散治熱淋小腹脹滿急痛麻皮一兩甘草三分炙微赤上件細銼水二大盞煎一盞三分去滓食前分三服發背門治發背癰疽證候發背癰疽者該三因而有之論云癰疽瘰癧不問虛實寒熱皆由氣鬱而成經亦云氣宿於經絡與血俱澀而不行壅結為癰疽不言熱之所作而後成癰者此乃因喜怒憂思有所鬱而成也又論云身有熱破風冷搏之血脈凝泣不行熱氣壅結而成亦有陰虛陽氣湊襲寒化為熱熱成則肉腐為膿者此乃外因寒熱風濕所傷而成也又服丹石及炙煿酒面溫床厚被所致又盡力房室精虛氣竭所致者此乃因不內外所傷而成也故知三因備矣千金內補散治癰疽發背惡肌不盡服此消肌生肉近胡丞得一方甚寶祕之持以獻洪丞相丞相與之作序言重於世已遍行矣其方乃此方也添黃耆加人參減桂間有輕者服之稍效若真癰疽為害反甚內補散當用在第四節當前服內消等藥俟膿盡方得投苟專用之亦所謂守一法也孔子不嘗未達之藥者良有旨哉士夫當深味斯言無輕信醫方誤天下後世謹之當歸桂心各二兩人參川芎厚朴薑製炒防風甘草炙白芷桔梗各一兩上為末每服二錢匕酒調空腹服不能飲酒以木香湯調下鹿朴散治腦疽發背腎癰奶癰一切瘡腫等疾詹判院傳鹿朴在處人取其葉搗汁投溪潭中以醉魚江西人謂之魚酩草紹興人謂之鹿木上臘中取根搗銼為㕮咀每服三四大錢無灰酒一大盞煎至七分盞去滓空心食前帶熱服忌蔥醬酒等煎時不得犯銅鐵器病深者日進三四服並不用膏藥貼無問男子婦人癃老幼小遠年近歲體虛氣實一切瘡腫凡在身者種類殊異悉皆治之已潰膿自出未潰毒自消不耗真元不動臟腑入少甘草石薜荔同煎尤佳有娠婦人不可服瓜蔞酒治一切癰疽發背瘡腫治便毒最效韓市舶寧道方此即淮西趙參議所傳劉鵬察院萬金散東平陳彥哲有序多不復録如大便祕澀可服拔毒黃耆散大甘草半兩為粗末沒藥一分研大瓜蔞一個去皮切上三物用無灰酒三升熬至一升放溫頓服之如一服不盡分三服連進屢有神效粉草湯治穀道前後所生癰謂之懸癰韶州醫人劉從周方林謙之祭酒傳粉草好者一兩四寸截斷上以溪澗長流水一碗井河水不可用文武火慢慢蘸水炙之約自早至午後炙水令盡不可急性擘甘草心覺水潤然後為透細銼卻用無灰酒二小青碗入上件甘草煎至一碗溫服之一二服便可保元虞此病初發如松子大漸如蓮子數十日後始覺赤腫如桃李即破若破則難治服此藥雖不能急消過二十餘日必消盡矣投兩服亦無害林判院康朝嘗患此癰已破服此藥兩服瘡即合甚妙阿膠散治癰疽發背湯壽資云光州有人患腎癰大小便皆祕甚以為苦本州胡判官令以此方云凡瘡腫皆可服不計多少以臟腑通利為度牛皮膠明淨者不以多少上炭上燒成黑灰研極細每服五錢以米飲調下服至二兩許方通所下者皆穢惡物癰腫遂消不復出膿仙翁指授散徐仙芝圓者為陰方者為陽陰陽對生面青背紫莖紫黑色根盤如蜈蚣四葉對芳五月而花有花無實凌冬不調叢秀異於他草生於深山大澤水石之間採以五月五日採訖擇根令齊便於急水中擺去砂土掛於微帶風日處不可令把束重疊恐爛不佳而氣味無力方圓各收一處不可相雜既干臨時用方圓與兩根各作一苞無令差誤每用磨子磨之不得近鐵再三取極細為度忌僧尼婦人孝子雞犬一切厭穢見之揀天德月德天醫或七月七日吉日合之如此法則其驗如神尋常疏縱不依此法但功效差遲耳方具於後殺毒定瘡敷散初入門下第一服用釅醋調根敷其頭圓者敷其右方者敷其左一個時辰當住痛而不住加一服又不住可加後藥仙芝根葉共一兩半櫸寄生半兩夜明砂一分准前厚調敷之風毒甚極加趙侯須一兩本草名敗醬絲瓜半兩生者佳冬月無可霜前收臨時術之以敷生者則細切石臼中研絞汁以一盞當一兩不用醋調只用汁調更佳此物亦有陰陽長者為陽短肥為陰可偶用之如煙漿沸潑風毒火丹甚者可加夜明砂服通前半兩真牛黃一字犀角水磨盡半錢不然細末之准前不用醋調以絲瓜汁犀角水調敷服食仙翁指授散仙芝四兩方圓根莖枝葉對用謂如個多則宜多圓個少准常法絲瓜一兩夜明砂一分每用三大錢溫酒調下病在上者先食後服凡毒盛者加趙侯須一兩犀角末半錢每三錢酒下飲酒悶者木通湯下如煙漿者加牛黃一錢赤茯苓半錢上用酒下老翁神杖散櫸柳樹上老寄生藤自地下量起與人額齊以下者不用以上者取七尺如無取三尺六寸每條皆如此若只一藤一枝則止一藤二枝取二吉日採無令人多見採歸以瓷片子輕手刮去外黃皮不用再以片刮中白肉直見骨心乃不用取訖以瓦上微慢火焙乾磨子磨之五月五日尤佳寄生一兩夜明砂一分上為細末二錢溫酒調下催服依仙芝式敷藥如前以醋調絲瓜汁尤佳玉女飛花散蜀桑根大者即芫花根不磨木臼搗用上五月五日採輕輕水中洗去土燒淡醋令沸以花根於醋中一走過覺色變白如寄生法取之當日採當日合刮令極細須用利瓷片而慢手乃可每服一字溫酒一大盞放藥於盞面上良久花飛開下日催如入門式敷以絲瓜汁調醋亦可趙侯須散趙侯須一大握乾者四兩為一服苦辣回根七寸甘草節三寸乳香一錢穿山荷根七寸蒲桃藤根上生搗為粗末煎去滓乾者為細末上件為一劑分三服每服用好酒三升半煎七分三服敷酒調依上方黃真君妙貼散硫黃好者不以多少乳香半兩上用蕎麥麵為窩子包黃在內於三斤熟火中煅令黃黑取出入乳香研細用井花水調以熟絹剪如腫樣貼之留竅日兩易如聖青龍散治發背如初覺背上有瘡癤不以大小或疼或癢無頭內攻向里腫硬如湯火燒燥渴不思飲食王史經驗方薜荔葉小者取一握上用新水一碗於瓷器中煎十餘沸放溫臨臥一服兩銀盞許如未解熱燥再一服下瘡根惡物為應聖效散潘氏方治癰背纍有效黃檗末一兩炒令變色微紫熟乾地黃末三錢略炒檳榔末三錢木香末二錢同上二味炒令微黃色上勻為細末如大膿已盡即更入雞內金二錢令生肌也黃耆湯常器之方黃耆一兩桔梗一兩甘草一兩藿香葉三錢青皮半兩不去白乾葛半兩如不渴減半瓜蔞根三錢如不渴減半上為粗末每服四錢匕水一盞半煎至一盞頻頻服之氣弱人細呷乳香散治發背內潰及諸惡毒衝心嘔痛三兩服救一命凡瘡日宜一兩服內托毒氣使出外不內攻豫嘉祐庚子赴官南宮舟過彭門郡守兵部寇公以中伏日召會於府園是時家人左腋下苦大瘡舟中隘熱亟欲解行以是白公不待終席獨去公曰凡瘡血滯耳聽自潰勿過砭治若毒內行為煩嘔此候最惡其家有乳香散非能治瘡也能反毒之入為嘔者也因出十餘匕見遺服之即效真緑豆粉四兩研乳香光明者一兩於水中坐乳鉢研細上二物再同研極細每服一錢新汲水調下水不用多要藥在胸膈也
