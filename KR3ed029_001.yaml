body:
  text: 卷之一中風門孫用和准四時虛實治風方證竊觀自古聖賢治療有法十有九驗夫療病之法必先准四時虛實以詳中病之由依繩墨拯濟乃是解死脫厄之路四時之病春中時風自東而來名曰溫風蓋時令不和而傷人也浮而輕淺可汗而解敗毒散羌活細辛之類更看發起在陰在陽隨而得效若也人自虛羸從後而來名曰虛風中人煩悶肢體攣痹不任便可續命湯八風湯成劑頓服更加灸法三五日間勢必減退漸漸調和以求生路如從前來名曰實風亦主人瞀悶脈緊浮大宜以伏神湯西州續命湯求效不用火劫自使勢慢須緩緩治之故千金曰風者百病之長又曰治風不以續命湯治之則不為治風斯以見聖人之心矣更有後方經驗頗多並依四時虛實治療小續命湯治卒中風欲死身體緩急口目不正舌強不能語奄奄忽忽神情悶亂諸風服之皆驗不令人虛麻黃黃芩芍藥芎藭甘草杏仁人參桂心各一兩防己半兩生薑五兩附子一枚防風一兩半上水九升煮取三升分三服未瘥更依前三五劑必瘥取汁隨多少輕重虛實也有人腳氣服此方至六十劑得瘥有風疹加大陰節變輒含之可以防喑啞凡古方用藥其修制炮炙之法皆如常更不細說大防風湯祛風順氣活血脈壯筋骨除寒濕逐冷氣善法寺僧如真師孫遂良紹熙壬子年患痢之後足履瘓弱遂成鶴膝風兩膝腫大而痛髀脛枯臘但存皮骨而已拘攣跧臥不能屈伸待人抱持而後能起如此數月分為廢人淮東趙德遠參議之甥李二十七官人惠以此方服之氣血流暢肉亦漸生遂能良行不終劑平復如故真奇方也防風去蘆白朮白芍藥川當歸杜仲去粗皮炒絲斷稱熟乾地黃黃耆微炙稱各二兩羌活去蘆牛膝去蘆甘草炒人參去蘆稱各一兩附子炮裂去皮臍川芎撫芎不可用各一兩半上拌為粗末令勻每服五錢水一盞半入生薑七片棗子一枚同煎至八分去滓溫服食前又有人教令煎四物湯下四斤元遂良既安不曾服也四斤圓治腳氣相搏往來作痛孫用和經進方七道鐵粉牛黃丸主心經留熱安精神化風痰止心下忪悸及治中風太過候雖不涎潮厥倒漸覺四肢不舉語澀面疣精而昏濁形似醉人日深攤拽皆服之土鬱心經雖子不能親母豈不逆乎病後鬱塞此名心脾太過中風候更加通心氣辰砂丸與同服神驗無比曾於嘉祐元年正月二十日召赴御藥院押引入內看診皇帝御脈遂進此方自晚進藥至夜有效數日之內聖體安寧效驗之速其應如神今目之為神應益聖丹方鐵粉再研水飛過焙乾二兩辰砂別研水飛過極細焙乾一兩天竺黃一分別研極細牛黃半兩細研治急病加至一兩鉛白霜一分別細研上五味煎糯米粥飰和為丸如緑豆大每服十五丸人參湯下日再服糯米飯下亦得通心氣辰砂丸治婦人一切風痰潮發痰逆狂語狀如心風者大效淡醋湯下尤妙若無痰涎不可常服慶曆三年七月中旬醫官院貼宿二更以來內中宣喚當時看診中宮脈息證候瞪目昏迷不省人事遂進辰砂丸鐵粉牛黃丸同服當時有效至四更再進一服尋便好安辰錦硃砂半兩別研極細用水飛過暴乾生白龍腦半兩別研細硇砂半兩通明者別研如粉黃丹炒一錢須是真品白芥子二兩微炒取末一兩半夏一兩浸七遍淨洗片切焙乾取半兩末天南星一兩湯浸軟洗淨切作片焙乾取半兩末上件藥同研拌令勻用麵糊丸如緑豆大細研硃砂為衣每服十丸與鐵粉牛黃丸十丸同服空心食前溫服下日二服硃砂法主身體五臟百疾養精神安魂魄益氣通血脈久服悅澤人面不老輕身仙方最為長生之寶得此方凡療病無不驗上好辰錦硃砂十兩打碎如皂子大須通明如箭鏃者為上甘草一兩訶黎勒二兩銼碎檳榔二兩捶碎遠志淨揀擇去心二兩上銼草藥以水一斗煎取六升去滓絹袋盛硃砂於藥汁中掛以微火煎令汁盡即取硃砂入銀盒中置甑內以二斗糯米蓋藉以桑柴火蒸二日三夜水盡即添暖水春時一日文二日武三日盛武三宿微火夏時一日武二日文三日盛武三宿微火秋時一日盛武二日文三日微文三宿微武冬時一日微文二日文三日盛武三宿微武始終如法日滿即開取硃砂研如粉面以楮子煎膏和丸如梧桐子大每日空心服一丸酒下食後一丸漿水下合時入官桂少許百無所忌輕堅腰膝治一切筋骨風虛及有經驗贊硃砂有何功偏治髓中風不惟延壽算容易駐顏紅楮子煎法楮實也楮子五升六月六日採以水一石煮取五升去滓微火煎如餳即湛用並小斗升生犀丸治心虛喜忘煩悸風涎不利聰明耳目治諸風顫掉及治三十六種風益精神壯心氣或多健忘寢寐足驚心常似憂或忪或慟往往欲倒狀類暗風四肢顫掉多生怯懼每起煩躁悲涕愁煎並皆屬心臟氣虧宜服此以鎮心神生犀一兩屑為細末天麻半兩炙黃敗龜半兩酥炙牛黃一分別研茯神去粗皮一分遠志去心一分人參去蘆頭一分肉桂一分別研龍齒酥炙黃色一分硃砂一分別研麝香半兩別研龍腦一分別研石菖蒲半兩細銼一寸九節者金銀箔各五十片羚羊角半兩屑為末上十五味搗研極細煉蜜為圓如梧桐子大食後臨臥溫水化下二丸或加至四丸至七丸解五毒丸牛黃一分研金箔小折七片與衆勻研龍腦半分麝香半分硃砂一兩研犀角一分醋研膩粉一分巴豆一百五十個去皮心膜出油黃蠟三分上件藥先化蠟為油入諸藥和調勻便丸如皂子大每一丸療四人食毒酒毒陰毒陽毒氣毒並用龍腦膩粉水下一丸如吐逆不定用人血酒下藥毒人血酒下一丸如是藥毒仍先吃生油少許此藥每取下惡物後速撥取以水淨洗於地坑子內焙三日取出用硃砂麝香養之再以解毒每一丸可三次用菵草散治中風涎盛及氣嗝不下粥藥者立效菵草一兩生用枇杷葉一兩生用去毛半夏一兩湯浸焙乾上件為散每服一錢水一盞半生薑一塊同煎至半盞去滓溫服之立效治李維觀察二十日嗝吐不下粥食藥只此一服效許學士二方治風虛驚悸真珠圓治肝經因虛內受風邪臥則魂散而不守狀若驚悸有董生者患神氣不寧每臥則魂飛揚覺身在床而神魂離體驚悸多魘通夕無寐更數醫而不效豫為診視詢之曰醫作何病治董曰衆皆以為心病豫曰以脈言之肝經受邪非心病也肝經因虛邪氣襲之肝藏魂者也遊魂為變平人肝不受邪故則魂歸於肝神靜而得寐今肝有邪魂不得歸是以臥則魂揚若離體也肝主怒故小怒則劇董欣然曰前此未之聞雖未服藥已覺沉疴去體矣願求藥法豫曰公且持此說與衆醫議所治之方而徐質之閲旬日復至云醫偏議古今方書無與病相對者故豫處此二方以贈服一月而病悉除此方大抵以真珠母為君龍齒佐之真珠母入肝經為第一龍齒與肝同類故也龍齒虎睛今人例以鎮心藥殊不知龍齒安魂虎睛定魄各言類也東方蒼龍木也屬肝而藏魂西方白虎金也屬肺而藏魄龍能變化故魂遊而不定虎能專靜故魄止而有守豫謂治魄不寧者宜以虎睛治魂飛揚者宜以龍齒萬物有成理而不說亦在夫人達之而已真珠母三分研細同當歸熟乾地黃各一兩半人參酸棗仁柏子仁各一兩犀角茯神沉香龍齒各半兩上為細末煉蜜為丸如梧子大辰砂為衣每服四五十丸金銀蔢苛湯下日午夜臥服獨活湯獨活黑者羌活防風人參前胡華陰細辛五味子沙參白茯苓半夏曲酸棗仁甘草各一兩上為粗末每服四大錢水一盞半生薑三片烏梅半個同煎至八分去滓不拘時候啄木散治暗風癎疾諸藥不效者武昌都帥趙清老云軍中老醫甚珍此方力求而得之一年之間已醫十餘人喜而傳余啄木兒一枚去觜翅尾爪尖用瓦罐子先鋪荷葉荊芥穗一寸厚次入無灰酒三升方下啄木兒更用荷葉荊芥一寸厚用紙封口鹽泥固濟炭火煅青煙出為度候冷取出只用啄木兒臘月者尤佳寒水石二兩火煅通紅別研鐵粉一兩別研附子一隻一兩者炮去皮臍取末牛黃二錢半別研麝香二錢半別研腦子二錢半別研硃砂二錢半別研上為細末拌勻每服一錢溫酒調下便就枕睡少時發罷時服尤妙常服不拘時候舒荊湯治臂痹痛自聞嘗苦左臂痹痛或以為飲或以為風為濕諸藥悉投繼以針艾俱不效一日見陳異即云其親嘗苦此且年高難用藥有德清竹尉傳一方云可三服而愈蓋是血氣留滯經絡不行所致非風非飲非氣非濕但止能治腰以上疾若腰以下則藥力不至也服三服而愈余服之亦然後來見王伯舉因語及此且恨不能治腰以下疾耳伯舉云吾有方謂之五痹湯與此用藥一同但添海桐皮當歸赤芍藥三味各二兩如腰以下疾則食前服腰以上疾則食後服用之俱驗片子薑黃四兩本草之說不一但當用老生薑切成片如今所用染物者非甘草一兩炙白朮二兩羌活一兩上為粗末每服三錢水一盞半煎七分蕊珠圓治心恙豬心一個取血硃砂一兩為末青靛花一匙上件三味先將青靛一匙曝乾次取豬心血一處同研爛次入硃砂為圓如梧桐子大每服二十圓茶酒下不拘時候甚者不過三服有陳氏常病此因收治方甚多在吳興日偶聞一染鋪之子苦斯疾遂録以教之數服而愈許學士養血地黃圓治筋脈拘攣伸屈不得有人患風病自午後發黃昏時定豫曰此患必先從足起經言十二經絡各有筋惟足少陰之筋自足至項大抵筋者肝之合也日中至黃昏天之陽陽中之陰也又曰陽中之陰肺也自離至兌陰旺陽弱之時故靈寶畢法云離至乾腎氣絶而肝氣弱肝腎二臟受陰氣故發於是時豫授此方三服而愈同官歙丞張德操常言其內子苛患筋攣腳不得屈伸者逾年動則令人持抱求醫於泗水楊吉老老云此筋病宜服下三方服一年而愈熟乾地黃十分頑荊一分山茱萸五分黑狗脊炙地膚子白朮乾漆蠐螬干之炙天雄車前子各三分萆薢山蕷澤瀉牛膝各一兩上細末煉蜜和杵如梧子大每服五十圓溫酒下空心夜臥凡中風用藥速效者排風湯續命湯引竹瀝諸湯及神精丹茵萸酒之類更加以灸無不愈者然此疾積習之久非一日所能致皆大劑久而取效唐書載王太后中風喑然不語醫者蒸黃耆數斛以熏之得瘥蓋此類也今人服三五盞便求效貴醫也亦速矣孟子曰七年之病三年之艾久而後知爾白茯苓去黑皮獨活去蘆頭麻黃去根節已上各三兩白鮮皮白朮芍藥芎藭當歸去蘆頭桂去粗皮防風去蘆頭杏仁去皮尖只仁者麩炒令黃色甘草銼炒已上各二兩上為粗散每服三錢水一盞半入生薑四片同煎至八分去滓溫服不計時候續斷湯治久年病風不瘥王思和用此方一月而愈思和名醫寓儀真時人少知者後至都下聲名籍甚為醫官續斷杜仲肉桂防風甘草牛膝白茯苓細辛人參當歸白芍藥各一兩川芎秦艽熟乾地黃川獨活各三兩上為細末每服二錢水一盞生薑三片棗一個同煎至七分空心食前稍熱服勝金圓治中風吐痰即愈張醫博子發授此方得省生蔢苛半斤豬牙皂角二兩捶碎水一升二味一處燒取汁慢火熬成膏瓜蒂末一兩藜蘆末一兩硃砂半兩研上將硃砂末一分與三味研勻用膏子搜和圓如龍眼大以余硃砂為衣溫酒化一圓甚者二圓以吐為度得吐即省不省者不可治必用方論中風無吐法引金虎碧霞為戒且如卒暴涎生聲如引鋸牙關緊急氣閉不行湯藥不能入命在須臾執以無吐法可乎但不當用銀粉藥恐損脾壞人四肢爾豫每用此二方每每有驗茶調散治偏正頭風諸藥不愈者宜服此李全總領云此天下第一頭風藥香白芷二兩半炒川芎一兩銼炒甘草一兩銼炒川烏頭半兩炮銼上四味搗羅為末每服二錢好茶少許薄荷三葉沸湯調下如暴傷風頭疼可加蔥白二寸細切和茶下芎香散治頭風解防禦用此得效川芎大香附子炒去皮毛等分上為細末空心熱酒調下二三錢食後服茶清調亦得明目又治婦人血風七烏圓治風痹之疾遍身走注服諸藥不效素問論痹云風寒濕三氣而合為痹風氣盛者行痹上下左右無留隨所至耳惟服此藥不終劑而愈亦治風濕腰痛腳氣之疾有風氣人大宜服此活血駐顏壯筋骨大川烏二兩去皮尖草烏二兩去皮尖赤何首烏二兩豬牙皂角二兩黑豆半升烏梅五十個捶破天台烏藥二兩銼上用無灰酒二升米醋二升用砂糖瓶浸一宿煮將干取出用炭火焙碾細末用酒醋煮薄麵糊為圓如桐子大每服三十丸至五十丸病上食後病下食前溫酒鹽湯下腳氣木瓜湯下些小瘡瘍數服見效竇朝議經進仙酒方治大風及偏風一切風疾延年益壽牛蒡根一斤牛膝一斤秦艽二兩鼠黏子二兩枸杞子炒一斗蒼朮蒸爛二斤防風二兩蠶沙二兩大麻子一升炒去殼別研桔梗二兩羌活二兩上為銼散無灰酒二斗淨瓷器內浸密封七日開開時不得對瓶口日進三服每服一大盞溫服常令面有酒色甚者不過一斗忌麵食並魚肉動風物御風膏治口眼喎斜向來臨安得醫家傳有人中風傳入陽明經而口眼喎斜者宜用萆麻子去殼碾細塗在手心以一盂子置在手心萆麻子上以熱水置盂中口正則急取盂左癱塗右手心右癱塗左手心口眼才正急洗去藥昨在鄉邑亦常療人妙哉此方又治生産難者爛研塗兩腳心才生便急洗去腳心藥火杴草圓治一切風疾張忠定公經進臣本府有僧智堅年八十餘歲顏色紅潤行步如飛臣怪如此因問其由云久服火杴草丸使然令就其房録此方臣當年修合服食未久臣家有老僕年七十歲舊患冷痛風已數年不瘥忽一日厥疾痊愈問其損云臣付婢竊臣所服火杴草丸與之頓覺強健臣不住令病僕空心服之臣莊在山口鎮約八十里當令幹事一日能往返因知此藥大有神效上草於五月五日或六月六日悉不拘多少先於急流水中灘上淨洗去根及土入甑灑紅酒或無灰酒蒸一頓飯大取出於向日曬生絹袋盛於當風處掛一斤為末用白硔蜜一斤和勻搗七千下不犯鐵器圓梧子大瓷合收每服二十至三十丸湯使干後虛冷空心鹽湯酒下婦人血風艾醋湯下渾身疼痛經年不瘥骨碎補酒下産後敗血不散性命難保姜酒下中風手足攣口眼喎斜天麻酒下腎臟下注腰腳廣腫行步不及豆淋酒下無力顏色萎黃飲食減少薑湯下賁豚小腸氣茴香酒下食積胸膈脹滿橘皮湯下連年久嗽黃耆湯送下赤白痢及水瀉薑湯下氣疾攻刺威靈仙酒下冷勞痼疾石斛酒送下有婦人二十歲偶食中吃驚發搐涎塞不省人事牙關緊急以白梅擦牙次用冷水茶調常山細末二錢服下吐出涎而省後投局方烏沉湯而安吐法壯實者可用有人忽然不省人事身體軟弱牙關不緊涎不潮塞招數醫皆言中風投雄珠丸星附之屬病者轉昏僕診其脈皆濡氣閉隔絶所以脈濡受以局貨木香流氣飲煎熟入麝香少許兩服而痊有人病頭旋經云眊為眼花眩為眼黑眩暈頭旋不省人事皆是陽虛又云上虛則眩下虛則厥令服局方俞山人蘇子降氣湯養正丹來復丹如聖餅子而安有一室女每經候欲行如風之狀發搐不省人事診其脈心脈浮衝任脈沉此因經行伏驚致此服局方黑神散入硃砂燈心麥門冬煎湯調下數日自後經行如常前病不作若腹痛加大聖散服有一婦人腳趾赤腫痛不可忍加檳榔木瓜煎局方香蘇飲三服而痊有人每遇天陰覺渾身重疼無力此乃濕氣香蘇飲與平胃散各一貼和分四服加木瓜煎大有神效治腳隱痛行步艱辛只平胃散加赤曲同煎服最妙有人常覺左眼瞤動忽然左邊口喎食則不能收求醫僕診其脈浮而澀氣口脈遲而澀遂授之局方香蘇飲和藿香正氣散加南木香薑棗同煎次以小續命湯加天麻磨沉香水同煎下局中養氣丹數服痊安有人四十已上歲平日好食麵飲酒苦右臂不能舉授以局方五積散加木瓜檳榔煎又用生附子一兩去皮臍南木香二錢半㕮咀分作三服水二盞生薑十大片同煎一盞去滓熱服數服而安有人誤服風藥多遍身麻吐瀉致脈厥一醫欲投丹藥偶一道人乞至門見云此是中草烏之毒用晉釩青黛二味細研用貫衆煎湯調下便省吐瀉亦止若中巴豆毒芭蕉根煎湯服極妙又方療中風藥毒齏水調蛤粉尤奇
