body:
  text: 卷之十六咽喉門治咽喉諸病證候夫喉以候氣咽以咽物咽接三脘以通胃喉通五臟以系肺氣谷攸分皎然明白有為水喉谷喉之説者謬説也千金復云喉嚨候脾胃咽門候肝膽亦非至論智者當以理推不可強存乎人矣諸臟熱則腫寒則縮皆使喉閉風燥亦然五臟久咳則聲嘶嘶者喉破也非咽門病咽腫則不能吞干則不能咽多因飲啖辛熱或復嘔吐咯傷致咽系乾枯之所為也與喉門自別又有懸雍暴腫閉塞喉嚨亦如喉閉但懸雍在上齶俗謂鶯翁又謂之鵝聚俗語聲訛不可不備識玉鑰匙治風熱喉痹及纏喉風葉伯材用此數方纍有神效焰消一兩半硼砂半兩腦子一字白殭蠶一分上為末研勻以竹管吹半錢許入喉中立愈神效散治喉閉熱腫語聲不出荊芥穗別為末萆麻生去皮另研各等分上入生蜜少許圓如皂子大以綿裹含化急則嚼化一法用朴硝不用荊芥玉屑無憂散治纏喉風咽喉疼痛語聲不出咽物有礙或風涎壅滯口舌生瘡大人酒症小兒奶癖或誤吞骨屑哽塞不下玄參貫衆縮砂仁滑石山豆根黃連甘草荊芥穗茯苓各半兩硼砂三錢寒水石煅三錢上為末每服一錢先抄入口以新水咽下此藥除三尸去八邪殺九蟲闢瘟療渴荊芥湯治風熱肺壅咽喉腫痛語聲不出喉中如有物哽咽之則痛甚荊芥穗半兩桔梗二兩甘草一兩上為銼散每服水一盞薑三片煎六分去滓服一法去荊芥穗名如聖湯解毒雄黃圓治纏風及急喉痹卒然倒僕失音不語或牙關緊急不省人事或上膈壅熱痰涎不利咽喉腫痛雄黃飛一分鬱金一分巴豆去皮出油二七個上為末醋糊圓緑豆大熱茶清下七丸吐出頑痰立省未吐再服如未至死心頭尚溫灌藥下喉即活龍腦散夫咽喉卒腫痛者由人臟腑充實肺脾暴熱之所致也或有服餌丹石毒氣在臟熏蒸上焦而又多食炙煿熱酒衝於脾肺致胸膈壅滯氣道痞澀熱毒之氣不得宣通故令咽喉卒腫痛也孫氏用此數方治咽喉之病大有神效龍腦一分研硃砂三分研細犀角屑三分真珠末半兩研馬牙硝一兩研白藥子三分黃耆半兩銼甘草半兩細銼上件八味細杵研令勻每服二錢新汲水調下不計時候牛蒡湯治咽喉生瘡夫咽喉者脾胃之候由脾胃間熱其氣上衝咽喉所以生瘡其瘡白頭或赤根皆熱毒之所致宜用此方桔梗一兩甘草一兩生用牛蒡子一兩微炒上為粗末每服三錢水一中盞入青竹茹一分同煎至六分去滓不計時候溫溫細呷服金露丸夫尸咽喉者謂人腹內尸蟲上蝕於咽喉而生瘡也此皆陰陽不和脾肺壅滯風熱毒氣在於臟腑不能宣通故令尸蟲動作上蝕咽中或痛或津如𧈟之候者是也宜服此方硃砂一錢白礬一分甘草生為末半兩鉛霜一錢麝香一錢大陰玄精石一分研末蛇蛻皮三條全去頭以皂角揉取濃水一盞浸一伏時漉出曬乾別更炒令焦黃為末上件藥同研勻細煉蜜和為丸皂莢子大食後臨臥用新薄綿裹一丸含化咽津犀角散治馬喉痹夫馬喉痹者謂熱毒之氣結於喉間腫連頰骨微壯熱煩滿而數吐氣呼之為馬喉痹治馬喉痹頰面腫滿並宜服之犀角屑半兩射干三分桔梗三分去蘆頭馬蘭根三分銼甘草半兩炙微赤銼川升麻半兩上六味粗搗為散每服三錢水一中盞入竹葉七片煎至六分去滓入馬牙硝一錢攪令勻細含咽菖蒲丸治咽喉腫痛語聲不出菖蒲二兩孔公孽一兩細研木通二兩銼皂莢一挺厚實者去黑皮塗酥炙令焦黃色去子用上四味為末煉蜜為丸如梧桐子大每服煎鬼羽箭湯下二十丸漸加至三十丸不計時候乳香丸治咽喉生谷賊夫谷賊者禾里有短穗而強澀者是也誤作米而食之則令喉里腫結不通致風熱氣衝於喉間與血氣相搏則生腫結如食飲疼痛妨悶故謂之喉中生谷賊不急治之亦能殺人宜服此方立效乳香半兩硇砂一分琥珀半兩松脂半兩上件四味搗研為末化黃蠟和丸如雞頭實大常含咽津以瘥為度千兩金丸治纏喉風不問陽閉陰閉如急病內外腫塞輒至不救者用之能起死滁州何村丘永興傳此三方的有神效蚵蚾草嫩者豬牙皂角各半兩銅青二兩大黃半兩上為細末以白梅肥潤者取肉爛研一處搗勻每兩作一十五丸每用以新綿裹口中含化咽津有頑涎吐出若病得兩日後難用南星防風散治風壅腮頷腫內生結核纏喉風等南星半兩湯洗淨搗細薑汁製焙乾防風半兩生用不見鐵器白殭蠶半兩焙乾當歸二錢焙乾天麻三錢生用豬牙皂角去黑皮焙乾三條上件為末每服二錢水一盞薑三片入荊芥少許同煎至七分溫服食後日進三服忌發風毒物如腫不散者加透明雄黃三錢同前藥一道為末煎服立聖膏治纏喉風齊州半夏三七粒巴豆三七粒上將半夏輕捶每粒分作四片巴豆剝去心膜於銀銅石器內用米醋三碗文武火熬盡醋為度用清醋微洗過研為膏子每患纏喉風或喉閉或癇疾用一斡耳以生薑自然汁一茶腳化下患甚者灌藥少時自然吐出惡涎如魚凍相似立愈極有神效吹喉散治咽喉腫痛朴硝四兩別研甘草末生一兩上研勻每用半錢乾摻喉中如腫甚者用竹筒子吹入喉中為佳一字散治喉痹氣塞不通欲死者雄黃別研蠍梢七枚白礬生研一錢藜蘆一錢豬牙皂莢七挺上為細末每用一字許吹入鼻中即吐頑涎立瘥佛手散治纏喉風神效盆硝一兩研白殭蠶半兩去絲青黛一錢研甘草二錢半生上為細末以少許摻喉中如閉甚以竹管吹入尋常咽喉間不快亦可用白藥子治急喉痹範觀道方青魚膽新瓦上焙乾去膜取末一錢蛇蛻皮去沙土碗內燒灰一錢研令極細白殭蠶直者去絲嘴新瓦上焙乾一兩白礬鐵銚飛過留性一兩白藥子新瓦上焙乾一錢上併為細末再以乳鉢和研令勻再用半錢吹入咽喉立愈若病輕以多年白鹽梅肉細切入前項藥同搗令勻圓如大雞頭大每服一丸含化咽津如白梅稍乾硬用熟湯浸令軟取肉細切用頭目門頭者諸陽之會上丹産於泥丸宮百神所集凡頭痛者乃足太陽受病上連風府眉角而痛者皆可藥愈或上穿風府陷入手泥丸宮而痛者是為真頭疼不可以藥愈夕發旦死旦發夕死責在根氣先絶也原其所因有中風寒暑濕而疼者有氣血食飲厥而疼者有五臟氣鬱厥而疼者治之之法當先審其證候都梁圓大治諸風眩暈婦人産前産後乍傷風邪頭目昏重及血風頭痛服之令人目明凡沐浴後服一二粒甚佳暴寒乍暖神思不清傷寒頭目昏暈並宜服之王定國因被風吹項背拘急頭目昏眩太陽並腦俱痛自山陽孥舟至泗州求醫楊吉老既診脈即與藥一彈圓便服王因款話經一時再作並進兩圓病若失去王甚喜問為何藥答云公如道得其中一味即傳此方王思索良久自川芎防風之類凡舉數種皆非但一味白芷耳王益神之此藥初無名王曰是藥處自都梁名人可名都梁丸也香白芷大塊擇白色新潔者先以捘刷刷去塵土用沸湯泡洗四五遍上為細末煉蜜和丸如彈子大每服一圓多用荊芥點臘茶細嚼下食後常服諸無所忌只干嚼咽亦可茶芽湯治偏正頭疼噁心嘔吐不止者襄陽府胡急腳專貨此藥積錢至數萬緡祕惜不傳上官醫以計得之細茶芽一兩生草烏半兩去皮尖細辛半兩上為粗末每服五錢水二盞慢火煎至六分去滓溫服一服取效十味如神圓治偏正頭風墜痰涎散滯氣寬胸膈久服清頭目強腰膝峽州教授王執中字叔權永嘉人其母患頭風臥病餘半年偏服頭風藥雖少愈而未能去體偶何用之來訪云祖母嘗因驚避戎馬奔走得頭風疾數年有道人令服此而驗因傳其方既服遂脫然半夏四十九粒湯浸七次晉礬枯過南星一個洗薑汁浸天門冬去心五味子各半兩麥門冬去心遠志去心各一兩甘草炙白朮人參各一分上為末生薑自然汁調飛羅面煮糊圓梧桐子大硃砂一分為衣每服十圓至十五圓食後臨臥生薑湯吞下芎辛湯治傷風寒生冷及氣虛痰厥頭疼如破兼眩暈欲側嘔吐不定附子生去皮臍烏頭生去皮尖天南星乾薑甘草炙川芎細辛各等分上為銼散每服四大錢水三盞薑五片茶芽少許煎七分去滓食後服芎附散治氣虛頭痛不可忍張裁衣得此方屢以醫人皆立效附子一兩者炮去皮臍川芎二錢熟乾地黃半兩須自曬灑酒九蒸九曝者市賣者以緑礬搭色不中用或無即以好大川當歸半兩代之上㕮咀每料分作五服水一大盞生薑三片棗一枚同煎至六分去滓入細磨木香水一蚶殼再暖令熱服之藿香散治傷風挾涎飲上厥頭疼偏正夾腦諸風藿香半兩川烏頭湯浸七次去皮尖一兩乳香三皂子大草烏頭炮裂去皮尖半兩上為末每服一字薄荷茶清調下食後服治眼目諸病證候夫眼者五臟之精明一身之至寶如天之有日月其可不保護之然骨之精為瞳子屬腎筋之精為黑眼屬肝血之精為絡果屬心氣之精為白眼屬肺肉之精為約束屬脾契前骨血氣之精與脈併為糸系上屬於腦後出於項中故六淫外傷五臟內郁飲食房室遠視悲泣抄寫雕鏤刺繡博奕不避煙塵刺血發汗皆能病目故方論有五輪八廓內外障等各各不同尤當分其所主千金神麯圓明目百歲可讀細書常服益眼力神麯四兩磁石二兩煅醋淬七次光明砂一兩上為末煉蜜為丸梧子大米飲服五丸食前日三服聖惠散治目赤羞明冷淚不止夏枯草穗二兩香附子炒去毛三兩上為細末每服二大錢百沸湯調下食後服若能飲酒而目赤作痛眵淚隱澀難開局方密蒙花散用白茅根煎湯調下食後服四寶圓治眼疾時見黑花視物不真及一切目疾枸杞子八兩青鹽四兩川椒去目並閉口六兩菊花英六兩上四件一處用水煮候水涸出焙為末煮薄麵糊為丸如桐子大每服三五十丸空心食前鹽湯熟水送下大明散治諸目疾不問久新退翳去赤脈治風毒上攻羞明怕日漸覺眼細小或痛或癢及素有頭風疾最妙蒼朮四兩泔浸荊芥穗二兩防風人參一兩菊花二兩木賊去節二兩川芎一兩鼠黏子炒一兩甘草炙一兩羌活去蘆二兩蟬退去頭足半兩上為細末每服三錢茶清調下若熱淚目赤米泔水調下食後服蟬花圓治眼睛痛漸生赤障視物䀮䀮隱澀難開蔓荊子一兩大川烏炮半兩去皮川羌活一兩蟬蛻去頭足半兩沒藥半兩別研赤芍藥一兩龍膽草去苗半兩木賊去節半兩當歸去蘆洗一兩上為細末薄麵糊為圓如桐子大每服三五十圓食後茶清送下黑錫丹有人患赤目皆作肝經有熱服洗肝散涼藥治之久而目覺昏生翳膜遂服局方黑錫丹錦鳩圓並駐景圓而痊安腎圓治氣虛人目昏瞻視不明常見黑花宜服局方安腎圓和菊睛圓每服五七十圓空心食前鹽湯送下消風散治男子婦人風毒攻注兩眼赤腫而癢蓋癢則有風也局方消風散和菩薩散二錢百沸湯調下食後服木香流氣飲若因怒或食物熱或飲酒而致目赤眼胞紫內生赤脈局中木香流氣飲加大黃煎服凡患眼疾切須戒飲節欲蓋酒能引風況熱而有毒眼屬肝肝屬木尤不可用藥點緣病自內起俗諺云眼不點不瞎耳不幹不聾此之謂也
