body:
  text: 卷之十五血疾門治吐血衄血咯血證候人稟二氣不可偏枯一有勝之即致妄行攝生之序榮衛為先調護相濟無令參差經云諸氣皆屬於陽諸血皆屬於陰陰盛則陽虧陽盛則陰虧所謂陽勝則陰病陰勝則陽病吐衄便溺乃陽氣侵陰陰氣被傷血失常道白朮散治吐血咯血行榮衛順氣止血進食退熱惟忌食熱面煎煿海物豬雞一切發風之物酒不宜飲食不宜飽常令飢飽得所自然胸膈空利氣血流順也蘇少連病此極可畏百藥不效偶姜孚言通判傳此方服之遂愈後以濟人纍驗韜光傳白朮二兩人參白茯苓去黑皮黃耆各一兩山藥百合三分去心甘草炙各半兩前胡去蘆柴胡去蘆各一分上為散每服一錢半水一盞姜三片棗一個同煎至六分溫服日三立效散治吐血辛大參企李之孫佑之為鄂州戶部糧料院家藏之方幾療十餘人矣專録以相示真可寶也側柏葉焙乾如倉卒難乾以新瓦置火上摘葉於瓦內煿干亦得上為細末米飲調下二三錢兩服即止多服亦無害雙荷湯治卒暴吐血張氏處此方纍有神效藕節七個荷葉頂七個上二味用少蜜同擂細水二錢煎八分去滓食後服萬金散治咯血槐花揀淨上為末每服二錢熱酒調下食後服青杏餅治吐血及久嗽咯血不問久新杏仁去皮尖擂細青黛研牡蠣煅研上等分和勻熔黃蠟攪放溫捏成餅如棋子大每服二餅用乾柿去核入藥在內濕紙裹煨嚼細齏水度下不以時候水五散治男子婦人咯血吐血寒水石燒通紅五倍子生用上等分為細末每服二錢冷米飲調下食後服奪命丹治吐血竹蛀屑上每服二大錢用無灰酒調下如不飲用白茅根煎湯調下不以時候黃金散治吐血損肺伏暑小便遺血勞嗽咯血誤服蠱毒黃蜀葵花上不以多少陰乾為末每服一大錢入麝香少許百沸湯略濕食後服不過兩服黑神散治大吐血及傷酒食飽低頭掬損吐血至多並血妄行口鼻中俱出但聲未失無有不效百草霜若村中燒草偏底煤最妙上不拘多少羅細每服一錢糯米煎湯調下鼻衄搐一字皮破出血灸瘡出血摻上立止治舌忽然腫破乾摻蓮子湯治勞心吐血孫盈仲說臨安張上舍曾以此治數人得效蓮子心七個糯米二十一粒上為末酒調服地黃膏治吐血葛察判閣中苦此疾百藥皆試得此方服之取效後雖發屢驗生地黃一斤附子一兩炮去皮細切乾山藥三兩上將地黃洗淨細搗取汁其滓再入好酒少許又取汁令盡將附子切作片子入在地黃汁內用銀石器熬成膏其附子取出焙乾更用山藥同為細末卻以地黃膏子和成劑木臼內杵一二千下丸如梧桐子大每服三十丸漸漸加至五十丸米飲空心下神效地黃湯治妄行吐血張裁衣傳其子病服此即止屢作屢效熟地黃洗去土焙乾上為細末用好真京墨新汲水磨半盞來許分作二服調熟地黃末服之墨須用松煙者固榮散治吐血便血王醫師方鍾允中鈴轄傳真蒲黃炒一兩地榆去蘆一兩白芷半兩甘草炒三錢上細末每服三錢溫湯調氣壯人加石膏半兩止衄散治氣鬱發衄無比神方黃耆六錢赤茯苓白芍藥當歸生乾地黃阿膠炙已上各三錢上為細末煎黃耆湯調下二錢匕未知再作二灰散治肺癰吐血並妄行紅棗和核燒存性百藥煎煅各等分上為細末每服二錢米湯調下紫金丹治暴中咯血新綿灰蒲抄一錢漢防己一兩為末甘草半兩炮為末阿膠半兩炙為末麝香半錢細研乳香少者上件藥和合令勻滴水為丸如雞頭大臨臥時臘茶吞下一丸中毒門治中諸毒證候江南閩中山間人以蛇虺娛蚣蜒蚰蝦蟆等百蟲同器蓄之使其自相食啖勝者為靈以事之取其毒雜以菜果食之類以害人妄意要福以圖富貴人或中之證狀萬狀廣如治百蠱說或年歲聞人多死又有人家香火奉事如家先者亦謂之蠱能病人世謂之蠱注以姓類屬五音謂之五蠱此皆邊鄙邪僻之地多有此事中都則蔑聞也夫中蠱毒者令人心腹絞痛如有物齧吐下血皆如爛肉若不即治食人五臟即死驗之令病唾水沉即是蠱有人行蠱毒以病人若欲知其姓名者以敗鼓皮燒作木飲服方寸匕須臾自呼蠱家姓名可語令呼喚將去則愈治之亦有方丹砂圓治蠱毒從酒食中著者方端午日合辰砂別研雄黃別研水飛赤腳蜈蚣續隨子各一兩麝香一分上為末糯米飲為丸如雞頭大若覺中毒即以酒下一圓蛇蠍所螫醋磨塗之犀角飲子解丹石藥毒楊氏處此數方纍用有神效犀角鎊知母防風去蘆頭甘草四味各半兩山梔子杏仁去皮尖蔓荊子地骨皮白茯苓去皮各一兩黃芩一兩半柴胡去苗二錢上件㕮咀每服五錢水一盞煎至七分去滓溫服解毒圓解一切飲食毒及諸藥毒並療溺死縊死磕死或湯燙火燒氣已絶但心頭微熱者皆可治五倍子三兩大戟一兩山慈姑半兩板藍根半兩續隨子去皮一兩麝香一錢別研上件為細末研勻水煮糯米糊為丸每一兩作一十丸陰乾用雄鴨頭血為衣候經宿布袋掛當風處每服一圓熱酒磨下化毒散治中藥毒吐血或心痛或舌尖微黑口唇裂嚼豆不腥者是巴豆一枚去皮心膜細研黃丹半錢雄黃一字同細研上用烏雞子一枚煎盤內煎成餅摻藥在上卷為筒子臨睡一服爛嚼茶清送下當夜取下毒備急散解中藥毒煩躁吐血口內如針刺白礬一兩草茶一兩上件為細末每服三錢新汲水調下此藥入口味甘而不覺苦者是中毒也甘粉散解一切藥毒甘草二兩生銼碎用水三碗煎至一碗去滓入緑豆粉一合折勻再煎數沸入蜜半兩溫服白豆散解一切藥毒白扁豆生曬乾為細末新汲水調下二三錢匕吳內翰備急方云全椒醫高照一子原賴父笞之遂服砒霜自毒大渴利腹脹欲裂余教照令服此藥以水調隨所欲飲與之不數碗即利而安菖蒲散解蠱毒張知府叔潛云平生用此甚驗上菖蒲一味切焙乾為細末以甘草煎湯調下不計時候服以病退為度叔潛居官每施此藥草豆散解砒毒葉春方白扁豆不以多少為細末入青黛等分細研再入甘草末少許巴豆一枚去殼不去油別研為細末取一半入藥內以砂糖十大塊水化間添成一大盞飲之毒隨利去後即服五苓散之類木香餅治食蟹反惡陳正卿雲頃年與一承局同航船承局者為舟中人言嘗為官司差往昌國見白蟹不論錢因買百金得數十枚痛飲大嚼且食紅柿至夜忽大吐繼之以血昏不醒人病重殆同邸有知其故者憂之忽一道人云惟木香可解但深夜無此藥偶有木香餅子一貼試用之病人口已噤遂調藥灌即漸漸蘇吐定而愈陳土湯治中毒附子河豚烏頭之類一切藥毒皆可治劉醫方袁司法同上用多年壁土熱湯泡攪之令濁少頃乘熱去腳取飲不省人事者灌之甚妙解毒散不以是何毒藥服之蟲皆吐出神效石菖蒲白礬上等分為末新汲水調下二錢不過兩服必效黃連湯解巴豆毒飲生油即解又煎黃連湯服亦解酸米醋解砒毒釅米醋多飲之吐出毒即解不可飲水甘草湯治中諸藥毒生甘草黑豆淡竹葉服之白芷散治咬先以麻繩扎傷處兩頭次用香白芷細末之以多為妙仍以新汲水調下半兩許毒氣自消一方用熱酒調下諸方皆用麥門冬水蓋欲先護心氣也麝香散治蛇傷及蜈蚣蠍螫諸毒蟲咬方麝香少許研乾薑雄黃研上等分為細末用津唾點時擦患處痛即止又方用艾灸咬處五壯或七壯其痛立止此二方妙甚貝母散治蛇傷及一切惡蟲所傷已死但有微氣可以下藥即活神效不可言貝母為末酒調令病者儘量飲之飲不得即止頃之酒目傷處為水流出水盡為度卻以貝母滓塞瘡口即愈蘇韜光寓婺州城外魁星館有人書此方於壁間云此方神妙與前香白芷方並書之韜光屢以救人皆驗治蜈蚣傷極妙甚者不過兩枚取大蜘蛛一枚放所咬處令收其毒趙參議陳寺亟錢文子皆云之初亦不信親曾用之既齧痛果即定蜘蛛雖著身稍遠必徑尋其處而齧之漸覺腹脹蓋為毒氣所攻須急投水中不爾即死
